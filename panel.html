<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel PRO Panadería</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
.container{display:flex;height:100vh;}

.sidebar{
width:250px;
background:#111;
color:white;
padding:10px;
overflow:auto;
}

.main{flex:1;padding:15px;overflow:auto;}

.topbar{display:flex;gap:10px;margin-bottom:10px;}

input{padding:6px;}
button{padding:6px;cursor:pointer;}

.total-general{
font-size:22px;
font-weight:bold;
background:#fff;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
position:relative;
cursor:pointer;
}

.card.moto{border-left:6px solid green;}
.card.auto{border-left:6px solid blue;}
.card.recoge{border-left:6px solid orange;}
.card.lejano{border-left:6px solid purple;}
.card.editado{background:#fff3a6;}

.x{
position:absolute;
top:5px;
right:8px;
color:red;
cursor:pointer;
font-weight:bold;
}

/* MODALES */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.ticket{
background:white;
padding:10px;
border-radius:10px;
}

/* MODAL PEDIDOS */
.layout{display:flex;gap:15px;}

.panel-botones{
width:180px;
position:sticky;
top:10px;
}

.producto{
display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
align-items:flex-start;
}

.producto img{
width:110px;
height:110px;
object-fit:cover;
border-radius:10px;
}

.producto.activo-cant{background:#d4ffd4;}
.producto.activo-din{background:#d4e4ff;}

#resultadoBox,#bendajeBox{
background:#f9f9f9;
padding:10px;
border-radius:10px;
margin-top:10px;
white-space:pre-line;
}

#bendajeBox{background:#fff3cd;}

.totalGrande{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

@media print{
body *{visibility:hidden;}
.ticket, .ticket *{visibility:visible;}
.ticket{
position:absolute;
left:0;
top:0;
width:80mm;
}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>Fecha</h3>
<input type="date" id="fecha">
<br><br>
<button onclick="nuevoCliente()">➕ Agregar Cliente</button>
</div>

<div class="main">

<div class="topbar">
<input type="text" placeholder="Buscar cliente..." oninput="filtrar(this.value)">
</div>

<div class="total-general" id="totalGeneral">TOTAL: $0</div>

<div class="grid" id="grid"></div>

</div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal" id="modal">
<div class="ticket">

<div style="text-align:center;">
<strong>Panadería VIANNYS</strong><br>
NIT: 1.076.501.617<br>
Tel: 3134062278
</div>

<hr>

<div id="clienteNombre"></div>

<button onclick="tomarPedido()">🧾 Tomar pedido</button>
<button onclick="cerrar()">Cerrar</button>

</div>
</div>

<!-- MODAL PEDIDOS -->
<div class="modal" id="modalPedido">
<div class="ticket" style="width:95%;max-width:900px;max-height:90vh;overflow-y:auto;">

<h2>Pedido</h2>

<div class="layout">

<div style="flex:1;" id="productos"></div>

<div class="panel-botones">
<button onclick="modo='promo'">PROMO</button>
<button onclick="modo='original'">ORIGINAL</button>
<button onclick="modo='alexa'">ALEXA</button>
<button onclick="modo='tiberio'">TIBERIO</button>
<button onclick="resetear()">🧹 LIMPIAR</button>

<hr>

<button onclick="calcular()">CALCULAR</button>
<button onclick="guardarPedidoDirecto()">💾 GUARDAR</button>
</div>

</div>

<div id="resultadoBox"></div>
<div id="bendajeBox"></div>
<div id="totalCobrar" class="totalGrande"></div>

</div>
</div>

<script>

const SUPABASE_URL="https://vswostjubcxjotpqnzhk.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzd29zdGp1YmN4am90cHFuemhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTAyNDksImV4cCI6MjA4Nzg2NjI0OX0.VIWMJWyubtKj7QCoOybia_Fv2S4sjxFelQz9x1tZKBo";
const db = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let actualId=null;
let modo="promo";

/* CLIENTES */
let clientes=[{nombre:"AMPARO MOLINO ROA",tipo:"moto"}];

/* CARGAR PANEL */
async function cargar(){
let {data}=await db.from("pedidos").select("*");

let grid=document.getElementById("grid");
grid.innerHTML="";
let total=0;

clientes.forEach(c=>{
let p=data.find(x=>x.cliente===c.nombre);
let t=p?p.total:0;
if(t) total+=t;

grid.innerHTML+=`
<div class="card ${c.tipo}" onclick="abrir('${c.nombre}',${p?.id||0})">
<div class="x" onclick="event.stopPropagation();eliminar(${p?.id||0})">✖</div>
<h4>${c.nombre}</h4>
<p>$${t}</p>
</div>`;
});

document.getElementById("totalGeneral").innerText="TOTAL: $"+total;
}

function abrir(nombre,id){
actualId=id;
document.getElementById("modal").style.display="flex";
document.getElementById("clienteNombre").innerText=nombre;
}

function cerrar(){document.getElementById("modal").style.display="none";}
function tomarPedido(){document.getElementById("modalPedido").style.display="flex";}

/* PRODUCTOS */
const productos=[
{name:"PAN DE 2.000",precio:2000,b:true,img:""}
];

const div=document.getElementById("productos");

productos.forEach((p,i)=>{
div.innerHTML+=`
<div class='producto' id='prod${i}'>
<img src='https://via.placeholder.com/110'>
<div>
<b>${p.name}</b><br>
Cantidad:<input id='cant${i}' type='number'>
Dinero:<input id='din${i}' type='number'>
</div>
</div>`;
});

/* CALCULAR */
function calcular(){
let total=0;
let texto="";
productos.forEach((p,i)=>{
let cant=Number(document.getElementById('cant'+i).value)||0;

if(p.name==="PAN DE 2.000" && modo!=="original"){
if(cant>=3) {cant=3; total+=5000;}
else total+=cant*2000;
}else total+=cant*2000;

texto+=`${p.name} x${cant}\n`;
});

document.getElementById("resultadoBox").innerText=texto;
document.getElementById("totalCobrar").innerText="TOTAL: $"+total;
window.totalPedido=total;
window.textoPedido=texto;
}

/* GUARDAR */
async function guardarPedidoDirecto(){
await db.from("pedidos").update({
pedido:window.textoPedido,
total:window.totalPedido
}).eq("id",actualId);

document.getElementById("modalPedido").style.display="none";
document.getElementById("modal").style.display="none";
cargar();
}

function resetear(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("resultadoBox").innerText="";
document.getElementById("totalCobrar").innerText="";
}

function eliminar(id){
if(!id)return;
db.from("pedidos").delete().eq("id",id);
cargar();
}

function filtrar(txt){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(txt.toLowerCase())?"block":"none";
});
}

cargar();

</script>

</body>
</html>
