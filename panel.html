  if(Array.isArray(gastosMemoria)){gastosMemoria.forEach(function(g,idx){var ya=movs.some(function(m){return(m.origen==='cuota'||m.origen==='movContable')&&m.descripcion===(g.descripcion||'')&&m.monto===(Number(g.monto)||0);});if(ya)return;var fI='';if(g.fecha){var d=new Date(g.fecha);if(!isNaN(d.getTime()))fI=d.toISOString().slice(0,10);}if(!fI)fI=new Date().toISOString().slice(0,10);movs.push({fecha:fI,tipo:'gasto',categoria:g.categoria||'Gasto',descripcion:g.descripcion||'—',cuenta:g.cuenta||'Efectivo',monto:Number(g.monto)||0,origen:'gastoManual',origenIdx:idx});});}

// BORRAR MOVIMIENTO + REVERTIR EN CUENTAS
window.uHistBorrar=function(origen,idx){
  if(!confirm('¿Eliminar este movimiento? Se revertirá en las cuentas.'))return;
  if(origen==='gastoManual'&&Array.isArray(gastosMemoria)&&gastosMemoria[idx]){
    var g=gastosMemoria[idx];
    // Revertir en cuenta: devolver el dinero
    if(Array.isArray(cuentasMemoria)){
      var cN=(g.cuenta||'Efectivo').toUpperCase();
      var ci=cuentasMemoria.findIndex(function(c){return c.nombre.toUpperCase().indexOf(cN)>-1||(cN==='EFECTIVO'&&c.tipo==='EFECTIVO');});
      if(ci<0)ci=cuentasMemoria.findIndex(function(c){return c.tipo==='EFECTIVO';});
      if(ci>=0){cuentasMemoria[ci].saldo+=Number(g.monto)||0;cuentasGuardar();}
    }
    gastosMemoria.splice(idx,1);try{sessionStorage.setItem('gastos',JSON.stringify(gastosMemoria));}catch(e){}
  }
  else if((origen==='movContable'||origen==='cuota'||origen==='carteraPago')&&Array.isArray(movimientosContables)&&movimientosContables[idx]){
    var m=movimientosContables[idx];
    // Revertir en cuenta
    if(Array.isArray(cuentasMemoria)){
      var cN2=(m.cuenta||'Efectivo').toUpperCase();
      var ci2=cuentasMemoria.findIndex(function(c){return c.nombre.toUpperCase().indexOf(cN2)>-1||(cN2==='EFECTIVO'&&c.tipo==='EFECTIVO');});
      if(ci2<0)ci2=cuentasMemoria.findIndex(function(c){return c.tipo==='EFECTIVO';});
      if(ci2>=0){
        if((m.tipo||'').toLowerCase()==='ingreso')cuentasMemoria[ci2].saldo-=Number(m.monto)||0;
        else cuentasMemoria[ci2].saldo+=Number(m.monto)||0;
        cuentasGuardar();
      }
    }
    movimientosContables.splice(idx,1);
  }
  renderConta('historial');
};

async function _restarFacturasRandom(){

  var elegibles=res.data.filter(function(p){var total=Number(p.total)||0;if(total<=10000)return false;var est=estado[p.cliente]||{};if((Number(est.deudaCliente)||0)>0||(Number(est.deudaMia)||0)>0)return false;try{if(typeof recaudoGetDeudaHistorica==='function'){var h=recaudoGetDeudaHistorica(p.cliente);if(h.deudaCliente>0||h.deudaMia>0)return false;}}catch(e){}return true;});

}

(function () {
  'use strict';

  /* ── LEDGER PERSISTENTE ─────────────────────────────────────────────── */
  var LK = 'ledger_v3';
  function ledgerGuardar(mov) {
    try {
      var a = JSON.parse(localStorage.getItem(LK) || '[]');
      a.push(Object.assign({ id: Date.now() + '_' + Math.random().toString(36).slice(2,6), ts: new Date().toISOString() }, mov));
      localStorage.setItem(LK, JSON.stringify(a));
    } catch(e) {}
  }
  function ledgerLeer() { try { return JSON.parse(localStorage.getItem(LK) || '[]'); } catch(e) { return []; } }
  window.ledger = { guardar: ledgerGuardar, leer: ledgerLeer };

  /* ── PERSISTENCIA movimientosContables ─────────────────────────────── */
  var MK = 'movContables_v3';
  function movPersistir() {
    try { if (Array.isArray(window.movimientosContables)) localStorage.setItem(MK, JSON.stringify(window.movimientosContables)); } catch(e) {}
  }
  (function() {
    try {
      var raw = localStorage.getItem(MK);
      if (raw) { var a = JSON.parse(raw); if (Array.isArray(a) && a.length) window.movimientosContables = a; }
    } catch(e) {}
  })();

  /* ── CARTERA V3: Single Source of Truth ────────────────────────────── */
  var CK = 'cartera_v3';
  function cv3L() { try { return JSON.parse(localStorage.getItem(CK) || '{}'); } catch(e) { return {}; } }
  function cv3G(data) {
    try { localStorage.setItem(CK, JSON.stringify(data)); } catch(e) {}
    try {
      var v = JSON.parse(localStorage.getItem('cartera_deudas') || '{}');
      Object.keys(data).forEach(function(n) {
        v[n] = v[n] || {};
        v[n].deudasPagadas = data[n].pagado || 0;
        v[n].fechaPago = data[n].fechaUltimoPago || '—';
      });
      localStorage.setItem('cartera_deudas', JSON.stringify(v));
    } catch(e) {}
  }
  function cv3Cliente(nombre) {
    var c = cv3L();
    if (!c[nombre]) { c[nombre] = { total:0, pagado:0, leDebo:0, creadoEn: new Date().toISOString(), fechaUltimoPago:'—' }; cv3G(c); }
    return c[nombre];
  }
  function cv3Saldo(nombre) { var d = cv3Cliente(nombre); return Math.max((d.total||0)-(d.pagado||0), 0); }

  function cv3AgregarDeuda(nombre, monto, nota) {
    var c = cv3L();
    var d = c[nombre] || { total:0, pagado:0, leDebo:0, creadoEn:new Date().toISOString(), fechaUltimoPago:'—' };
    var antes = Math.max((d.total||0)-(d.pagado||0), 0);
    d.total = (d.total||0) + monto;
    c[nombre] = d; cv3G(c);
    var despues = Math.max(d.total-(d.pagado||0), 0);
    ledgerGuardar({ tipo:'deuda_nueva', nombre:nombre, monto:monto, saldoAntes:antes, saldoDespues:despues, nota:nota||'', modulo:'recaudo' });
    if (!Array.isArray(window.movimientosContables)) window.movimientosContables = [];
    window.movimientosContables.push({ tipo:'deuda', monto:monto, cuenta:'Cartera', categoria:'Deuda generada', descripcion:'Nueva deuda: '+nombre, fecha:new Date().toISOString() });
    movPersistir();
    return despues;
  }

  function cv3Abonar(nombre, monto, metodo, banco, cuentaIdx, nota) {
    var c = cv3L();
    var d = c[nombre] || { total:0, pagado:0, leDebo:0, creadoEn:new Date().toISOString(), fechaUltimoPago:'—' };
    var antes = Math.max((d.total||0)-(d.pagado||0), 0);
    var pagoReal = Math.min(monto, antes);
    if (pagoReal <= 0) return 0;
    d.pagado = (d.pagado||0) + pagoReal;
    d.fechaUltimoPago = new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});
    c[nombre] = d; cv3G(c);
    var despues = Math.max(d.total-d.pagado, 0);
    ledgerGuardar({ tipo:'abono_deuda', nombre:nombre, monto:pagoReal, metodo:metodo, banco:banco, saldoAntes:antes, saldoDespues:despues, nota:nota||'', modulo:'recaudo' });
    if (!Array.isArray(window.movimientosContables)) window.movimientosContables = [];
    window.movimientosContables.push({ tipo:'ingreso', monto:pagoReal, cuenta:banco||metodo||'Efectivo', categoria:'Cobro deuda', descripcion:'Pago deuda: '+nombre, fecha:new Date().toISOString() });
    movPersistir();
    return pagoReal;
  }

  function cv3EliminarDeuda(nombre) {
    var c = cv3L();
    if (!c[nombre]) return false;
    var antes = Math.max((c[nombre].total||0)-(c[nombre].pagado||0), 0);
    ledgerGuardar({ tipo:'deuda_eliminada', nombre:nombre, saldoAntes:antes, modulo:'cartera' });
    delete c[nombre];
    cv3G(c);
    try { var h = JSON.parse(localStorage.getItem('cartera_pagos_historial')||'[]'); h = h.filter(function(p){return p.cliente!==nombre;}); localStorage.setItem('cartera_pagos_historial', JSON.stringify(h)); } catch(e) {}
    try {
      var fk = 'recaudo_' + (typeof cajaFechaHoy==='function' ? cajaFechaHoy() : new Date().toISOString().split('T')[0]);
      var est = JSON.parse(localStorage.getItem(fk)||'{}');
      if (est[nombre]) { est[nombre].deudasPagadas=0; est[nombre].deudaMetodo=null; est[nombre].deudaBanco=null; localStorage.setItem(fk, JSON.stringify(est)); }
    } catch(e) {}
    return true;
  }

  window.carteraV3 = { leer:cv3L, cliente:cv3Cliente, saldo:cv3Saldo, agregarDeuda:cv3AgregarDeuda, abonar:cv3Abonar, eliminarDeuda:cv3EliminarDeuda };

  /* ── Migración única desde sistema antiguo ──────────────────────────── */
  if (!localStorage.getItem('cv3_migrado')) {
    try {
      var nuevas = cv3L();
      var acum = {};
      for (var _i=0; _i<localStorage.length; _i++) {
        var _k = localStorage.key(_i);
        if (_k && _k.startsWith('recaudo_')) {
          try {
            var _o = JSON.parse(localStorage.getItem(_k)||'{}');
            Object.keys(_o).forEach(function(n) {
              if (!acum[n]) acum[n] = { total:0, pagado:0 };
              acum[n].total += Number(_o[n].deudaCliente)||0;
            });
          } catch(e) {}
        }
      }
      try {
        var _vj = JSON.parse(localStorage.getItem('cartera_deudas')||'{}');
        Object.keys(_vj).forEach(function(n) {
          if (!acum[n]) acum[n] = { total:0, pagado:0 };
          acum[n].pagado = Number(_vj[n].deudasPagadas)||0;
        });
      } catch(e) {}
      Object.keys(acum).forEach(function(n) {
        if (!nuevas[n] && acum[n].total > 0) {
          nuevas[n] = { total:acum[n].total, pagado:acum[n].pagado, leDebo:0, creadoEn:new Date().toISOString(), fechaUltimoPago:'—' };
        }
      });
      cv3G(nuevas);
      localStorage.setItem('cv3_migrado','1');
      console.log('✅ Migración carteraV3 completada:', Object.keys(nuevas).length, 'clientes');
    } catch(e) { console.warn('Migración cv3:', e); }
  }

  /* ══════════════════════════════════════════════════════════════════════
     FIX 1 — recaudoGetDeudaHistorica: usa carteraV3 (no acumula días)
  ══════════════════════════════════════════════════════════════════════ */
  window.recaudoGetDeudaHistorica = function(nombre) {
    var saldo = cv3Saldo(nombre);
    var d = cv3Cliente(nombre);
    return { deudaCliente:saldo, deudaMia:Math.max(d.leDebo||0,0), deudasPagadas:d.pagado||0, fechaPago:d.fechaUltimoPago||'—' };
  };

  /* ══════════════════════════════════════════════════════════════════════
     FIX 2 — recaudoConstruirData: usar saldo real de carteraV3
  ══════════════════════════════════════════════════════════════════════ */
  var _origConstruir = window.recaudoConstruirData;
  window.recaudoConstruirData = async function() {
    var rows = typeof _origConstruir==='function' ? await _origConstruir.apply(this, arguments) : [];
    rows.forEach(function(row) {
      row.deudaCliente = cv3Saldo(row.cliente);
      var d = cv3Cliente(row.cliente);
      row.deudaMia = Math.max(d.leDebo||0, 0);

  };

  /* ══════════════════════════════════════════════════════════════════════
     FIX 3 — recaudoGuardarFilaNuevo: el input de deuda SUMA (no reemplaza)
     Llamado desde onblur del input rec_dc_
  ══════════════════════════════════════════════════════════════════════ */
  window.recaudoGuardarFilaNuevo = function(nombre) {
    var q = function(id){ return document.getElementById(id); };
    var getRaw = typeof getRawRecaudo==='function' ? getRawRecaudo : function(el){ if(!el)return 0; return Number((el.dataset.raw||el.value||'0').toString().replace(/\./g,'').replace(',','.'))||0; };

    // Leer lo que el usuario escribió en el input (nueva deuda del día)
    var safe = nombre.replace(/[^a-zA-Z0-9]/g,'_');
    var dcInput = q('rec_dc_' + safe);

    if (nuevaMonto > 0) {
      // Acumular en carteraV3
      cv3AgregarDeuda(nombre, nuevaMonto, 'Desde recaudo diario');

      var nuevoSaldo = cv3Saldo(nombre);

        dcInput.dataset.raw = '0';
        dcInput.placeholder = 'Saldo $' + nuevoSaldo.toLocaleString('es-CO');
      }
    }

    // Guardar el resto de campos normalmente

  };

  /* ══════════════════════════════════════════════════════════════════════
     FIX 4 — recaudoMarcarDeudaSaldada: usa saldo real de carteraV3
  ══════════════════════════════════════════════════════════════════════ */
  window.recaudoMarcarDeudaSaldada = function(nombre) {
    var saldoReal = cv3Saldo(nombre);
    var d = cv3Cliente(nombre);
    var leDebo = d.leDebo || 0;
    var safe = nombre.replace(/[^a-zA-Z0-9]/g,'_');
    var checkbox = document.getElementById('rec_deudasaldo_' + safe) || document.getElementById('rec_deuda_saldo_' + safe);
    var estaChecked = checkbox && checkbox.checked;

    if (estaChecked) {
      if (saldoReal > 0) {
        if (checkbox) checkbox.checked = false;
        if (typeof recaudoModalMetodoPago === 'function') recaudoModalMetodoPago(nombre, saldoReal);
      } else if (leDebo > 0) {
        if (confirm('Le debes $' + leDebo.toLocaleString('es-CO') + ' a ' + nombre + '.\n¿Descontar de la factura del día?')) {
          _descontarLeDebo(nombre, leDebo);
        } else { if (checkbox) checkbox.checked = false; }
      } else {
        if (checkbox) checkbox.checked = false;
        alert('Este cliente no tiene deuda pendiente.');
      }
    } else {
      if (confirm('¿Revertir el pago de deuda de ' + nombre + '?')) {
        recaudoRevertirPagoDeuda(nombre);
      } else { if (checkbox) checkbox.checked = true; }
    }
  };

  function _descontarLeDebo(nombre, monto) {
    var c = cv3L();
    if (c[nombre]) { c[nombre].leDebo = Math.max((c[nombre].leDebo||0)-monto, 0); cv3G(c); }
    var est = typeof recaudoLeerEstado==='function' ? recaudoLeerEstado() : {};
    if (!est[nombre]) est[nombre] = {};
    est[nombre].deudaMiaPagada = monto;
    if (typeof recaudoGuardarEstado==='function') recaudoGuardarEstado(est);
    ledgerGuardar({ tipo:'descuento_le_debo', nombre:nombre, monto:monto, modulo:'recaudo' });

  /* ══════════════════════════════════════════════════════════════════════

  window.recaudoConfirmarPago = function(nombre, _ignorado) {

      banco = 'Efectivo';

  window.cajaCalcularResumen = function(ventas, movimientos, sesion) {
    ventas = ventas||[]; movimientos = movimientos||[];
    var ventasTotal=0, ventasCount=ventas.length, efectivoVentas=0, transferencias=0, otros=0;
    ventas.forEach(function(v){
      var t=Number(v.total)||0, mp=(v.metodo_pago||'efectivo').toLowerCase();
      ventasTotal+=t;
      if(mp.indexOf('trans')>-1) transferencias+=t;
      else if(mp.indexOf('efec')>-1) efectivoVentas+=t;
      else otros+=t;
    });
    var ingresosExtra=0, egresos=0;
    movimientos.forEach(function(m){
      var val=Number(m.valor)||0, tipo=(m.tipo||'').toLowerCase(), orig=(m.origen||'').toLowerCase();
      // Ingresos de pago de deuda NO se suman al esperado de caja de ventas
      if(tipo==='ingreso' && orig!=='deuda' && orig!=='pago_deuda') ingresosExtra+=val;
      if(tipo==='egreso') egresos+=val;
    });
    // Efectivo real: desde recaudoCache si existe (ya excluye deudas)
    var cache = window.recaudoCache || window._recaudoCache;
    var baseEf = 0;
    if (cache && cache.resumen && cache.resumen.desglose) {
      baseEf = Number(cache.resumen.desglose.efectivoVentas || cache.resumen.netoEfectivo || 0);
    }
    if (baseEf <= 0) baseEf = efectivoVentas;
    var apertura = Number(sesion&&sesion.apertura_monto||0);
    var esperado = apertura + baseEf + ingresosExtra - egresos;
    var contado = Number(sesion&&sesion.cierre_monto_contado||0);
    var diferencia = contado ? contado-esperado : 0;
    return {
      ventas:ventasTotal, ventasCount:ventasCount, ticketPromedio:ventasCount?ventasTotal/ventasCount:0,
      ingresosExtra:ingresosExtra, egresos:egresos, esperado:esperado, contado:contado,
      diferencia:diferencia, efectivo:baseEf, transferencias:transferencias, otros:otros, saldoFinal:esperado
    };
  };
