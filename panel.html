<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
// ===== VARIABLES MÓDULO CUENTAS =====
let cuentasMemoria = [
  {nombre:"CUENTA BANCOLOMBIA", tipo:"CUENTA CORRIENTE", color:"teal", saldo:0},
  {nombre:"Efectivo", tipo:"EFECTIVO", color:"orange", saldo:0}
];
let transferenciasMem = [];

function tipoEmoji(tipo){
  const m={"CUENTA CORRIENTE":"🏛️","CUENTA DE AHORRO":"🐖","NEQUI":"📱","DAVIPLATA":"📱","EFECTIVO":"💵"};
  return m[tipo]||"💳";
}

function cuentaIndicePorMetodo(metodo){
  var m = String(metodo || "").toLowerCase();
  if(m.indexOf("efec") > -1){
    return cuentasMemoria.findIndex(function(c){ return String(c.tipo||"").toUpperCase() === "EFECTIVO"; });
  }
  if(m.indexOf("trans") > -1){
    return cuentasMemoria.findIndex(function(c){ return String(c.tipo||"").toUpperCase() !== "EFECTIVO"; });
  }
  return -1;
}

// ===== HELPER MODAL CUENTAS =====
function mostrarMC(contenido){
  let overlay = document.getElementById("mcOverlayGlobal");
  let box = document.getElementById("mcBoxGlobal");
  if(!overlay || !box){
    alert("No se encontró el modal global.");
    return;
  }
  box.innerHTML = contenido;
  overlay.style.display = "flex";
}

function cerrarMC(){
  let overlay = document.getElementById("mcOverlayGlobal");
  if(overlay) overlay.style.display = "none";
}

function abrirModalNuevaCuenta(){
  mostrarMC(
    '<h3>Nueva Cuenta</h3>'+
    '<div class="mc-field"><label>Nombre</label><input id="ncnombre" placeholder="Ej: Davivienda principal"></div>'+
    '<div class="mc-field"><label>Tipo</label>'+
      '<select id="nctipo">'+
        '<option>CUENTA CORRIENTE</option><option>CUENTA DE AHORRO</option>'+
        '<option>NEQUI</option><option>DAVIPLATA</option><option>EFECTIVO</option><option>OTRO</option>'+
      '</select>'+
    '</div>'+
    '<div class="mc-field"><label>Saldo inicial</label><input type="number" id="ncsaldo" value="0"></div>'+
    '<div class="mc-field"><label>Color</label>'+
      '<select id="nccolor">'+
        '<option value="teal">Teal</option><option value="orange">Naranja</option><option value="blue">Azul</option>'+
        '<option value="purple">Morado</option><option value="green">Verde</option><option value="gray">Gris</option><option value="red">Rojo</option>'+
      '</select>'+
    '</div>'+
    '<div class="mc-btns"><button class="mc-btn-cancel" onclick="cerrarMC()">Cancelar</button><button class="mc-btn-ok" onclick="confirmarNuevaCuenta()">Crear cuenta</button></div>'
  );
}

function confirmarNuevaCuenta(){
  let nombre = document.getElementById("ncnombre")?.value.trim();
  let tipo = document.getElementById("nctipo")?.value || "OTRO";
  let saldo = Number(document.getElementById("ncsaldo")?.value || 0);
  let color = document.getElementById("nccolor")?.value || "teal";
  if(!nombre){
    alert("Ingresa un nombre para la cuenta.");
    return;
  }
  cuentasMemoria.push({nombre:nombre, tipo:tipo, color:color, saldo:saldo});
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

function abrirEditarCuenta(i){
  let c = cuentasMemoria[i];
  if(!c) return;
  let tipos = ["CUENTA CORRIENTE","CUENTA DE AHORRO","NEQUI","DAVIPLATA","EFECTIVO","OTRO"].map(function(t){
    return '<option '+(t===c.tipo?'selected':'')+'>'+t+'</option>';
  }).join("");
  let colores = [["teal","Teal"],["gray","Gris"],["blue","Azul"],["purple","Morado"],["orange","Naranja"],["green","Verde"],["red","Rojo"]].map(function(p){
    return '<option value="'+p[0]+'" '+(p[0]===c.color?'selected':'')+'>'+p[1]+'</option>';
  }).join("");
  mostrarMC(
    '<h3>Editar cuenta</h3>'+
    '<div class="mc-field"><label>Nombre</label><input id="ecnombre" value="'+(c.nombre||"")+'"></div>'+
    '<div class="mc-field"><label>Tipo</label><select id="ectipo">'+tipos+'</select></div>'+
    '<div class="mc-field"><label>Saldo actual</label><input type="number" id="ecsaldo" value="'+(Number(c.saldo)||0)+'"></div>'+
    '<div class="mc-field"><label>Color</label><select id="eccolor">'+colores+'</select></div>'+
    '<div class="mc-btns"><button class="mc-btn-cancel" onclick="cerrarMC()">Cancelar</button><button class="mc-btn-ok" onclick="confirmarEditarCuenta('+i+')">Guardar</button></div>'
  );
}

function confirmarEditarCuenta(i){
  if(!cuentasMemoria[i]) return;
  let nombre = document.getElementById("ecnombre")?.value.trim();
  if(!nombre){
    alert("El nombre no puede estar vacío.");
    return;
  }
  cuentasMemoria[i].nombre = nombre;
  cuentasMemoria[i].tipo = document.getElementById("ectipo")?.value || cuentasMemoria[i].tipo;
  cuentasMemoria[i].saldo = Number(document.getElementById("ecsaldo")?.value || 0);
  cuentasMemoria[i].color = document.getElementById("eccolor")?.value || cuentasMemoria[i].color;
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

function eliminarCuenta(i){
  if(!cuentasMemoria[i]) return;
  if(!confirm("¿Eliminar la cuenta " + cuentasMemoria[i].nombre + "?")) return;
  cuentasMemoria.splice(i, 1);
  cuentasGuardar();
  renderConta("cuentas");
}

function abrirModalTransferir(){
  if(cuentasMemoria.length < 2){
    alert("Necesitas al menos 2 cuentas.");
    return;
  }
  let opciones = cuentasMemoria.map(function(c, i){
    return '<option value="'+i+'">'+c.nombre+' — $'+(Number(c.saldo)||0).toLocaleString("es-CO")+'</option>';
  }).join("");
  mostrarMC(
    '<h3>Transferir entre cuentas</h3>'+
    '<div class="mc-field"><label>Cuenta origen</label><select id="tforigen">'+opciones+'</select></div>'+
    '<div class="mc-field"><label>Cuenta destino</label><select id="tfdestino">'+opciones+'</select></div>'+
    '<div class="mc-field"><label>Monto</label><input id="tfmonto" type="number" placeholder="Ej: 50000"></div>'+
    '<div class="mc-btns"><button class="mc-btn-cancel" onclick="cerrarMC()">Cancelar</button><button class="mc-btn-ok verde" onclick="confirmarTransferencia()">Transferir</button></div>'
  );
}

function confirmarTransferencia(){
  let ori = Number(document.getElementById("tforigen")?.value);
  let dest = Number(document.getElementById("tfdestino")?.value);
  let monto = Number(document.getElementById("tfmonto")?.value || 0);
  if(ori===dest){
    alert("El origen y destino deben ser diferentes.");
    return;
  }
  if(monto<=0){
    alert("Ingresa un monto válido.");
    return;
  }
  if(!cuentasMemoria[ori] || !cuentasMemoria[dest]) return;
  if(Number(cuentasMemoria[ori].saldo||0) < monto){
    alert("Saldo insuficiente en la cuenta origen.");
    return;
  }
  cuentasMemoria[ori].saldo -= monto;
  cuentasMemoria[dest].saldo += monto;
  transferenciasMem.push({
    origen: cuentasMemoria[ori].nombre,
    destino: cuentasMemoria[dest].nombre,
    monto: monto,
    fecha: new Date().toLocaleDateString("es-CO",{day:"numeric",month:"long",year:"numeric"})
  });
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

function abrirConciliar(i){
  let c = cuentasMemoria[i];
  if(!c) return;
  mostrarMC(
    '<h3>Conciliar '+c.nombre+'</h3>'+
    '<div class="conciliar-saldo-box"><p>Saldo en sistema</p><div class="csval">$'+(Number(c.saldo)||0).toLocaleString("es-CO")+'</div></div>'+
    '<div class="mc-field"><label>Saldo real (banco / físico)</label><input id="concreal" type="number" oninput="calcDiff('+i+')" placeholder="Ingresa el saldo real"></div>'+
    '<div id="concdiff" style="font-size:13px;margin-bottom:8px;color:#94a3b8;min-height:20px;"></div>'+
    '<div class="mc-btns"><button class="mc-btn-cancel" onclick="cerrarMC()">Cerrar</button><button class="mc-btn-ok verde" onclick="aplicarConciliacion('+i+')">Actualizar saldo</button></div>'
  );
}

function calcDiff(i){
  let real = Number(document.getElementById("concreal")?.value || 0);
  let diff = real - Number(cuentasMemoria[i]?.saldo || 0);
  let el = document.getElementById("concdiff");
  if(!el) return;
  if(diff === 0){
    el.innerHTML = '<span style="color:#4ade80;font-weight:700">✓ Sin diferencia, todo cuadra</span>';
  }else{
    el.innerHTML = '<span style="color:#fbbf24;font-weight:700">Diferencia: '+(diff>0?'+':'')+diff.toLocaleString("es-CO")+'</span>';
  }
}

function aplicarConciliacion(i){
  if(!cuentasMemoria[i]) return;
  let val = document.getElementById("concreal")?.value;
  if(val === ""){
    alert("Ingresa el saldo real.");
    return;
  }
  cuentasMemoria[i].saldo = Number(val || 0);
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

// ===== TRANSFERIR =====
function abrirModalTransferir(){
  if(cuentasMemoria.length < 2){ alert("Necesitas al menos 2 cuentas para transferir"); return; }
  let opts  = cuentasMemoria.map((c,i) => `<option value="${i}">${c.nombre} — $${Number(c.saldo).toLocaleString("es-CO")}</option>`).join("");
  let optsD = cuentasMemoria.map((c,i) => `<option value="${i}" ${i===1?"selected":""}>${c.nombre} — $${Number(c.saldo).toLocaleString("es-CO")}</option>`).join("");
  mostrarMC(`
    <h3>Transferir entre cuentas</h3>
    <div class="mc-field"><label>Cuenta origen</label><select id="tforigen">${opts}</select></div>
    <div class="mc-field"><label>Cuenta destino</label><select id="tfdestino">${optsD}</select></div>
    <div class="mc-field"><label>Monto</label><input type="number" id="tfmonto" placeholder="Ej: 50000"></div>
    <div class="mc-btns">
      <button class="mc-btn-cancel" onclick="cerrarMC()">Cancelar</button>
      <button class="mc-btn-ok verde" onclick="confirmarTransferencia()">Transferir</button>
    </div>
  `);
}

function confirmarTransferencia(){
  let ori   = Number(document.getElementById("tforigen").value);
  let dest  = Number(document.getElementById("tfdestino").value);
  let monto = Number(document.getElementById("tfmonto").value)||0;
  if(ori===dest){ alert("El origen y destino deben ser distintos"); return; }
  if(monto<=0){   alert("Ingresa un monto válido mayor a 0"); return; }
  if(cuentasMemoria[ori].saldo < monto){ alert("Saldo insuficiente en la cuenta origen"); return; }
  cuentasMemoria[ori].saldo  -= monto;
  cuentasMemoria[dest].saldo += monto;
  let fecha = new Date().toLocaleDateString("es-CO",{day:"numeric",month:"long",year:"numeric"});
  transferenciasMem.push({
    origen:  cuentasMemoria[ori].nombre,
    destino: cuentasMemoria[dest].nombre,
    monto, fecha
  });
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

// ===== CONCILIAR =====
function abrirConciliar(i){
  let c = cuentasMemoria[i];
  mostrarMC(`
    <h3>Conciliar ${c.nombre}</h3>
    <div class="conciliar-saldo-box">
      <p>Saldo en sistema</p>
      <div class="csval">$${Number(c.saldo).toLocaleString("es-CO")}</div>
    </div>
    <div class="mc-field">
      <label>Saldo real (banco / físico)</label>
      <input type="number" id="concreal" placeholder="Ingresa el saldo real"
        oninput="calcDiff(${i})">
    </div>
    <div id="concdiff" style="font-size:13px;margin-bottom:8px;color:#94a3b8;min-height:20px;"></div>
    <div class="mc-btns">
      <button class="mc-btn-cancel" onclick="cerrarMC()">Cerrar</button>
      <button class="mc-btn-ok verde" onclick="aplicarConciliacion(${i})">Actualizar saldo</button>
    </div>
  `);
}

function calcDiff(i){
  let real = Number(document.getElementById("concreal").value)||0;
  let diff = real - cuentasMemoria[i].saldo;
  let el   = document.getElementById("concdiff");
  if(!el) return;
  if(diff===0) el.innerHTML = `<span style="color:#4ade80;font-weight:700">✓ Sin diferencia, todo cuadra</span>`;
  else el.innerHTML = `<span style="color:#fbbf24;font-weight:700">Diferencia: ${diff>0?"+":""}${diff.toLocaleString("es-CO")}</span>`;
}

function aplicarConciliacion(i){
  let val = document.getElementById("concreal").value;
  if(!val){ alert("Ingresa el saldo real"); return; }
  cuentasMemoria[i].saldo = Number(val)||0;
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

// ===== ELIMINAR GASTO (descuenta de cuenta) =====
function eliminarGasto(i){
  if(!Array.isArray(gastosMemoria)) gastosMemoria = [];
  let g = gastosMemoria[i];
  if(g && g.cuentaIdx >= 0 && cuentasMemoria[g.cuentaIdx]){
    cuentasMemoria[g.cuentaIdx].saldo += Number(g.monto)||0;
    cuentasGuardar();
  }
  let g = gastosMemoria[i];
  // Revertir el descuento de la cuenta si tiene cuentaIdx
  if(g && g.cuentaIdx >= 0 && cuentasMemoria[g.cuentaIdx]){
    cuentasMemoria[g.cuentaIdx].saldo += Number(g.monto)||0;
    cuentasGuardar();
  }
  gastosMemoria.splice(i,1);
  try{ sessionStorage.setItem("gastos", JSON.stringify(gastosMemoria)); }catch(e){}
  renderConta("resumen");
}

.producto.activo-din { background: #d4e4ff; }

.panel-botones { position: sticky; top: 10px; }

#resultadoBox, #bendajeBox {
  background: #f9f9f9; padding: 10px; border-radius: 10px;
  margin-top: 10px; white-space: pre-line;
}
#bendajeBox { background: #fff3cd; }

.video-sidebar { display: flex; justify-content: center; align-items: center; margin-top: 195px; }

#meDebeValor::placeholder { color: red; font-weight: bold; }
#leDeboValor::placeholder { color: blue; font-weight: bold; }

/* ===== SIDEBAR MODULE BUTTONS ===== */
.module-btns {
  display: flex; flex-direction: column; gap: var(--space-2);
  margin-top: var(--space-3); padding-top: var(--space-3);
  border-top: 1px solid rgba(255,255,255,0.12);
}

.module-btn {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  color: #e2e8f0; font-size: var(--text-sm);
  font-family: var(--font-body); font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  text-align: left;
}
.module-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.22);
  transform: translateX(2px);
}
.module-btn svg { flex-shrink: 0; opacity: 0.85; }
.module-btn.stats-btn { border-left: 3px solid var(--clr-accent); }
.module-btn.conta-btn { border-left: 3px solid var(--clr-accent3); }
.module-btn.recaudo-btn{
  border-left: 3px solid #f59e0b;
}
/* ===== OVERLAY PANEL ===== */
.overlay-panel {
  position: fixed; top: 0; right: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  display: none; z-index: 200;
  align-items: stretch; justify-content: flex-end;
}
.overlay-panel.open { display: flex; }

.panel-drawer {
  width: min(860px, 94vw);
  background: var(--clr-panel-bg);
  color: var(--clr-panel-text);
  height: 100%; overflow-y: auto;
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  animation: slideIn 0.32s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-5) var(--space-6);
  background: var(--clr-panel-surface);
  border-bottom: 1px solid var(--clr-panel-border);
  position: sticky; top: 0; z-index: 10;
}
.panel-header h2 {
  font-size: var(--text-lg); font-weight: 700; color: var(--clr-panel-text);
  display: flex; align-items: center; gap: var(--space-2);
}
.panel-close {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: var(--clr-panel-muted); border-radius: var(--radius-md);
  padding: var(--space-1) var(--space-3); cursor: pointer; font-size: var(--text-sm);
  transition: all var(--transition);
}
.panel-close:hover { background: rgba(255,255,255,0.15); color: white; }

.panel-body { padding: var(--space-5) var(--space-6); flex: 1; }

/* ===== FILTER TABS ===== */
.filter-tabs {
  display: flex; gap: var(--space-2); margin-bottom: var(--space-5);
  flex-wrap: wrap;
}
.ftab {
  padding: var(--space-1) var(--space-4);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-full); color: var(--clr-panel-muted);
  font-size: var(--text-xs); cursor: pointer; transition: all var(--transition);
  font-family: var(--font-body); font-weight: 500;
}
.ftab.active, .ftab:hover {
  background: var(--clr-accent); border-color: var(--clr-accent);
  color: white;
}

/* ===== KPI CARDS ===== */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: var(--space-3); margin-bottom: var(--space-5);
}
.kpi-card {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
}
.kpi-card.green::before { background: var(--clr-success); }
.kpi-card.blue::before { background: var(--clr-info); }
.kpi-card.orange::before { background: var(--clr-warning); }
.kpi-card.purple::before { background: var(--clr-accent4); }

.kpi-label {
  font-size: var(--text-xs); color: var(--clr-panel-muted);
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  margin-bottom: var(--space-1);
}
.kpi-value {
  font-size: var(--text-xl); font-weight: 700;
  font-variant-numeric: tabular-nums lining-nums;
  line-height: 1.1; color: white;
}
.kpi-delta {
  font-size: var(--text-xs); margin-top: var(--space-1); font-weight: 500;
}
.kpi-delta.up { color: var(--clr-success); }
.kpi-delta.down { color: var(--clr-error); }
.kpi-delta.neutral { color: var(--clr-panel-muted); }

/* ===== CHART CONTAINERS ===== */
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);
  margin-bottom: var(--space-5);
}
@media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);
}
.chart-card.full-w { grid-column: 1 / -1; }
.chart-title {
  font-size: var(--text-sm); font-weight: 600;
  color: var(--clr-panel-text); margin-bottom: var(--space-3);
}
.chart-wrap { position: relative; height: 200px; }
.chart-wrap.tall { height: 260px; }

/* ===== TOP LISTS ===== */
.top-list { display: flex; flex-direction: column; gap: var(--space-2); }
.top-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-2) 0; border-bottom: 1px solid var(--clr-panel-border);
}
.top-item:last-child { border-bottom: none; }
.top-rank {
  width: 22px; height: 22px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.08); color: var(--clr-panel-muted);
  font-size: var(--text-xs); font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.top-rank.gold { background: var(--clr-warning); color: white; }
.top-name { flex: 1; font-size: var(--text-sm); color: var(--clr-panel-text); font-weight: 500; }
.top-val {
  font-size: var(--text-sm); font-weight: 700; color: white;
  font-variant-numeric: tabular-nums;
}
.top-bar-wrap {
  height: 3px; background: rgba(255,255,255,0.08);
  border-radius: var(--radius-full); overflow: hidden; width: 60px;
}
.top-bar { height: 100%; background: var(--clr-accent); border-radius: var(--radius-full); }

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: var(--text-sm); font-weight: 700; color: var(--clr-panel-muted);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: var(--space-3); margin-top: var(--space-5);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--clr-panel-border);
}
.section-title:first-child { margin-top: 0; }

/* ===== CONTABILIDAD ===== */
.conta-kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: var(--space-3); margin-bottom: var(--space-5);
}

.gasto-form {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);
  margin-bottom: var(--space-4);
}
.gasto-form h3 { font-size: var(--text-sm); font-weight: 600; color: var(--clr-panel-text); margin-bottom: var(--space-3); }
.gasto-row { display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: flex-end; margin-bottom: var(--space-2); }
.gasto-row input, .gasto-row select {
  flex: 1; min-width: 120px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-md); color: var(--clr-panel-text);
  padding: var(--space-2) var(--space-3); font-size: var(--text-sm);
  font-family: var(--font-body);
}
.gasto-row input::placeholder { color: var(--clr-panel-muted); }
.btn-add-gasto {
  background: var(--clr-warning); border: none;
  color: white; padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md); font-size: var(--text-sm);
  font-family: var(--font-body); font-weight: 600; cursor: pointer;
  transition: all var(--transition);
}
.btn-add-gasto:hover { filter: brightness(1.15); }

.gastos-list { display: flex; flex-direction: column; gap: var(--space-2); }
.gasto-item {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-lg); padding: var(--space-2) var(--space-3);
  font-size: var(--text-sm);
}
.gasto-item span:first-child { color: var(--clr-panel-text); }
.gasto-cat { color: var(--clr-panel-muted); font-size: var(--text-xs); margin-left: var(--space-1); }
.gasto-monto { font-weight: 700; color: var(--clr-error); font-variant-numeric: tabular-nums; }
.gasto-del { background: none; border: none; color: var(--clr-panel-muted); cursor: pointer; font-size: 13px; margin-left: var(--space-2); }
.gasto-del:hover { color: var(--clr-error); }

.utilidad-box {
  background: linear-gradient(135deg, rgba(22,163,74,0.15), rgba(22,163,74,0.05));
  border: 1px solid rgba(22,163,74,0.3);
  border-radius: var(--radius-xl); padding: var(--space-5);
  text-align: center; margin-top: var(--space-4);
}
.utilidad-label { color: var(--clr-panel-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.utilidad-val { font-size: var(--text-xl); font-weight: 800; color: var(--clr-success); font-variant-numeric: tabular-nums; margin: var(--space-2) 0; }
.utilidad-val.negative { color: var(--clr-error); }
.utilidad-margen { font-size: var(--text-sm); color: var(--clr-panel-muted); }

/* ===== LOADING / EMPTY STATES ===== */
.loading-skeleton {
  display: flex; flex-direction: column; gap: var(--space-3);
  padding: var(--space-8) 0;
}
@keyframes shimmer {
  0%{background-position:-200% 0} 100%{background-position:200% 0}
}
.skel {
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
  border-radius: var(--radius-md);
}
.skel-h { height: 80px; }
.skel-c { height: 200px; }
.skel-l { height: 40px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: var(--space-12) var(--space-8); color: var(--clr-panel-muted);
  text-align: center;
}
.empty-state svg { margin-bottom: var(--space-4); opacity: 0.4; }
.empty-state p { font-size: var(--text-sm); max-width: 28ch; }

/* ===== MÓDULO CUENTAS ===== */
.cuentas-tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:12px;}
.ctab{padding:4px 16px;background:none;border:none;color:#94a3b8;font-size:14px;font-family:var(--font-body);font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-13px;transition:all 180ms;}
.ctab.active{color:white;border-bottom-color:#16a34a;}
.ctab:hover:not(.active){color:#e2e8f0;}
.cuentas-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:560px){.cuentas-grid{grid-template-columns:1fr;}}
.cuenta-card{border-radius:12px;overflow:hidden;background:#1e293b;border:1px solid rgba(255,255,255,0.08);transition:box-shadow 180ms;}
.cuenta-card:hover{box-shadow:0 12px 32px rgba(0,0,0,0.4);}
.cuenta-header{padding:16px 16px 12px;position:relative;overflow:hidden;min-height:90px;display:flex;flex-direction:column;justify-content:space-between;}

.cuenta-header-row{display:flex;align-items:center;justify-content:space-between;}
.cuenta-tipo-badge{font-size:10px;font-weight:700;letter-spacing:0.08em;color:rgba(255,255,255,0.85);text-transform:uppercase;}
.cuenta-nombre{font-size:20px;font-weight:800;color:white;margin-top:8px;line-height:1.1;position:relative;z-index:1;}
.cuenta-body{padding:12px 16px 16px;}
.cuenta-saldo-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:4px;}
.cuenta-saldo-val{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:800;font-variant-numeric:tabular-nums;color:#16a34a;margin-bottom:12px;line-height:1;}
.cuenta-saldo-val.cero{color:#94a3b8;}
.cuenta-saldo-val.negativo{color:#f87171;}
.cuenta-acciones{display:flex;gap:8px;flex-wrap:wrap;}
.btn-cuenta{flex:1;min-width:70px;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:10px;color:#94a3b8;font-size:12px;font-family:var(--font-body);font-weight:600;cursor:pointer;transition:all 180ms;}
.btn-cuenta:hover{background:rgba(255,255,255,0.12);color:white;}
.btn-cuenta.peligro:hover{background:rgba(220,38,38,0.2);color:#f87171;border-color:rgba(220,38,38,0.3);}

.cuenta-card[data-color="orange"] .cuenta-header{background:linear-gradient(135deg,#d97706,#f59e0b);}
.cuenta-card[data-color="green"] .cuenta-header{background:linear-gradient(135deg,#059669,#10b981);}
.cuenta-card[data-color="teal"] .cuenta-header{background:linear-gradient(135deg,#0891b2,#06b6d4);}
.cuenta-card[data-color="red"] .cuenta-header{background:linear-gradient(135deg,#dc2626,#ef4444);}
.cuentas-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.cuentas-page-title{font-size:20px;font-weight:800;color:white;display:flex;align-items:center;gap:8px;}
.cuentas-page-subtitle{font-size:12px;color:#94a3b8;margin-top:2px;}
.cuentas-header-btns{display:flex;gap:8px;}

.btn-transferir:hover{background:rgba(255,255,255,0.15);}
.btn-nueva-cuenta{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#7c3aed;border:none;border-radius:10px;color:white;font-size:13px;font-family:var(--font-body);font-weight:600;cursor:pointer;transition:all 180ms;}
.btn-nueva-cuenta:hover{filter:brightness(1.15);}
.saldo-total-banner{background:linear-gradient(135deg,rgba(124,58,237,0.18),rgba(37,99,235,0.10));border:1px solid rgba(124,58,237,0.25);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.saldo-total-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.07em;font-weight:600;}
.saldo-total-val{font-size:clamp(1.3rem,3vw,1.8rem);font-weight:800;color:white;font-variant-numeric:tabular-nums;}
.transferencias-list{display:flex;flex-direction:column;}
.transferencia-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);transition:background 180ms;}

.transf-ruta{font-size:13px;color:#e2e8f0;font-weight:500;display:flex;align-items:center;gap:6px;}

.transf-fecha{font-size:11px;color:#94a3b8;text-align:right;margin-top:2px;}
.mc-overlay-box{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:600;display:flex;align-items:center;justify-content:center;}

.mc-btn-ok:hover{filter:brightness(1.15);}
.mc-btn-cancel{padding:10px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:10px;color:#94a3b8;font-size:13px;font-family:var(--font-body);cursor:pointer;transition:all 180ms;}

.conciliar-saldo-box{background:rgba(37,99,235,0.12);border:1px solid rgba(37,99,235,0.25);border-radius:10px;padding:12px 16px;margin-bottom:12px;}

.conciliar-saldo-box .csval{font-size:22px;font-weight:800;color:white;font-variant-numeric:tabular-nums;}

  margin-bottom:18px;
}
.recaudo-table-wrap{

.recaudo-badge{

.recaudo-badge.auto{ background:rgba(59,130,246,.15); color:#60a5fa; }
.recaudo-badge.recoge{ background:rgba(245,158,11,.15); color:#fbbf24; }
.recaudo-badge.lejano{ background:rgba(168,85,247,.15); color:#c084fc; }

.recaudo-check{

}
.recaudo-btns{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;

async function cargar(){
  let fechaInput = document.getElementById("fecha");
  if(!fechaInput.value) fechaInput.value = new Date().toISOString().split("T")[0];
  let fechaSeleccionada = fechaInput.value;
  let data = [];
  try {
    let res = await db.from("pedidos").select("*").eq("fecha", fechaSeleccionada);
    if(!res.error) data = res.data || [];
  } catch(e){ data = []; }

  let total = 0;
  let grid = document.getElementById("grid");
  grid.innerHTML = "";
  if(!clientes || clientes.length === 0){
    grid.innerHTML = "<h3 style='color:red'>No hay clientes cargados</h3>";
    return;
  }
  clientes.forEach(c => {
    let p = data.find(x => x.cliente === c.nombre) || null;
    let t = p ? Number(p.total) || 0 : 0;
    total += t;
    grid.innerHTML += `
    <div class="card ${c.tipo} ${p ? (p.editado ? 'editado' : 'nuevo') : ''}"
      onclick="abrir('${c.nombre}', ${p?.id || 0})">
      <div class="printMini" onclick="event.stopPropagation();imprimirDirecto('${c.nombre}')">🖨️</div>
      <div class="x" onclick="event.stopPropagation();eliminar(${p?.id||0},'${c.nombre}')">✖</div>
      <h4>${c.nombre}</h4>
      <p>$${t.toLocaleString('es-CO')}</p>
    </div>`;
  });
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

async function abrir(nombre,id){
  clienteActivo = nombre;

  actualId = id || null;
  document.getElementById("clienteTitulo").innerText = nombre;
  document.getElementById("modalPedido").style.display = "flex";
  renderProductos();
  if(!id) resetear();
  document.getElementById("comentarios").value = "";
  let fechaSeleccionada = document.getElementById("fecha").value;
  let { data, error } = await db.from("pedidos").select("*").eq("cliente",nombre).eq("fecha",fechaSeleccionada);
  if(error){ console.error(error); return; }
  if(data && data.length > 0) data = data[data.length-1]; else data = null;
  if(data){
    if(data.productos && Array.isArray(data.productos)){
      data.productos.forEach(prodGuardado => {
        let index = productos.findIndex(p => p.name === prodGuardado.nombre);
        if(index !== -1){
          let cantInput = document.getElementById("cant"+index);
          let dinInput = document.getElementById("din"+index);
          if(cantInput) cantInput.value = prodGuardado.cantidad || "";
          if(dinInput) dinInput.value = prodGuardado.dinero || "";
          marcar(index);
        }
      });
    }
    window.totalPedido = data.total;
    window.textoPedido = data.pedido;
    document.getElementById("resultadoBox").innerText = data.pedido;
    document.getElementById("comentarios").value = data.comentario || "";
    clienteActivo = nombre;
    document.querySelectorAll(".cantidad").forEach(i => i.value = "");
    document.querySelectorAll(".precio").forEach(i => i.value = "");
  }
}

function calcular(){
  let total = 0;
  let texto = "";
  let bendaje = "BENDAJE:\n";
  productos.forEach((p,i) => {
    let cantInput = document.getElementById("cant"+i);
    let dinInput = document.getElementById("din"+i);
    if(!cantInput || !dinInput) return;
    let cant = Number(cantInput.value) || 0;
    let din = Number(limpiarFormato(dinInput.value)) || 0;
    let precio = p.precio;
    if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
    if(modo==="tiberio" && p.name==="PAN QUESILLO (1.200)") precio=1000;
    let panes=0,subtotal=0;
    if(p.name==="PAN DE 2.000" && modo!=="original"){
      if(din>0){
        if(din>=5000&&din<6000){panes=3;subtotal=5000;}
        else if(din>=14000&&din<20000){panes=9;subtotal=15000;}
        else{panes=Math.floor(din/precio);subtotal=panes*precio;}
      } else if(cant>0){
        if(cant===3){panes=3;subtotal=5000;}
        else if(cant>=7&&cant<=9){panes=9;subtotal=15000;}
        else{panes=cant;subtotal=panes*precio;}
      }
    } else {
      if(din>0) panes=Math.floor(din/precio); else if(cant>0) panes=cant;
      subtotal=panes*precio;
    }
    if(subtotal>0){
      let b=0;
      if(p.name.trim()==="PAN DE 3.500") b=0;
      else if(p.name.trim()==="PAN DE 2.000"){
        if(modo!=="original"&&(panes===3||panes===7||panes===8||panes===9)) b=0;
        else b=Math.round(panes*0.2);
      } else b=p.b?Math.round(panes*0.2):0;
      bendaje+=`${p.name}: ${b}\n`;
      total+=subtotal;
      texto+="------------------------------\n";
      texto+=`${p.name} x ${panes} =$${subtotal.toLocaleString('es-CO')}\n`;
      texto+=`Bendaje: ${b}\n`;
    }
  });
  document.getElementById("resultadoBox").innerText=texto;
  document.getElementById("bendajeBox").innerText=bendaje;
  window.totalPedido=total;
  window.bendajePedido=bendaje;
  let leDebo=document.getElementById("leDebo")?.checked;
  let meDebeCheck=document.getElementById("meDebeCheck")?.checked;
  let meDebeValor=Number(document.getElementById("meDebeValor")?.value)||0;
  let leDeboValor=Number(document.getElementById("leDeboValor")?.value)||0;
  let totalFinal=total;
  if(leDebo&&leDeboValor>0) totalFinal-=leDeboValor;
  if(meDebeCheck&&meDebeValor>0) totalFinal+=meDebeValor;
  let textoFinal=leDebo?"SALDO A FAVOR: $"+Math.abs(totalFinal).toLocaleString('es-CO'):"COBRAR: $"+totalFinal.toLocaleString('es-CO');
  document.getElementById("totalFinal").innerText=textoFinal;
  window.totalFinal=totalFinal;
  window.textoPedido=texto;
  window.bendajePedido=bendaje;
}

async function guardar(){
  if(!actualCliente){alert("No hay cliente activo");return;}
  let fechaInput=document.getElementById("fecha");
  let fecha=fechaInput.value;
  if(!fecha){fecha=new Date().toISOString().split("T")[0];fechaInput.value=fecha;}
  let total=0,texto="",listaProductos=[];
  productos.forEach((p,i)=>{
    let cant=Number(document.getElementById("cant"+i)?.value)||0;
    let din=Number(limpiarFormato(document.getElementById("din"+i)?.value||"0"))||0;
    let precio=p.precio;
    if(modo==="alexa"&&p.name==="PAN DE 3.500") precio=3000;
    if(modo==="tiberio"&&p.name==="PAN QUESILLO (1.200)") precio=1000;
    let panes=0,subtotal=0;
    if(p.name==="PAN DE 2.000"&&modo!=="original"){
      if(din>0){if(din>=5000&&din<6000){panes=3;subtotal=5000;}else if(din>=14000&&din<20000){panes=9;subtotal=15000;}else{panes=Math.floor(din/precio);subtotal=panes*precio;}}
      else if(cant>0){if(cant===3){panes=3;subtotal=5000;}else if(cant>=7&&cant<=9){panes=9;subtotal=15000;}else{panes=cant;subtotal=panes*precio;}}
    } else {
      if(din>0) panes=Math.floor(din/precio); else if(cant>0) panes=cant;
      subtotal=panes*precio;
    }
    if(cant>0||din>0) listaProductos.push({nombre:p.name,cantidad:cant,dinero:din});
    if(subtotal>0){total+=subtotal;texto+=`\n${p.name} x${panes} = $${subtotal}\n`;}
  });
  let comentario=document.getElementById("comentarios").value||"";
  if(actualId){
    let{error}=await db.from("pedidos").update({total,pedido:texto,comentario,productos:listaProductos,editado:true}).eq("id",actualId);
    if(error){console.error(error);alert("Error al actualizar");return;}
  } else {
    let{error}=await db.from("pedidos").insert([{cliente:actualCliente,fecha,total,pedido:texto,comentario,productos:listaProductos,editado:false}]);
    if(error){console.error(error);alert("Error al guardar");return;}
  }
  cerrarModal(); cargar();
}

async function cargarStats(filtro){
  let hoy = new Date();
  let fechaHoy = cajaFechaHoy();
  let fechaInicio, fechaFin = fechaHoy;

  if(filtro==="hoy"){
    fechaInicio = fechaHoy;
  }else if(filtro==="semana"){
    let d = new Date(fechaHoy+"T00:00:00");
    d.setDate(d.getDate()-6);
    fechaInicio = d.toISOString().split("T")[0];
  }else if(filtro==="mes"){
    fechaInicio = fechaHoy.slice(0,7) + "-01";
  }else if(filtro==="custom"){
    let d1 = document.getElementById("filtroDesde")?.value;
    let d2 = document.getElementById("filtroHasta")?.value;
    if(!d1 || !d2) return;
    fechaInicio = d1;
    fechaFin = d2;
  }else{
    fechaInicio = fechaHoy;
  }

  let { data, error } = await db.from("pedidos")
    .select("*")
    .gte("fecha", fechaInicio)
    .lte("fecha", fechaFin);

  if(error || !data) data = [];

  data = depurarPedidosUnicos(data);

  let ayer = new Date(fechaHoy+"T00:00:00");
  ayer.setDate(ayer.getDate()-1);
  let fechaAyer = ayer.toISOString().split("T")[0];

  let { data: dataAyer, error: errorAyer } = await db.from("pedidos")
    .select("*")
    .eq("fecha", fechaAyer);

  if(errorAyer || !dataAyer) dataAyer = [];
  dataAyer = depurarPedidosUnicos(dataAyer);

  let totalAyer = dataAyer.reduce(function(s,r){
    return s + (Number(r.total)||0);
  },0);

  let totalVentas = data.reduce(function(s,r){
    return s + (Number(r.total)||0);
  },0);

  let numPedidos = data.length;
  let ticketProm = numPedidos>0 ? Math.round(totalVentas/numPedidos) : 0;

  let diasUnicos = [...new Set(data.map(function(r){ return r.fecha; }))].length || 1;
  let promedioVentasDia = Math.round(totalVentas / diasUnicos);
  let diffHoy = totalAyer>0 ? Math.round(((promedioVentasDia-totalAyer)/totalAyer)*100) : 0;

  let porFecha = {};
  data.forEach(function(r){
    if(!porFecha[r.fecha]) porFecha[r.fecha]=0;
    porFecha[r.fecha]+=Number(r.total)||0;
  });

  const dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  let porDia = [0,0,0,0,0,0,0];
  let cntDia = [0,0,0,0,0,0,0];

  data.forEach(function(r){
    let d = new Date(r.fecha+"T00:00:00");
    let dw = d.getDay();
    porDia[dw] += Number(r.total)||0;
    cntDia[dw]++;
  });

  let promDia = porDia.map(function(v,i){
    return cntDia[i]>0 ? Math.round(v/cntDia[i]) : 0;
  });

  let porCliente = {};
  data.forEach(function(r){
    if(!porCliente[r.cliente]) porCliente[r.cliente]=0;
    porCliente[r.cliente]+=Number(r.total)||0;
  });

  let topClientes = Object.entries(porCliente)
    .sort(function(a,b){ return b[1]-a[1]; })
    .slice(0,8);

  let porProducto = {};
  data.forEach(function(r){
    if(r.productos && Array.isArray(r.productos)){
      r.productos.forEach(function(p){
        if(!porProducto[p.nombre]) porProducto[p.nombre]={cant:0,total:0};
        porProducto[p.nombre].cant += Number(p.cantidad)||0;
        porProducto[p.nombre].total += Number(p.dinero)||0;
      });
    }
  });

  let topProductos = Object.entries(porProducto)
    .sort(function(a,b){ return b[1].cant-a[1].cant; })
    .slice(0,6);

function depurarPedidosUnicos(lista){
  if(!Array.isArray(lista)) return [];
  var mapa = {};
  lista.forEach(function(p){
    var key = (p.cliente || "") + "|" + (p.fecha || "");
    var actual = mapa[key];
    if(!actual){
      mapa[key] = p;
      return;
    }
    var a = new Date(actual.created_at || actual.updated_at || 0).getTime();
    var b = new Date(p.created_at || p.updated_at || 0).getTime();
    if(b >= a) mapa[key] = p;
  });
  return Object.keys(mapa).map(function(k){ return mapa[k]; });
}

async function cajaBuscarSesionAbierta(){
  var fecha = cajaFechaHoy();
  var res = await db.from("cajas_sesiones")
    .select("*")

    .order("created_at", {ascending:false})
    .limit(1);

  return (res.data && res.data[0]) ? res.data[0] : null;
}

async function cajaMovimientosDelDia(cajaId){

}

function cajaCalcularResumen(ventas, movimientos, sesion){
  ventas = ventas || [];
  movimientos = movimientos || [];
  sesion = sesion || null;

  var ventasTotal = 0;
  var ventasCount = ventas.length;
  var efectivo = 0;
  var transferencias = 0;
  var otros = 0;

  ventas.forEach(function(v){
    var total = Number(v.total)||0;
    var mp = (v.metodo_pago||"efectivo").toLowerCase();
    ventasTotal += total;
    if(mp.indexOf("trans")>-1) transferencias += total;
    else if(mp.indexOf("efec")>-1) efectivo += total;
    else otros += total;
  });

  var ingresosExtra = 0;
  var egresos = 0;

  movimientos.forEach(function(m){
    var valor = Number(m.valor)||0;
    var tipo = (m.tipo||"").toLowerCase();
    if(tipo==="ingreso") ingresosExtra += valor;
    if(tipo==="egreso") egresos += valor;
  });

  var netoRecaudo = Number(window._recaudoCache && window._recaudoCache.resumen && window._recaudoCache.resumen.netoEfectivo || 0);
var baseEfectivo = netoRecaudo > 0 ? netoRecaudo : efectivo;
var esperado = Number(sesion && sesion.apertura_monto || 0) + baseEfectivo + ingresosExtra - egresos;
  var contado = Number(sesion && sesion.cierre_monto_contado || 0);
  var diferencia = contado ? (contado - esperado) : 0;
  var ticketPromedio = ventasCount>0 ? (ventasTotal/ventasCount) : 0;

  return {
    ventas: ventasTotal,
    ventasCount: ventasCount,
    ticketPromedio: ticketPromedio,
    ingresosExtra: ingresosExtra,
    egresos: egresos,
    esperado: esperado,
    contado: contado,
    diferencia: diferencia,
    efectivo: efectivo,
    transferencias: transferencias,
    otros: otros,
    saldoFinal: esperado
  };
}

async function cajaCargarResumenDia(){
  try{
    var sesion = await cajaBuscarSesionAbierta();
    var ventas = await cajaVentasDelDia();
    var movimientos = await cajaMovimientosDelDia(sesion ? sesion.id : null);
    var resumen = cajaCalcularResumen(ventas, movimientos, sesion);

    window._cajaCache = {
      sesion: sesion,
      ventasHoy: ventas,
      movimientos: movimientos,
      resumen: resumen
    };
    return window._cajaCache;
  }catch(e){
    console.error("Error cargando caja:", e);
    window._cajaCache = {
      sesion: null,
      ventasHoy: [],
      movimientos: [],
      resumen: {
        ventas:0, ventasCount:0, ticketPromedio:0, ingresosExtra:0, egresos:0,
        esperado:0, contado:0, diferencia:0, transferencias:0, efectivo:0, otros:0, saldoFinal:0
      }
    };
    return window._cajaCache;
  }
}

async function cargarIngresosMes(){
  try{
    let fechaHoy = cajaFechaHoy();
    let mesInicio = fechaHoy.slice(0,7) + "-01";
    let res = await db.from("pedidos").select("*").gte("fecha", mesInicio).lte("fecha", fechaHoy);
    let limpios = depurarPedidosUnicos((res && res.data) ? res.data : []);
    window._ingresosCache = limpios.reduce(function(s,r){
      return s + (Number(r.total)||0);
    },0);
  }catch(e){
    console.error("Error ingresos mes:",e);
    window._ingresosCache = 0;
  }
}

async function cajaAbrir(){
  try{
    var ya = await cajaBuscarSesionAbierta();
    if(ya && ya.estado==="abierta"){
      alert("La caja ya está abierta hoy.");
      await cajaCargarResumenDia();
      renderConta("caja");
      return;
    }

    var monto = Number(document.getElementById("cajaAperturaMonto")?.value || 0);
    var usuario = cajaUsuarioActual();
    var fecha = cajaFechaHoy();

    var ins = await db.from("cajas_sesiones").insert({
      fecha: fecha,
      estado: "abierta",
      usuario_apertura: usuario,
      apertura_monto: monto
    });

    if(ins.error){
      console.error("Error insertando caja_sesiones:", ins.error);
      alert("No se pudo abrir la caja");
      return;
    }

    var sesion = await cajaBuscarSesionAbierta();
    if(!sesion || !sesion.id){
      alert("No se pudo recuperar la sesión de caja");
      return;
    }

    var mov = await db.from("cajas_movimientos").insert({
      caja_id: sesion.id,
      fecha: fecha,
      tipo: "apertura",
      subtipo: "fondo",
      categoria: "apertura",
      descripcion: "Apertura de caja",
      metodo_pago: "efectivo",
      valor: monto,
      saldo_acumulado: monto,
      usuario: usuario,
      origen: "caja"
    });

    if(mov.error){
      console.error("Error insertando movimiento:", mov.error);
      alert("Se abrió la sesión pero falló el movimiento de apertura");
      return;
    }

    await db.from("cajas_logs").insert({
      caja_id: sesion.id,
      accion: "apertura",
      detalle: "Caja abierta con fondo inicial",
      usuario: usuario
    });

    await cajaCargarResumenDia();
    renderConta("caja");
  }catch(e){
    console.error("Error general al abrir caja:", e);
    alert("No se pudo abrir la caja");
  }
}

      monto: valor,
      cuentaIdx: cuentaIdx,
      cuentaNombre: (cuentaIdx >= 0 && cuentasMemoria[cuentaIdx]) ? cuentasMemoria[cuentaIdx].nombre : ""
    });

    try{
      sessionStorage.setItem("gastos", JSON.stringify(gastosMemoria));
    }catch(err){}

    await db.from("cajas_logs").insert({
      caja_id: sesion.id,
      accion: "egreso",
      detalle: descripcion + " / " + categoria,
      usuario: usuario
    });

    document.getElementById("cajaEgresoDesc").value="";
    document.getElementById("cajaEgresoValor").value="";

    await cajaCargarResumenDia();
    await cargarIngresosMes();
    renderConta("caja");
  }catch(e){
    console.error(e);
    alert("No se pudo registrar el egreso");
  }
}

async function cajaCerrar(){
  try{
    var sesion = window._cajaCache.sesion || await cajaBuscarSesionAbierta();
    if(!sesion || sesion.estado!=="abierta"){
      alert("No hay caja abierta.");
      return;
    }

    var contado = Number(document.getElementById("cajaContadoReal").value || 0);
    var usuario = cajaUsuarioActual();
    var resumen = window._cajaCache.resumen || {};
    var esperado = Number(resumen.esperado || 0);
    var diferencia = contado - esperado;

    var upd = await db.from("cajas_sesiones").update({
      estado: "cerrada",
      usuario_cierre: usuario,
      cierre_fecha: new Date().toISOString(),
      cierre_monto_contado: contado,
      cierre_monto_esperado: esperado,
      diferencia: diferencia,
      total_ventas: Number(resumen.ventas || 0),
      total_ingresos_extra: Number(resumen.ingresosExtra || 0),
      total_egresos: Number(resumen.egresos || 0),
      ticket_promedio: Number(resumen.ticketPromedio || 0),
      numero_ventas: Number(resumen.ventasCount || 0)
    }).eq("id", sesion.id);

    if(upd.error) throw upd.error;

    await db.from("cajas_movimientos").insert({
      caja_id: sesion.id,
      fecha: cajaFechaHoy(),
      tipo: "cierre",
      subtipo: "arqueo",
      categoria: "cierre",
      descripcion: "Cierre de caja",
      metodo_pago: "efectivo",
      valor: contado,
      saldo_acumulado: contado,
      usuario: usuario,
      origen: "caja"
    });

    await db.from("cajas_logs").insert({
      caja_id: sesion.id,
      accion: "cierre",
      detalle: "Caja cerrada. Diferencia: " + diferencia,
      usuario: usuario
    });

    await cajaCargarResumenDia();
    renderConta("caja");
  }catch(e){
    console.error(e);
    alert("No se pudo cerrar la caja");
  }
}

async function cajaExportarCSV(){
  try{
    var sesion = window._cajaCache.sesion || await cajaBuscarSesionAbierta();
    var movimientos = window._cajaCache.movimientos || [];
    var resumen = window._cajaCache.resumen || {};
    var filas = [["fecha","tipo","categoria","descripcion","metodo_pago","valor","saldo_acumulado","usuario"]];

    movimientos.forEach(function(m){
      filas.push([
        m.fecha||"",
        m.tipo||"",
        m.categoria||"",
        (m.descripcion||"").replace(/,/g," "),
        m.metodo_pago||"",
        Number(m.valor||0),
        Number(m.saldo_acumulado||0),
        m.usuario||""
      ]);
    });

    filas.push([]);
    filas.push(["RESUMEN"]);
    filas.push(["ventas", Number(resumen.ventas||0)]);
    filas.push(["numero_ventas", Number(resumen.ventasCount||0)]);
    filas.push(["ticket_promedio", Number(resumen.ticketPromedio||0)]);
    filas.push(["ingresos_extra", Number(resumen.ingresosExtra||0)]);
    filas.push(["egresos", Number(resumen.egresos||0)]);
    filas.push(["esperado", Number(resumen.esperado||0)]);
    filas.push(["diferencia", Number(resumen.diferencia||0)]);

    var csv = filas.map(function(f){
      return f.map(function(v){
        return '"'+String(v===undefined?'':v).replace(/"/g,'""')+'"';
      }).join(",");
    }).join("\n");

    var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "caja_"+(sesion ? sesion.fecha : cajaFechaHoy())+".csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    console.error(e);
    alert("No se pudo exportar el CSV");
  }
}

function agregarGasto(){
  let desc   = document.getElementById("gastoDesc").value.trim();
  let cat    = document.getElementById("gastoCat").value;
  let monto  = Number(document.getElementById("gastoMonto").value)||0;
  let cuenta = Number(document.getElementById("gastoCuenta")?.value ?? -1);
  if(!desc||monto<=0){ alert("Completa descripción y valor"); return; }
  if(!Array.isArray(gastosMemoria)) gastosMemoria = [];
  gastosMemoria.push({
    descripcion:desc,
    categoria:cat,
    monto:monto,
    cuentaIdx: cuenta,
    cuentaNombre: (cuenta >= 0 && cuentasMemoria[cuenta]) ? cuentasMemoria[cuenta].nombre : ""
  });
  // Descontar de la cuenta seleccionada
  if(cuenta >= 0 && cuentasMemoria[cuenta]){
    cuentasMemoria[cuenta].saldo -= monto;
    cuentasGuardar();
  }
  try{ sessionStorage.setItem("gastos", JSON.stringify(gastosMemoria)); }catch(e){}
  renderConta("resumen");
}

  gastosMemoria.splice(i,1);
  try{ sessionStorage.setItem("gastos",JSON.stringify(gastosMemoria)); }catch(e){}
  renderConta("resumen");
}

window._recaudoCache = {
  fecha: "",
  rows: [],
  resumen: {
    bruto: 0,
    recaudoDomi: 0,
    totalDeudas: 0,
    deudasPagadas: 0,
    faltantes: 0,
    salidas: 0,
    transferencias: 0,
    netoEfectivo: 0
  }
};

function recaudoFechaKey(){
  return "recaudo_" + cajaFechaHoy();
}

function recaudoLeerEstado(){
  try{
    let raw = localStorage.getItem(recaudoFechaKey());
    let json = raw ? JSON.parse(raw) : {};
    return (json && typeof json==="object") ? json : {};
  }catch(e){
    return {};
  }
}

function recaudoGuardarEstado(obj){
  try{
    localStorage.setItem(recaudoFechaKey(), JSON.stringify(obj||{}));
  }catch(e){}
}

function recaudoTipoLabel(tipo){
  if(tipo==="moto") return "Cercano";
  if(tipo==="auto") return "Abuelo";
  if(tipo==="recoge") return "Recogen";
  if(tipo==="lejano") return "Lejano";
  return "Otro";
}

function recaudoMoney(n){
  return "$" + (Number(n)||0).toLocaleString("es-CO");
}

function recaudoClasificarResumen(deudaCliente, deudaMia){
  let dc = Number(deudaCliente)||0;
  let dm = Number(deudaMia)||0;
  let neto = dc - dm;
  if(neto > 0){
    return {
      texto: "ME DEBE " + recaudoMoney(neto),
      clase: "rojo"
    };
  }
  if(neto < 0){
    return {
      texto: "LE DEBO " + recaudoMoney(Math.abs(neto)),
      clase: "azul"
    };
  }
  return {
    texto: "AL DÍA",
    clase: "neutro"
  };
}

async function recaudoPedidosDelDia(){
  let fecha = cajaFechaHoy();
  let res = await db.from("pedidos")
    .select("*")
    .eq("fecha", fecha);

  if(res.error) throw res.error;
  return depurarPedidosUnicos(res.data || []);
}
function recaudoGetDeudaHistorica(nombre) {
  let deudaCliente = 0, deudaMia = 0;

  for (let i = 0; i < localStorage.length; i++) {
    let key = localStorage.key(i);
    if (key && key.startsWith('recaudo_')) {
      try {
        let obj = JSON.parse(localStorage.getItem(key));
        if (obj && obj[nombre]) {
          deudaCliente += Number(obj[nombre].deudaCliente) || 0;
          deudaMia     += Number(obj[nombre].deudaMia)     || 0;
          // ← NO sumar deudasPagadas aquí, se lee de cartera_deudas
        }
      } catch(e) {}
    }
  }

  // Pagos permanentes SOLO desde cartera_deudas
  let deudasPagadas = 0, fechaPago = '—';
  try {
    let cartera = JSON.parse(localStorage.getItem('cartera_deudas') || '{}');
    if (cartera[nombre]) {
      deudasPagadas = Number(cartera[nombre].deudasPagadas) || 0;
      fechaPago     = cartera[nombre].fechaPago || '—';
    }
  } catch(e) {}

  return {
    deudaCliente:  Math.max(deudaCliente - deudasPagadas, 0),
    deudaMia:      Math.max(deudaMia     - deudasPagadas, 0),
    deudasPagadas,
    fechaPago
  };
}



async function recaudoConstruirData(){
  let pedidos = await recaudoPedidosDelDia();
  let estado = recaudoLeerEstado();
  let mapaPedidos = {};

  pedidos.forEach(function(p){
    mapaPedidos[p.cliente] = p;
  });

  let rows = (clientes || []).map(function(c){
    let ped = mapaPedidos[c.nombre] || null;
    let saved = estado[c.nombre] || {};

    let subtotal = Number(ped && ped.total || 0);

    // ← CAMBIO: trae deuda acumulada de todos los días
    let deudaHist = recaudoGetDeudaHistorica(c.nombre);

    let row = {
      cliente: c.nombre,
      tipo: c.tipo || "moto",
      subtotal: subtotal,
      recaudoDomi: Number(saved.recaudoDomi || 0),
      recibido: !!saved.recibido,
      nequi: Number(saved.nequi || 0),
      bancolombia: Number(saved.bancolombia || 0),
      deudaCliente: deudaHist.deudaCliente,   // ← CAMBIO
      deudaMia: deudaHist.deudaMia,           // ← CAMBIO
      deudasPagadas: deudaHist.deudasPagadas, // ← CAMBIO
      fechaPago:     deudaHist.fechaPago,
      faltantes: Number(saved.faltantes || 0),
      salidas: Number(saved.salidas || 0),
      observacion: saved.observacion || ""
    };

    row.resumen = recaudoClasificarResumen(row.deudaCliente, row.deudaMia);
    row.totalTransferencia = row.nequi + row.bancolombia;
    row.efectivoNeto = row.subtotal - row.totalTransferencia - row.faltantes - row.salidas;
    if(row.efectivoNeto < 0) row.efectivoNeto = 0;

    return row;
  });

  return rows.sort(function(a,b){
    const orden = { moto:1, auto:2, recoge:3, lejano:4 };
    let oa = orden[a.tipo] || 99;
    let ob = orden[b.tipo] || 99;
    if(oa !== ob) return oa - ob;
    return a.cliente.localeCompare(b.cliente);
  });
}


function recaudoGuardarFila(nombre){
  let estado = recaudoLeerEstado();
  let base = estado[nombre] || {};

  let q = function(id){
    return document.getElementById(id);
  };

  estado[nombre] = {
    ...base,
    recaudoDomi: getRawRecaudo(q("rec_domi_" + nombre)),
    recibido: !!(q("rec_rec_" + nombre) && q("rec_rec_" + nombre).checked),
    nequi: getRawRecaudo(q("rec_nequi_" + nombre)),
    bancolombia: getRawRecaudo(q("rec_banco_" + nombre)),
    deudaCliente: getRawRecaudo(q("rec_dc_" + nombre)),
    deudaMia: getRawRecaudo(q("rec_dm_" + nombre)),
    deudasPagadas: getRawRecaudo(q("rec_dp_" + nombre)),
    faltantes: getRawRecaudo(q("rec_fal_" + nombre)),
    salidas: getRawRecaudo(q("rec_sal_" + nombre)),
    observacion: (q("rec_obs_" + nombre) && q("rec_obs_" + nombre).value || "").trim()
  };

  recaudoGuardarEstado(estado);
}

function fmtRecaudo(input) {
  let raw = input.value.replace(/\./g, '').replace(/[^0-9]/g, '');
  input.dataset.raw = raw || '0';
  if (raw !== '') {
    input.value = Number(raw).toLocaleString('es-CO');
  }
}

function getRawRecaudo(input) {
  if (!input) return 0;
  return Number((input.dataset.raw || input.value || '0').replace(/\./g, '')) || 0;
}

function recaudoMarcarDomi(nombre, subtotal) {
  let estado = recaudoLeerEstado();
  if (!estado[nombre]) estado[nombre] = {};
  let checked = document.getElementById('rec_domi_' + nombre)?.checked;
  estado[nombre].recaudoDomi = checked ? subtotal : 0;
  recaudoGuardarEstado(estado);
}

function recaudoExportarExcel() {
  // Carga SheetJS dinámicamente si no está disponible
  if (typeof XLSX === 'undefined') {
    let s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload = function() { recaudoExportarExcel(); };
    document.head.appendChild(s);
    return;
  }

  try {
    let rows = (window._recaudoCache && window._recaudoCache.rows) ? window._recaudoCache.rows : [];
    let r    = (window._recaudoCache && window._recaudoCache.resumen) ? window._recaudoCache.resumen : {};
    let fecha = cajaFechaHoy();

    let wb = XLSX.utils.book_new();

    // HOJA 1 — DETALLE
    let detalle = [
      [`RECAUDO DIARIO — ${fecha}`],
      [""],
      ["TIPO","CLIENTE","SUBTOTAL","REC. DOMI","RECIBIDO","NEQUI","BANCOLOMBIA","TRANSFERENCIA","DEUDA CLIENTE","YO LE DEBO","DEUDAS PAGAS","FALTANTES","SALIDAS","EFECTIVO NETO","OBSERVACIÓN"]
    ];

    rows.forEach(function(x) {
      detalle.push([
        recaudoTipoLabel(x.tipo), x.cliente,
        Number(x.subtotal||0), Number(x.recaudoDomi||0),
        x.recibido ? "SÍ" : "NO",
        Number(x.nequi||0), Number(x.bancolombia||0),
        Number((x.nequi||0)+(x.bancolombia||0)),
        Number(x.deudaCliente||0), Number(x.deudaMia||0),
        Number(x.deudasPagadas||0), Number(x.faltantes||0),
        Number(x.salidas||0), Number(x.efectivoNeto||0),
        x.observacion||""
      ]);
    });

    detalle.push([""]);
    detalle.push([
      "TOTALES","",
      rows.reduce((s,x)=>s+(Number(x.subtotal)||0),0),
      rows.reduce((s,x)=>s+(Number(x.recaudoDomi)||0),0),
      "","","",
      rows.reduce((s,x)=>s+(Number(x.nequi||0)+Number(x.bancolombia||0)),0),
      rows.reduce((s,x)=>s+(Number(x.deudaCliente)||0),0),"",
      rows.reduce((s,x)=>s+(Number(x.deudasPagadas)||0),0),
      rows.reduce((s,x)=>s+(Number(x.faltantes)||0),0),
      rows.reduce((s,x)=>s+(Number(x.salidas)||0),0),
      rows.reduce((s,x)=>s+(Number(x.efectivoNeto)||0),0),""
    ]);

    let ws1 = XLSX.utils.aoa_to_sheet(detalle);
    ws1['!cols'] = [{wch:12},{wch:30},{wch:14},{wch:14},{wch:10},{wch:14},{wch:14},{wch:16},{wch:14},{wch:12},{wch:14},{wch:12},{wch:12},{wch:14},{wch:25}];
    XLSX.utils.book_append_sheet(wb, ws1, "Detalle");

    // HOJA 2 — RESUMEN
    let resumen = [
      [`RESUMEN — ${fecha}`], [""],
      ["CONCEPTO","VALOR"],
      ["Bruto total",              Number(r.bruto||0)],
      ["Recaudo domiciliario",     Number(r.recaudoDomi||0)],
      ["Transferencias",           Number(r.transferencias||0)],
      ["Faltantes",                Number(r.faltantes||0)],
      ["Salidas",                  Number(r.salidas||0)],
      ["Deudas pagadas",           Number(r.deudasPagadas||0)],
      [""],
      ["NETO EFECTIVO FINAL",      Number(r.netoEfectivo||0)]
    ];
    let ws2 = XLSX.utils.aoa_to_sheet(resumen);
    ws2['!cols'] = [{wch:35},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws2, "Resumen");

    // HOJA 3 — POR TIPO
    let porTipo = [[`DESGLOSE POR TIPO — ${fecha}`],[""],["TIPO","CLIENTES","SUBTOTAL","EFECTIVO NETO","TRANSFERENCIAS"]];
    ['moto','auto','recoge','lejano'].forEach(function(tipo) {
      let g = rows.filter(x => x.tipo === tipo);
      if (!g.length) return;
      porTipo.push([
        recaudoTipoLabel(tipo), g.length,
        g.reduce((s,x)=>s+(Number(x.subtotal)||0),0),
        g.reduce((s,x)=>s+(Number(x.efectivoNeto)||0),0),
        g.reduce((s,x)=>s+(Number(x.nequi||0)+Number(x.bancolombia||0)),0)
      ]);
    });
    let ws3 = XLSX.utils.aoa_to_sheet(porTipo);
    ws3['!cols'] = [{wch:14},{wch:10},{wch:16},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws3, "Por Tipo");

    XLSX.writeFile(wb, `Recaudo_${fecha}.xlsx`);

  } catch(e) {
    console.error(e);
    alert("No se pudo exportar: " + e.message);
  }
}

      "<div class='empty-state'><p>✅ Panel abierto correctamente.<br>Falta pegar la función renderRecaudo().</p></div>";
  }
}
// ============ MÓDULO CARTERA ============

async function carteraCargarDatos() {
  let hoy = new Date();
  let { data: pedidos } = await db.from('pedidos').select('*');

  // Leer pagos permanentes de cartera
  let carteraDeudas = {};
  try {
    carteraDeudas = JSON.parse(localStorage.getItem('cartera_deudas') || '{}');
  } catch(e) {}

  // Lee TODAS las fechas del localStorage que sean de recaudo
  let todosLosEstados = {};
  for (let i = 0; i < localStorage.length; i++) {
    let key = localStorage.key(i);
    if (key && key.startsWith('recaudo_')) {
      try {
        let obj = JSON.parse(localStorage.getItem(key));
        if (obj && typeof obj === 'object') {
          Object.keys(obj).forEach(nombre => {
            if (!todosLosEstados[nombre]) {
              todosLosEstados[nombre] = { deudaCliente: 0, nequi: 0, bancolombia: 0, recaudoDomi: 0 };
            }
            let est = obj[nombre];
            todosLosEstados[nombre].deudaCliente += Number(est.deudaCliente) || 0;
            todosLosEstados[nombre].nequi        += Number(est.nequi)        || 0;
            todosLosEstados[nombre].bancolombia  += Number(est.bancolombia)  || 0;
            todosLosEstados[nombre].recaudoDomi  += Number(est.recaudoDomi)  || 0;
          });
        }
      } catch(e) {}
    }
  }

  let lista = [];

  Object.keys(todosLosEstados).forEach(nombre => {
    let est = todosLosEstados[nombre];

    // Leer pagos desde cartera_deudas (permanente)
    let deudasPagadas = Number(carteraDeudas[nombre]?.deudasPagadas) || 0;
    let ultimoPago    = carteraDeudas[nombre]?.fechaPago || '—'; // ← fecha real

    let deuda = est.deudaCliente - deudasPagadas;
    if (deuda <= 0) return; // Ya pagó, no aparece en cartera

    let pedidosCliente = (pedidos || []).filter(p => p.cliente === nombre);
    let totalPedidos = pedidosCliente.reduce((s, p) => s + (Number(p.total) || 0), 0);
    let totalPagado  = est.nequi + est.bancolombia + est.recaudoDomi + deudasPagadas;

    let fechas = pedidosCliente.map(p => new Date(p.fecha)).filter(f => !isNaN(f));
    let masAntiguo = fechas.length ? new Date(Math.min(...fechas)) : hoy;
    let diasMora = Math.floor((hoy - masAntiguo) / 86400000);

    let ranking  = diasMora <= 30 ? 'bueno'     : diasMora <= 60 ? 'ocasional' : 'critico';
    let estado   = diasMora <= 30 ? 'Normal'    : diasMora <= 60 ? 'Riesgo'    : 'Crítico';
    let semaforo = diasMora <= 30 ? 'verde'     : diasMora <= 60 ? 'amarillo'  : 'rojo';

    lista.push({ nombre, deuda, diasMora, ultimoPago, ranking, estado, semaforo, pedidos: pedidosCliente, totalPedidos, totalPagado });
  });

  lista.sort((a, b) => b.deuda - a.deuda);
  return lista;
}



async function renderCartera(filtroMora='todos', filtroNombre='') {
  let body = document.getElementById('carteraBody');
  body.innerHTML = `<div class="loading-skeleton"><div class="skel skel-h"></div><div class="skel skel-c"></div></div>`;

  let lista = await carteraCargarDatos();

  // Filtros
  if (filtroMora === '0-30')  lista = lista.filter(c => c.diasMora <= 30);
  if (filtroMora === '31-60') lista = lista.filter(c => c.diasMora > 30 && c.diasMora <= 60);
  if (filtroMora === '61+')   lista = lista.filter(c => c.diasMora > 60);
  if (filtroNombre) lista = lista.filter(c => c.nombre.toLowerCase().includes(filtroNombre.toLowerCase()));

  // KPIs
  let totalCartera  = lista.reduce((s,c) => s+c.deuda, 0);
  let carteraVencida= lista.filter(c=>c.diasMora>30).reduce((s,c)=>s+c.deuda,0);
  let cartVencer    = lista.filter(c=>c.diasMora<=30).reduce((s,c)=>s+c.deuda,0);
  let totalPedidosTodos = lista.reduce((s,c)=>s+c.totalPedidos,0);
  let pctRecuperacion = totalPedidosTodos > 0 ? Math.round(((totalPedidosTodos - totalCartera)/totalPedidosTodos)*100) : 0;

  // Edades de cartera
  let e0  = lista.filter(c=>c.diasMora<=30).reduce((s,c)=>s+c.deuda,0);
  let e31 = lista.filter(c=>c.diasMora>30&&c.diasMora<=60).reduce((s,c)=>s+c.deuda,0);
  let e61 = lista.filter(c=>c.diasMora>60&&c.diasMora<=90).reduce((s,c)=>s+c.deuda,0);
  let e91 = lista.filter(c=>c.diasMora>90).reduce((s,c)=>s+c.deuda,0);
  let eMax= Math.max(e0,e31,e61,e91,1);

  body.innerHTML = `
    <div class="cartera-kpis">
      <div class="kpi-card green"><div class="kpi-label">Cartera total</div><div class="kpi-value" style="font-size:1.2rem">${recaudoMoney(totalCartera)}</div></div>
      <div class="kpi-card red" style="--c:#e11d48"><div class="kpi-label">Cartera vencida</div><div class="kpi-value" style="font-size:1.2rem;color:#f87171">${recaudoMoney(carteraVencida)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Por vencer</div><div class="kpi-value" style="font-size:1.2rem">${recaudoMoney(cartVencer)}</div></div>
      <div class="kpi-card blue"><div class="kpi-label">% Recuperación</div><div class="kpi-value" style="font-size:1.2rem">${pctRecuperacion}%</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      <div class="chart-card">
        <div class="chart-title">📊 Clasificación por edades</div>
        ${[['0–30 días',e0,'#4ade80'],['31–60 días',e31,'#fbbf24'],['61–90 días',e61,'#f97316'],['90+ días',e91,'#f87171']].map(([lbl,val,color])=>`
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:#cbd5e1;margin-bottom:3px;">
              <span>${lbl}</span><span style="font-weight:700">${recaudoMoney(val)}</span>
            </div>
            <div class="edad-bar"><div class="edad-bar-fill" style="width:${Math.round((val/eMax)*100)}%;background:${color}"></div></div>
          </div>`).join('')}
      </div>
      <div class="chart-card">
        <div class="chart-title">🏆 Top 5 deudores</div>
        <div class="top-list">
          ${lista.slice(0,5).map((c,i)=>`
            <div class="top-item">
              <div class="top-rank ${i===0?'gold':''}">${i+1}</div>
              <div class="top-name">${c.nombre}</div>
              <div class="top-val">${recaudoMoney(c.deuda)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="cartera-filtros">
      <input type="text" placeholder="🔍 Buscar cliente..." oninput="renderCartera(document.getElementById('filtroMora').value, this.value)" style="min-width:200px">
      <select id="filtroMora" onchange="renderCartera(this.value, '')">
        <option value="todos">Todos los días</option>
        <option value="0-30">0–30 días</option>
        <option value="31-60">31–60 días</option>
        <option value="61+">Más de 60 días</option>
      </select>
    </div>

    <div class="cartera-table-wrap">
      <table class="cartera-table">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Deuda total</th>
            <th>Días mora</th>
            <th>Último pago</th>
            <th>Estado</th>
            <th>Ranking</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          ${lista.map(c=>`
            <tr onclick="carteraVerPerfil('${c.nombre.replace(/'/g,"\\'")}')">
              <td style="font-weight:700">${c.nombre}</td>
              <td style="font-weight:800;color:white">${recaudoMoney(c.deuda)}</td>
              <td>${c.diasMora} días</td>
              <td style="color:#94a3b8">${c.ultimoPago}</td>
              <td><span class="semaforo-${c.semaforo}">${c.estado}</span></td>
              <td><span class="ranking-badge ranking-${c.ranking}">${c.ranking==='bueno'?'✅ Buen pagador':c.ranking==='ocasional'?'⚠️ Ocasional':'🔴 Crítico'}</span></td>
              <td><button class="btn-transferir" style="padding:5px 12px;font-size:12px" onclick="event.stopPropagation();carteraVerPerfil('${c.nombre.replace(/'/g,"\\'")}')">Ver perfil</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function carteraVerPerfil(nombre) {
  let lista = await carteraCargarDatos();
  let cliente = lista.find(c => c.nombre === nombre);
  if (!cliente) return;

  let est = JSON.parse(localStorage.getItem('recaudoEstado') || '{}')[nombre] || {};
  let pagos = [
    { tipo:'Nequi', valor: Number(est.nequi)||0 },
    { tipo:'Bancolombia', valor: Number(est.bancolombia)||0 },
    { tipo:'Domicilio', valor: Number(est.recaudoDomi)||0 },
    { tipo:'Deudas pagas', valor: Number(est.deudasPagadas)||0 },
  ].filter(p => p.valor > 0);

  let totalPagado = pagos.reduce((s,p)=>s+p.valor,0);
  let saldoAcum = 0;

  let movimientos = [
    ...cliente.pedidos.map(p=>({ fecha:p.fecha, tipo:'Pedido', valor:Number(p.total)||0, signo:1 })),
    ...pagos.map(p=>({ fecha:'Hoy', tipo:'Pago - '+p.tipo, valor:p.valor, signo:-1 }))
  ].sort((a,b)=> new Date(a.fecha) - new Date(b.fecha));

  let overlay = document.createElement('div');
  overlay.className = 'cartera-modal-overlay';
  overlay.id = 'carteraModalOverlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div class="cartera-modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3>👤 ${nombre}</h3>
        <button class="panel-close" onclick="document.getElementById('carteraModalOverlay').remove()">Cerrar</button>
      </div>

      <div class="cartera-kpis" style="margin-bottom:16px">
        <div class="kpi-card green"><div class="kpi-label">Total pedidos</div><div class="kpi-value" style="font-size:1.1rem">${recaudoMoney(cliente.totalPedidos)}</div></div>
        <div class="kpi-card blue"><div class="kpi-label">Total pagado</div><div class="kpi-value" style="font-size:1.1rem">${recaudoMoney(totalPagado)}</div></div>
        <div class="kpi-card orange"><div class="kpi-label">Saldo pendiente</div><div class="kpi-value" style="font-size:1.1rem">${recaudoMoney(cliente.deuda)}</div></div>
        <div class="kpi-card ${cliente.semaforo==='verde'?'green':cliente.semaforo==='amarillo'?'orange':''}">
          <div class="kpi-label">Días mora</div>
          <div class="kpi-value" style="font-size:1.1rem;color:${cliente.semaforo==='rojo'?'#f87171':cliente.semaforo==='amarillo'?'#fbbf24':'#4ade80'}">${cliente.diasMora}</div>
        </div>
      </div>

      <div class="section-title">📜 Historial de movimientos</div>
      <div>
        ${movimientos.map(m=>{
          saldoAcum += m.signo * m.valor;
          return `<div class="movimiento-item">
            <div>
              <div class="${m.signo>0?'mov-pedido':'mov-pago'}" style="font-weight:600">${m.tipo}</div>
              <div style="color:#94a3b8;font-size:11px">${m.fecha}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;color:${m.signo>0?'#60a5fa':'#4ade80'}">${m.signo>0?'+':'-'}${recaudoMoney(m.valor)}</div>
              <div style="font-size:11px;color:#94a3b8">Saldo: ${recaudoMoney(Math.max(saldoAcum,0))}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="margin-top:16px;text-align:right">
        <button class="btn-nueva-cuenta" onclick="document.getElementById('carteraModalOverlay').remove();abrirModuloLateral('recaudo')">
          💳 Registrar pago en Recaudo
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
}
function recaudoMarcarDeudaSaldada(nombre, deudaCliente, deudaMia) {
  // Leer estado SOLO de hoy
  let estado = recaudoLeerEstado();
  if (!estado[nombre]) estado[nombre] = {};

  let checked = document.getElementById('rec_deuda_saldo_' + nombre)?.checked;
  let hoy = new Date().toLocaleDateString('es-CO', { day:'numeric', month:'long', year:'numeric' });

  if (checked) {
    let montoPagado = deudaCliente > 0 ? deudaCliente : deudaMia;
    estado[nombre].deudasPagadas = montoPagado; // ← fijo, no acumula
    estado[nombre].fechaPago     = hoy;
  } else {
    estado[nombre].deudasPagadas = 0;
    estado[nombre].fechaPago     = null;
  }

  recaudoGuardarEstado(estado);

  // Guardar en cartera_deudas permanente
  let carteraDeudas = {};
  try { carteraDeudas = JSON.parse(localStorage.getItem('cartera_deudas') || '{}'); } catch(e) {}
  if (!carteraDeudas[nombre]) carteraDeudas[nombre] = {};

  if (checked) {
    let montoPagado = deudaCliente > 0 ? deudaCliente : deudaMia;
    carteraDeudas[nombre].deudasPagadas = montoPagado; // ← fijo, no acumula
    carteraDeudas[nombre].deudaCliente  = deudaCliente;
    carteraDeudas[nombre].deudaMia      = deudaMia;
    carteraDeudas[nombre].fechaPago     = hoy;
  } else {
    carteraDeudas[nombre].deudasPagadas = 0;
    carteraDeudas[nombre].fechaPago     = null;
  }

  localStorage.setItem('cartera_deudas', JSON.stringify(carteraDeudas));
}
