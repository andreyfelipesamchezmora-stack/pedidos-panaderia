<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===== VARIABLES MÓDULO CUENTAS =====

let movimientosContables = [];

  function registrarMovimiento({tipo, monto, cuentaIdx, descripcion=""}){

  if(!cuentasMemoria[cuentaIdx]) return;

  if(tipo === "ingreso"){
    cuentasMemoria[cuentaIdx].saldo += monto;
  }

  if(tipo === "gasto"){
    cuentasMemoria[cuentaIdx].saldo -= monto;
  }

  movimientosContables.push({
    tipo,
    monto,
    cuenta: cuentasMemoria[cuentaIdx].nombre,
    descripcion,
    fecha: new Date().toISOString()
  });

  cuentasGuardar();
}
function tipoEmoji(tipo){
  const m={"CUENTA CORRIENTE":"🏛️","CUENTA DE AHORRO":"🐖","NEQUI":"📱","DAVIPLATA":"📱","EFECTIVO":"💵"};
  return m[tipo]||"💳";
}

// ===== HELPER MODAL =====
function mostrarMC(contenido){
  let overlay = document.getElementById("mcOverlayGlobal");
  let box     = document.getElementById("mcBoxGlobal");
  if(!overlay || !box){ alert("Error: mcOverlayGlobal no encontrado"); return; }
  box.innerHTML = contenido;
  overlay.style.cssText = "display:flex;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.72);z-index:99999;align-items:center;justify-content:center;";
}

function cerrarMC(){
  let o = document.getElementById("mcOverlayGlobal");
  if(o) o.style.display = "none";
}

// ===== NUEVA CUENTA =====
function abrirModalNuevaCuenta(){
  mostrarMC(`
    <h3>Nueva Cuenta</h3>
    <div class="mc-field"><label>Nombre</label><input id="ncnombre" placeholder="Ej: Cuenta Davivienda"></div>
    <div class="mc-field"><label>Tipo</label>
      <select id="nctipo">
        <option>CUENTA CORRIENTE</option><option>CUENTA DE AHORRO</option>
        <option>NEQUI</option><option>DAVIPLATA</option>
        <option>EFECTIVO</option><option>OTRO</option>
      </select>
    </div>
    <div class="mc-field"><label>Saldo inicial</label><input type="number" id="ncsaldo" value="0"></div>
    <div class="mc-field"><label>Color</label>
      <select id="nccolor">
        <option value="teal">Teal - Bancolombia</option>
        <option value="orange">Naranja - Efectivo</option>
        <option value="blue">Azul</option>
        <option value="purple">Morado - Nequi</option>
        <option value="green">Verde</option>
        <option value="gray">Gris</option>
        <option value="red">Rojo</option>
      </select>
    </div>
    <div class="mc-btns">
      <button class="mc-btn-cancel" onclick="cerrarMC()">Cancelar</button>
      <button class="mc-btn-ok" onclick="confirmarNuevaCuenta()">Crear cuenta</button>
    </div>
  `);
}

function confirmarNuevaCuenta(){
  let nombre = document.getElementById("ncnombre").value.trim();
  let tipo   = document.getElementById("nctipo").value;
  let saldo  = Number(document.getElementById("ncsaldo").value)||0;
  let color  = document.getElementById("nccolor").value;
  if(!nombre){ alert("Ingresa un nombre"); return; }
  cuentasMemoria.push({nombre, tipo, color, saldo});
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

// ===== EDITAR CUENTA =====
function abrirEditarCuenta(i){
  let c = cuentasMemoria[i];
  let tipoOpts = ["CUENTA CORRIENTE","CUENTA DE AHORRO","NEQUI","DAVIPLATA","EFECTIVO","OTRO"]
    .map(t => `<option ${t===c.tipo?"selected":""}>${t}</option>`).join("");
  let colorOpts = [["teal","Teal"],["gray","Gris"],["blue","Azul"],["purple","Morado"],["orange","Naranja"],["green","Verde"],["red","Rojo"]]
    .map(([v,l]) => `<option value="${v}" ${v===c.color?"selected":""}>${l}</option>`).join("");
  mostrarMC(`
    <h3>Editar ${c.nombre}</h3>
    <div class="mc-field"><label>Nombre</label><input id="ecnombre" value="${c.nombre}"></div>
    <div class="mc-field"><label>Tipo</label><select id="ectipo">${tipoOpts}</select></div>
    <div class="mc-field"><label>Saldo actual</label><input type="number" id="ecsaldo" value="${c.saldo}"></div>
    <div class="mc-field"><label>Color</label><select id="eccolor">${colorOpts}</select></div>
    <div class="mc-btns">
      <button class="mc-btn-cancel" onclick="cerrarMC()">Cancelar</button>
      <button class="mc-btn-ok" onclick="confirmarEditarCuenta(${i})">Guardar</button>
    </div>
  `);
}

function confirmarEditarCuenta(i){
  let nombre = document.getElementById("ecnombre").value.trim();
  if(!nombre){ alert("El nombre no puede estar vacío"); return; }
  cuentasMemoria[i].nombre = nombre;
  cuentasMemoria[i].tipo   = document.getElementById("ectipo").value;
  cuentasMemoria[i].saldo  = Number(document.getElementById("ecsaldo").value)||0;
  cuentasMemoria[i].color  = document.getElementById("eccolor").value;
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

// ===== ELIMINAR CUENTA =====
function eliminarCuenta(i){
  if(!confirm("¿Eliminar la cuenta " + cuentasMemoria[i].nombre + "?")) return;
  cuentasMemoria.splice(i,1);
  cuentasGuardar();
  renderConta("cuentas");
}

// ===== TRANSFERIR =====
function abrirModalTransferir(){
  if(cuentasMemoria.length < 2){ alert("Necesitas al menos 2 cuentas para transferir"); return; }
  let opts  = cuentasMemoria.map((c,i) => `<option value="${i}">${c.nombre} — $${Number(c.saldo).toLocaleString("es-CO")}</option>`).join("");
  let optsD = cuentasMemoria.map((c,i) => `<option value="${i}" ${i===1?"selected":""}>${c.nombre} — $${Number(c.saldo).toLocaleString("es-CO")}</option>`).join("");
  mostrarMC(`
    <h3>Transferir entre cuentas</h3>
    <div class="mc-field"><label>Cuenta origen</label><select id="tforigen">${opts}</select></div>
    <div class="mc-field"><label>Cuenta destino</label><select id="tfdestino">${optsD}</select></div>
    <div class="mc-field"><label>Monto</label><input type="number" id="tfmonto" placeholder="Ej: 50000"></div>
    <div class="mc-btns">
      <button class="mc-btn-cancel" onclick="cerrarMC()">Cancelar</button>
      <button class="mc-btn-ok verde" onclick="confirmarTransferencia()">Transferir</button>
    </div>
  `);
}

function confirmarTransferencia(){
  let ori   = Number(document.getElementById("tforigen").value);
  let dest  = Number(document.getElementById("tfdestino").value);
  let monto = Number(document.getElementById("tfmonto").value)||0;
  if(ori===dest){ alert("El origen y destino deben ser distintos"); return; }
  if(monto<=0){   alert("Ingresa un monto válido mayor a 0"); return; }
  if(cuentasMemoria[ori].saldo < monto){ alert("Saldo insuficiente en la cuenta origen"); return; }
  cuentasMemoria[ori].saldo  -= monto;
  cuentasMemoria[dest].saldo += monto;
  let fecha = new Date().toLocaleDateString("es-CO",{day:"numeric",month:"long",year:"numeric"});
  transferenciasMem.push({
    origen:  cuentasMemoria[ori].nombre,
    destino: cuentasMemoria[dest].nombre,
    monto, fecha
  });
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

// ===== CONCILIAR =====
function abrirConciliar(i){
  let c = cuentasMemoria[i];
  mostrarMC(`
    <h3>Conciliar ${c.nombre}</h3>
    <div class="conciliar-saldo-box">
      <p>Saldo en sistema</p>
      <div class="csval">$${Number(c.saldo).toLocaleString("es-CO")}</div>
    </div>
    <div class="mc-field">
      <label>Saldo real (banco / físico)</label>
      <input type="number" id="concreal" placeholder="Ingresa el saldo real"
        oninput="calcDiff(${i})">
    </div>
    <div id="concdiff" style="font-size:13px;margin-bottom:8px;color:#94a3b8;min-height:20px;"></div>
    <div class="mc-btns">
      <button class="mc-btn-cancel" onclick="cerrarMC()">Cerrar</button>
      <button class="mc-btn-ok verde" onclick="aplicarConciliacion(${i})">Actualizar saldo</button>
    </div>
  `);
}

function calcDiff(i){
  let real = Number(document.getElementById("concreal").value)||0;
  let diff = real - cuentasMemoria[i].saldo;
  let el   = document.getElementById("concdiff");
  if(!el) return;
  if(diff===0) el.innerHTML = `<span style="color:#4ade80;font-weight:700">✓ Sin diferencia, todo cuadra</span>`;
  else el.innerHTML = `<span style="color:#fbbf24;font-weight:700">Diferencia: ${diff>0?"+":""}${diff.toLocaleString("es-CO")}</span>`;
}

function aplicarConciliacion(i){
  let val = document.getElementById("concreal").value;
  if(!val){ alert("Ingresa el saldo real"); return; }
  cuentasMemoria[i].saldo = Number(val)||0;
  cuentasGuardar();
  cerrarMC();
  renderConta("cuentas");
}

// ===== ELIMINAR GASTO (descuenta de cuenta) =====
function eliminarGasto(i){
  if(!Array.isArray(gastosMemoria)) gastosMemoria = [];
  let g = gastosMemoria[i];
  // Revertir el descuento de la cuenta si tiene cuentaIdx
  if(g && g.cuentaIdx >= 0 && cuentasMemoria[g.cuentaIdx]){
    cuentasMemoria[g.cuentaIdx].saldo += Number(g.monto)||0;
    cuentasGuardar();
  }
  gastosMemoria.splice(i,1);
  try{ sessionStorage.setItem("gastos", JSON.stringify(gastosMemoria)); }catch(e){}
  renderConta("resumen");
}

</script>

<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --font-body: 'Satoshi', Arial, sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.10);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.15);
  /* Dashboard colors */
  --clr-bg: #f4f4f4;
  --clr-surface: #ffffff;
  --clr-sidebar: #111111;
  --clr-text: #1a1a1a;
  --clr-muted: #6b7280;
  --clr-border: rgba(0,0,0,0.10);
  --clr-accent: #16a34a;
  --clr-accent2: #2563eb;
  --clr-accent3: #d97706;
  --clr-accent4: #7c3aed;
  --clr-panel-bg: #0f172a;
  --clr-panel-surface: #1e293b;
  --clr-panel-border: rgba(255,255,255,0.08);
  --clr-panel-text: #e2e8f0;
  --clr-panel-muted: #94a3b8;
  --clr-success: #16a34a;
  --clr-error: #dc2626;
  --clr-warning: #d97706;
  --clr-info: #2563eb;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--clr-bg); color: var(--clr-text); }

/* ===== ORIGINAL LAYOUT ===== */
.container { display: flex; height: 100vh; }

.sidebar {
  width: 250px; background: #111; color: white; padding: 10px;
  display: flex; flex-direction: column;
}

.main { flex: 1; padding: 15px; overflow: auto; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

.card {
  background: white; padding: 10px; border-radius: 10px;
  position: relative; cursor: pointer;
}
.card.nuevo { background: #d4ffd4; border-left: 6px solid green; }
.printMini {
  position: absolute; bottom: 5px; right: 8px; font-size: 14px;
  cursor: pointer; background: #111; color: white;
  padding: 3px 6px; border-radius: 6px;
}
.card.moto { border-left: 6px solid green; }
.card.auto { border-left: 6px solid blue; }
.card.recoge { border-left: 6px solid orange; }
.card.lejano { border-left: 6px solid purple; }
.card.editado { background: #fff3a6; }
.x { position: absolute; top: 5px; right: 8px; color: red; cursor: pointer; }

/* ===== MODAL ORIGINAL ===== */
.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); display: none;
  align-items: center; justify-content: center; z-index: 100;
}
.modal-content {
  background: white; width: 90%; max-width: 900px;
  max-height: 90vh; overflow: auto; padding: 15px; border-radius: 10px;
}

.producto {
  display: flex; gap: 10px; margin-bottom: 15px;
  border-bottom: 1px solid #ddd; padding-bottom: 10px;
  border-radius: 10px; padding: 10px;
}
.producto:nth-child(even) { background: #eef6ff; }
.producto:nth-child(odd) { background: #f9f9f9; }
.producto img { width: 110px; height: 110px; object-fit: cover; border-radius: 10px; }
.producto.activo-cant { background: #d4ffd4; }
.producto.activo-din { background: #d4e4ff; }

.panel-botones { position: sticky; top: 10px; }

#resultadoBox, #bendajeBox {
  background: #f9f9f9; padding: 10px; border-radius: 10px;
  margin-top: 10px; white-space: pre-line;
}
#bendajeBox { background: #fff3cd; }

.video-sidebar { display: flex; justify-content: center; align-items: center; margin-top: 195px; }

#meDebeValor::placeholder { color: red; font-weight: bold; }
#leDeboValor::placeholder { color: blue; font-weight: bold; }

/* ===== SIDEBAR MODULE BUTTONS ===== */
.module-btns {
  display: flex; flex-direction: column; gap: var(--space-2);
  margin-top: var(--space-3); padding-top: var(--space-3);
  border-top: 1px solid rgba(255,255,255,0.12);
}

.module-btn {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  color: #e2e8f0; font-size: var(--text-sm);
  font-family: var(--font-body); font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  text-align: left;
}
.module-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.22);
  transform: translateX(2px);
}
.module-btn svg { flex-shrink: 0; opacity: 0.85; }
.module-btn.stats-btn { border-left: 3px solid var(--clr-accent); }
.module-btn.conta-btn { border-left: 3px solid var(--clr-accent3); }
.module-btn.recaudo-btn{
  border-left: 3px solid #f59e0b;
}
/* ===== OVERLAY PANEL ===== */
.overlay-panel {
  position: fixed; top: 0; right: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  display: none; z-index: 200;
  align-items: stretch; justify-content: flex-end;
}
.overlay-panel.open { display: flex; }

.panel-drawer {
  width: min(860px, 94vw);
  background: var(--clr-panel-bg);
  color: var(--clr-panel-text);
  height: 100%; overflow-y: auto;
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  animation: slideIn 0.32s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-5) var(--space-6);
  background: var(--clr-panel-surface);
  border-bottom: 1px solid var(--clr-panel-border);
  position: sticky; top: 0; z-index: 10;
}
.panel-header h2 {
  font-size: var(--text-lg); font-weight: 700; color: var(--clr-panel-text);
  display: flex; align-items: center; gap: var(--space-2);
}
.panel-close {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: var(--clr-panel-muted); border-radius: var(--radius-md);
  padding: var(--space-1) var(--space-3); cursor: pointer; font-size: var(--text-sm);
  transition: all var(--transition);
}
.panel-close:hover { background: rgba(255,255,255,0.15); color: white; }

.panel-body { padding: var(--space-5) var(--space-6); flex: 1; }

/* ===== FILTER TABS ===== */
.filter-tabs {
  display: flex; gap: var(--space-2); margin-bottom: var(--space-5);
  flex-wrap: wrap;
}
.ftab {
  padding: var(--space-1) var(--space-4);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-full); color: var(--clr-panel-muted);
  font-size: var(--text-xs); cursor: pointer; transition: all var(--transition);
  font-family: var(--font-body); font-weight: 500;
}
.ftab.active, .ftab:hover {
  background: var(--clr-accent); border-color: var(--clr-accent);
  color: white;
}

/* ===== KPI CARDS ===== */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: var(--space-3); margin-bottom: var(--space-5);
}
.kpi-card {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
}
.kpi-card.green::before { background: var(--clr-success); }
.kpi-card.blue::before { background: var(--clr-info); }
.kpi-card.orange::before { background: var(--clr-warning); }
.kpi-card.purple::before { background: var(--clr-accent4); }

.kpi-label {
  font-size: var(--text-xs); color: var(--clr-panel-muted);

  font-size: var(--text-xl); font-weight: 700;

.kpi-delta {
  font-size: var(--text-xs); margin-top: var(--space-1); font-weight: 500;

.kpi-delta.up { color: var(--clr-success); }
.kpi-delta.down { color: var(--clr-error); }

.chart-wrap { position: relative; height: 200px; }

.top-list { display: flex; flex-direction: column; gap: var(--space-2); }

}
.top-item:last-child { border-bottom: none; }
.top-rank {

  font-size: var(--text-xs); font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.top-rank.gold { background: var(--clr-warning); color: white; }
.top-name { flex: 1; font-size: var(--text-sm); color: var(--clr-panel-text); font-weight: 500; }
.top-val {

  font-variant-numeric: tabular-nums;
}
.top-bar-wrap {

.top-bar { height: 100%; background: var(--clr-accent); border-radius: var(--radius-full); }

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: var(--text-sm); font-weight: 700; color: var(--clr-panel-muted);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: var(--space-3); margin-top: var(--space-5);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--clr-panel-border);
}
.section-title:first-child { margin-top: 0; }

/* ===== CONTABILIDAD ===== */
.conta-kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: var(--space-3); margin-bottom: var(--space-5);
}

.gasto-form {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);

async function cargar(){

  let fechaSeleccionada = fechaInput.value;
  let data = [];

    let res = await db.from("pedidos").select("*").eq("fecha", fechaSeleccionada);
    if(!res.error) data = res.data || [];
  } catch(e){ data = []; }

  let total = 0;
  let grid = document.getElementById("grid");
  grid.innerHTML = "";
  if(!clientes || clientes.length === 0){
    grid.innerHTML = "<h3 style='color:red'>No hay clientes cargados</h3>";
    return;
  }
  clientes.forEach(c => {
    let p = data.find(x => x.cliente === c.nombre) || null;
    let t = p ? Number(p.total) || 0 : 0;
    total += t;
    grid.innerHTML += `
    <div class="card ${c.tipo} ${p ? (p.editado ? 'editado' : 'nuevo') : ''}"
      onclick="abrir('${c.nombre}', ${p?.id || 0})">
      <div class="printMini" onclick="event.stopPropagation();imprimirDirecto('${c.nombre}')">🖨️</div>
      <div class="x" onclick="event.stopPropagation();eliminar(${p?.id||0},'${c.nombre}')">✖</div>
      <h4>${c.nombre}</h4>
      <p>$${t.toLocaleString('es-CO')}</p>
    </div>`;
  });
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

async function abrir(nombre,id){
  clienteActivo = nombre;
  actualCliente = nombre;
  actualId = id || null;
  document.getElementById("clienteTitulo").innerText = nombre;
  document.getElementById("modalPedido").style.display = "flex";
  renderProductos();
  if(!id) resetear();
  document.getElementById("comentarios").value = "";
  let fechaSeleccionada = document.getElementById("fecha").value;
  let { data, error } = await db.from("pedidos").select("*").eq("cliente",nombre).eq("fecha",fechaSeleccionada);
  if(error){ console.error(error); return; }
  if(data && data.length > 0) data = data[data.length-1]; else data = null;
  if(data){
    if(data.productos && Array.isArray(data.productos)){
      data.productos.forEach(prodGuardado => {
        let index = productos.findIndex(p => p.name === prodGuardado.nombre);
        if(index !== -1){
          let cantInput = document.getElementById("cant"+index);
          let dinInput = document.getElementById("din"+index);
          if(cantInput) cantInput.value = prodGuardado.cantidad || "";
          if(dinInput) dinInput.value = prodGuardado.dinero || "";
          marcar(index);
        }
      });
    }
    window.totalPedido = data.total;
    window.textoPedido = data.pedido;
    document.getElementById("resultadoBox").innerText = data.pedido;
    document.getElementById("comentarios").value = data.comentario || "";
    clienteActivo = nombre;
    document.querySelectorAll(".cantidad").forEach(i => i.value = "");
    document.querySelectorAll(".precio").forEach(i => i.value = "");
  }
}

function calcular(){
  let total = 0;
  let texto = "";
  let bendaje = "BENDAJE:\n";
  productos.forEach((p,i) => {
    let cantInput = document.getElementById("cant"+i);
    let dinInput = document.getElementById("din"+i);
    if(!cantInput || !dinInput) return;
    let cant = Number(cantInput.value) || 0;
    let din = Number(limpiarFormato(dinInput.value)) || 0;
    let precio = p.precio;
    if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
    if(modo==="tiberio" && p.name==="PAN QUESILLO (1.200)") precio=1000;
    let panes=0,subtotal=0;
    if(p.name==="PAN DE 2.000" && modo!=="original"){
      if(din>0){
        if(din>=5000&&din<6000){panes=3;subtotal=5000;}
        else if(din>=14000&&din<20000){panes=9;subtotal=15000;}
        else{panes=Math.floor(din/precio);subtotal=panes*precio;}
      } else if(cant>0){
        if(cant===3){panes=3;subtotal=5000;}
        else if(cant>=7&&cant<=9){panes=9;subtotal=15000;}
        else{panes=cant;subtotal=panes*precio;}
      }
    } else {
      if(din>0) panes=Math.floor(din/precio); else if(cant>0) panes=cant;
      subtotal=panes*precio;
    }
    if(subtotal>0){
      let b=0;
      if(p.name.trim()==="PAN DE 3.500") b=0;
      else if(p.name.trim()==="PAN DE 2.000"){
        if(modo!=="original"&&(panes===3||panes===7||panes===8||panes===9)) b=0;
        else b=Math.round(panes*0.2);
      } else b=p.b?Math.round(panes*0.2):0;
      bendaje+=`${p.name}: ${b}\n`;
      total+=subtotal;
      texto+="------------------------------\n";
      texto+=`${p.name} x ${panes} =$${subtotal.toLocaleString('es-CO')}\n`;
      texto+=`Bendaje: ${b}\n`;
    }
  });
  document.getElementById("resultadoBox").innerText=texto;
  document.getElementById("bendajeBox").innerText=bendaje;
  window.totalPedido=total;
  window.bendajePedido=bendaje;
  let leDebo=document.getElementById("leDebo")?.checked;
  let meDebeCheck=document.getElementById("meDebeCheck")?.checked;
  let meDebeValor=Number(document.getElementById("meDebeValor")?.value)||0;
  let leDeboValor=Number(document.getElementById("leDeboValor")?.value)||0;
  let totalFinal=total;
  if(leDebo&&leDeboValor>0) totalFinal-=leDeboValor;
  if(meDebeCheck&&meDebeValor>0) totalFinal+=meDebeValor;
  let textoFinal=leDebo?"SALDO A FAVOR: $"+Math.abs(totalFinal).toLocaleString('es-CO'):"COBRAR: $"+totalFinal.toLocaleString('es-CO');
  document.getElementById("totalFinal").innerText=textoFinal;
  window.totalFinal=totalFinal;
  window.textoPedido=texto;
  window.bendajePedido=bendaje;
}

  let total=0,texto="",listaProductos=[];
  productos.forEach((p,i)=>{
    let cant=Number(document.getElementById("cant"+i)?.value)||0;
    let din=Number(limpiarFormato(document.getElementById("din"+i)?.value||"0"))||0;
    let precio=p.precio;
    if(modo==="alexa"&&p.name==="PAN DE 3.500") precio=3000;
    if(modo==="tiberio"&&p.name==="PAN QUESILLO (1.200)") precio=1000;
    let panes=0,subtotal=0;
    if(p.name==="PAN DE 2.000"&&modo!=="original"){
      if(din>0){if(din>=5000&&din<6000){panes=3;subtotal=5000;}else if(din>=14000&&din<20000){panes=9;subtotal=15000;}else{panes=Math.floor(din/precio);subtotal=panes*precio;}}
      else if(cant>0){if(cant===3){panes=3;subtotal=5000;}else if(cant>=7&&cant<=9){panes=9;subtotal=15000;}else{panes=cant;subtotal=panes*precio;}}
    } else {
      if(din>0) panes=Math.floor(din/precio); else if(cant>0) panes=cant;
      subtotal=panes*precio;
    }
    if(cant>0||din>0) listaProductos.push({nombre:p.name,cantidad:cant,dinero:din});
    if(subtotal>0){total+=subtotal;texto+=`\n${p.name} x${panes} = $${subtotal}\n`;}
  });
  let comentario=document.getElementById("comentarios").value||"";
  if(actualId){
    let{error}=await db.from("pedidos").update({total,pedido:texto,comentario,productos:listaProductos,editado:true}).eq("id",actualId);
    if(error){console.error(error);alert("Error al actualizar");return;}
  } else {
    let{error}=await db.from("pedidos").insert([{cliente:actualCliente,fecha,total,pedido:texto,comentario,productos:listaProductos,editado:false}]);
    if(error){console.error(error);alert("Error al guardar");return;}
  }
  cerrarModal(); cargar();
}

async function cargarStats(filtro){
  let hoy = new Date();
  let fechaHoy = cajaFechaHoy();
  let fechaInicio, fechaFin = fechaHoy;

  if(filtro==="hoy"){
    fechaInicio = fechaHoy;
  }else if(filtro==="semana"){
    let d = new Date(fechaHoy+"T00:00:00");
    d.setDate(d.getDate()-6);
    fechaInicio = d.toISOString().split("T")[0];
  }else if(filtro==="mes"){
    fechaInicio = fechaHoy.slice(0,7) + "-01";
  }else if(filtro==="custom"){
    let d1 = document.getElementById("filtroDesde")?.value;
    let d2 = document.getElementById("filtroHasta")?.value;
    if(!d1 || !d2) return;
    fechaInicio = d1;
    fechaFin = d2;
  }else{
    fechaInicio = fechaHoy;
  }

  let { data, error } = await db.from("pedidos")
    .select("*")
    .gte("fecha", fechaInicio)
    .lte("fecha", fechaFin);

  if(error || !data) data = [];

  data = depurarPedidosUnicos(data);

  let ayer = new Date(fechaHoy+"T00:00:00");
  ayer.setDate(ayer.getDate()-1);
  let fechaAyer = ayer.toISOString().split("T")[0];

  let { data: dataAyer, error: errorAyer } = await db.from("pedidos")
    .select("*")
    .eq("fecha", fechaAyer);

  if(errorAyer || !dataAyer) dataAyer = [];
  dataAyer = depurarPedidosUnicos(dataAyer);

  let totalAyer = dataAyer.reduce(function(s,r){
    return s + (Number(r.total)||0);
  },0);

  let totalVentas = data.reduce(function(s,r){
    return s + (Number(r.total)||0);
  },0);

  let numPedidos = data.length;
  let ticketProm = numPedidos>0 ? Math.round(totalVentas/numPedidos) : 0;

  let diasUnicos = [...new Set(data.map(function(r){ return r.fecha; }))].length || 1;
  let promedioVentasDia = Math.round(totalVentas / diasUnicos);
  let diffHoy = totalAyer>0 ? Math.round(((promedioVentasDia-totalAyer)/totalAyer)*100) : 0;

  let porFecha = {};
  data.forEach(function(r){
    if(!porFecha[r.fecha]) porFecha[r.fecha]=0;
    porFecha[r.fecha]+=Number(r.total)||0;
  });

  const dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  let porDia = [0,0,0,0,0,0,0];
  let cntDia = [0,0,0,0,0,0,0];

  data.forEach(function(r){
    let d = new Date(r.fecha+"T00:00:00");
    let dw = d.getDay();
    porDia[dw] += Number(r.total)||0;
    cntDia[dw]++;
  });

  let promDia = porDia.map(function(v,i){
    return cntDia[i]>0 ? Math.round(v/cntDia[i]) : 0;
  });

  let porCliente = {};
  data.forEach(function(r){
    if(!porCliente[r.cliente]) porCliente[r.cliente]=0;
    porCliente[r.cliente]+=Number(r.total)||0;
  });

  let topClientes = Object.entries(porCliente)
    .sort(function(a,b){ return b[1]-a[1]; })
    .slice(0,8);

  let porProducto = {};
  data.forEach(function(r){
    if(r.productos && Array.isArray(r.productos)){
      r.productos.forEach(function(p){
        if(!porProducto[p.nombre]) porProducto[p.nombre]={cant:0,total:0};
        porProducto[p.nombre].cant += Number(p.cantidad)||0;
        porProducto[p.nombre].total += Number(p.dinero)||0;
      });
    }
  });

  let topProductos = Object.entries(porProducto)
    .sort(function(a,b){ return b[1].cant-a[1].cant; })
    .slice(0,6);

  let fechasOrdenadas = Object.keys(porFecha).sort();
  let mejorDia = fechasOrdenadas.length ? fechasOrdenadas.reduce(function(a,b){
    return porFecha[a] > porFecha[b] ? a : b;
  }) : "";

  let peorDia = fechasOrdenadas.length ? fechasOrdenadas.reduce(function(a,b){
    return porFecha[a] < porFecha[b] ? a : b;
  }) : "";

  let mejorCliente = topClientes[0] || ["—",0];

  let body = document.getElementById("statsBody");
  if(!body) return;

  let html = `
    <div class="filter-tabs">
      <button class="ftab ${filtro==="hoy"?"active":""}" onclick="cargarStats('hoy')">Hoy</button>
      <button class="ftab ${filtro==="semana"?"active":""}" onclick="cargarStats('semana')">7 días</button>
      <button class="ftab ${filtro==="mes"?"active":""}" onclick="cargarStats('mes')">Este mes</button>
      <button class="ftab ${filtro==="custom"?"active":""}" onclick="mostrarRangoStats()">Rango</button>
    </div>

    <div id="rangoStatsBox" style="display:${filtro==="custom"?"flex":"none"};gap:8px;flex-wrap:wrap;margin-bottom:16px;">
      <input type="date" id="filtroDesde" value="${filtro==="custom" ? fechaInicio : ""}" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;padding:10px;">
      <input type="date" id="filtroHasta" value="${filtro==="custom" ? fechaFin : ""}" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;padding:10px;">
      <button class="btn-transferir" onclick="cargarStats('custom')">Aplicar</button>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card green">
        <div class="kpi-label">Ventas del período</div>
        <div class="kpi-value">$${totalVentas.toLocaleString("es-CO")}</div>
        <div class="kpi-delta ${diffHoy>=0?'up':'down'}">${diffHoy>=0?'↑':'↓'} ${Math.abs(diffHoy)}% vs día ant.</div>
      </div>

      <div class="kpi-card blue">
        <div class="kpi-label">N° de pedidos</div>
        <div class="kpi-value">${numPedidos}</div>
        <div class="kpi-delta neutral">${diasUnicos} día(s)</div>
      </div>

      <div class="kpi-card orange">
        <div class="kpi-label">Ticket promedio</div>
        <div class="kpi-value">$${ticketProm.toLocaleString("es-CO")}</div>
        <div class="kpi-delta neutral">por pedido</div>
      </div>

      <div class="kpi-card purple">
        <div class="kpi-label">Mejor cliente</div>
        <div class="kpi-value" style="font-size:1.15rem;">${mejorCliente[0]}</div>
        <div class="kpi-delta neutral">$${Number(mejorCliente[1]||0).toLocaleString("es-CO")}</div>
      </div>
    </div>

    <p class="section-title">Ventas por día</p>
    <div class="charts-grid">
      <div class="chart-card full-w">
        <div class="chart-title">Tendencia de ventas diarias</div>
        <div class="chart-wrap tall"><canvas id="chartVentasDia"></canvas></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Promedio por día de semana</div>
        <div class="chart-wrap"><canvas id="chartDiasSemana"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Top 8 Clientes</div>
        <div class="top-list">
          ${topClientes.length ? topClientes.map(function(c,i){
            let max = topClientes[0][1] || 1;
            let pct = ((c[1]/max)*100).toFixed(1);
            return `
              <div class="top-item">
                <div class="top-rank ${i===0?'gold':''}">${i+1}</div>
                <div class="top-name">${c[0]}</div>
                <div class="top-bar-wrap"><div class="top-bar" style="width:${pct}%"></div></div>
                <div class="top-val">$${Number(c[1]).toLocaleString("es-CO")}</div>
              </div>
            `;
          }).join("") : '<div class="empty-state"><p>Sin datos</p></div>'}
        </div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Top productos por cantidad</div>
        <div class="top-list">
          ${topProductos.length ? topProductos.map(function(p,i){
            let max = topProductos[0][1].cant || 1;
            let pct = ((p[1].cant/max)*100).toFixed(1);
            return `
              <div class="top-item">
                <div class="top-rank ${i===0?'gold':''}">${i+1}</div>
                <div class="top-name">${p[0]}</div>
                <div class="top-bar-wrap"><div class="top-bar" style="width:${pct}%"></div></div>
                <div class="top-val">${p[1].cant}</div>
              </div>
            `;
          }).join("") : '<div class="empty-state"><p>Sin productos</p></div>'}
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Insights rápidos</div>
        <div class="top-list">
          <div class="top-item"><div class="top-name">Mejor día</div><div class="top-val">${mejorDia || "—"}</div></div>
          <div class="top-item"><div class="top-name">Peor día</div><div class="top-val">${peorDia || "—"}</div></div>
          <div class="top-item"><div class="top-name">Promedio diario</div><div class="top-val">$${promedioVentasDia.toLocaleString("es-CO")}</div></div>
          <div class="top-item"><div class="top-name">Clientes únicos</div><div class="top-val">${Object.keys(porCliente).length}</div></div>
        </div>
      </div>
    </div>
  `;

  body.innerHTML = html;

  let ctx1 = document.getElementById("chartVentasDia");
  if(ctx1){
    new Chart(ctx1, {
      type: "line",
      data: {
        labels: fechasOrdenadas,
        datasets: [{
          label: "Ventas",
          data: fechasOrdenadas.map(function(f){ return porFecha[f]; }),

function depurarPedidosUnicos(lista){
  if(!Array.isArray(lista)) return [];
  var mapa = {};
  lista.forEach(function(p){
    var key = (p.cliente || "") + "|" + (p.fecha || "");
    var actual = mapa[key];
    if(!actual){
      mapa[key] = p;
      return;
    }
    var a = new Date(actual.created_at || actual.updated_at || 0).getTime();
    var b = new Date(p.created_at || p.updated_at || 0).getTime();
    if(b >= a) mapa[key] = p;
  });
  return Object.keys(mapa).map(function(k){ return mapa[k]; });
}

function cajaFechaHoy(){
  var f = document.getElementById("fecha");
  if(f && f.value) return f.value;
  return new Date().toISOString().split("T")[0];
}

}

async function cajaBuscarSesionAbierta(){
  var fecha = cajaFechaHoy();
  var res = await db.from("cajas_sesiones")
    .select("*")
    .eq("fecha", fecha)
    .order("created_at", {ascending:false})
    .limit(1);

  if(res.error) throw res.error;
  return (res.data && res.data[0]) ? res.data[0] : null;
}

async function cajaVentasDelDia(){
  var fecha = cajaFechaHoy();
  var res = await db.from("pedidos")
    .select("*")
    .eq("fecha", fecha);

  if(res.error) throw res.error;
  return depurarPedidosUnicos(res.data || []);
}

async function cajaMovimientosDelDia(cajaId){
  if(!cajaId) return [];
  var fecha = cajaFechaHoy();
  var res = await db.from("cajas_movimientos")
    .select("*")
    .eq("caja_id", cajaId)
    .eq("fecha", fecha)
    .order("hora", {ascending:true});

  if(res.error) throw res.error;
  return res.data || [];
}

function cajaCalcularResumen(ventas, movimientos, sesion){
  ventas = ventas || [];
  movimientos = movimientos || [];
  sesion = sesion || null;

  var ventasTotal = 0;
  var ventasCount = ventas.length;
  var efectivo = 0;
  var transferencias = 0;
  var otros = 0;

  ventas.forEach(function(v){
    var total = Number(v.total)||0;
    var mp = (v.metodo_pago||"efectivo").toLowerCase();
    ventasTotal += total;
    if(mp.indexOf("trans")>-1) transferencias += total;
    else if(mp.indexOf("efec")>-1) efectivo += total;
    else otros += total;
  });

  var ingresosExtra = 0;
  var egresos = 0;

  movimientos.forEach(function(m){
    var valor = Number(m.valor)||0;
    var tipo = (m.tipo||"").toLowerCase();
    if(tipo==="ingreso") ingresosExtra += valor;
    if(tipo==="egreso") egresos += valor;
  });

  var netoRecaudo = Number(window._recaudoCache && window._recaudoCache.resumen && window._recaudoCache.resumen.netoEfectivo || 0);
var baseEfectivo = netoRecaudo > 0 ? netoRecaudo : efectivo;
var esperado = Number(sesion && sesion.apertura_monto || 0) + baseEfectivo + ingresosExtra - egresos;
  var contado = Number(sesion && sesion.cierre_monto_contado || 0);
  var diferencia = contado ? (contado - esperado) : 0;
  var ticketPromedio = ventasCount>0 ? (ventasTotal/ventasCount) : 0;

  return {
    ventas: ventasTotal,
    ventasCount: ventasCount,
    ticketPromedio: ticketPromedio,
    ingresosExtra: ingresosExtra,
    egresos: egresos,
    esperado: esperado,
    contado: contado,
    diferencia: diferencia,
    efectivo: efectivo,
    transferencias: transferencias,
    otros: otros,
    saldoFinal: esperado
  };
}

async function cajaCargarResumenDia(){
  try{
    var sesion = await cajaBuscarSesionAbierta();
    var ventas = await cajaVentasDelDia();
    var movimientos = await cajaMovimientosDelDia(sesion ? sesion.id : null);
    var resumen = cajaCalcularResumen(ventas, movimientos, sesion);

    window._cajaCache = {
      sesion: sesion,
      ventasHoy: ventas,
      movimientos: movimientos,
      resumen: resumen
    };
    return window._cajaCache;
  }catch(e){
    console.error("Error cargando caja:", e);
    window._cajaCache = {
      sesion: null,
      ventasHoy: [],
      movimientos: [],
      resumen: {
        ventas:0, ventasCount:0, ticketPromedio:0, ingresosExtra:0, egresos:0,
        esperado:0, contado:0, diferencia:0, transferencias:0, efectivo:0, otros:0, saldoFinal:0
      }
    };
    return window._cajaCache;
  }
}

async function cargarIngresosMes(){
  try{
    let fechaHoy = cajaFechaHoy();
    let mesInicio = fechaHoy.slice(0,7) + "-01";
    let res = await db.from("pedidos").select("*").gte("fecha", mesInicio).lte("fecha", fechaHoy);
    let limpios = depurarPedidosUnicos((res && res.data) ? res.data : []);
    window._ingresosCache = limpios.reduce(function(s,r){
      return s + (Number(r.total)||0);
    },0);
  }catch(e){
    console.error("Error ingresos mes:",e);
    window._ingresosCache = 0;
  }
}

async function cajaAbrir(){
  try{
    var ya = await cajaBuscarSesionAbierta();
    if(ya && ya.estado==="abierta"){
      alert("La caja ya está abierta hoy.");
      await cajaCargarResumenDia();
      renderConta("caja");
      return;
    }

    var monto = Number(document.getElementById("cajaAperturaMonto")?.value || 0);
    var usuario = cajaUsuarioActual();
    var fecha = cajaFechaHoy();

    var ins = await db.from("cajas_sesiones").insert({
      fecha: fecha,
      estado: "abierta",
      usuario_apertura: usuario,
      apertura_monto: monto
    });

    if(ins.error){
      console.error("Error insertando caja_sesiones:", ins.error);
      alert("No se pudo abrir la caja");
      return;
    }

    var sesion = await cajaBuscarSesionAbierta();
    if(!sesion || !sesion.id){
      alert("No se pudo recuperar la sesión de caja");
      return;
    }

    var mov = await db.from("cajas_movimientos").insert({
      caja_id: sesion.id,
      fecha: fecha,
      tipo: "apertura",
      subtipo: "fondo",
      categoria: "apertura",
      descripcion: "Apertura de caja",
      metodo_pago: "efectivo",
      valor: monto,
      saldo_acumulado: monto,
      usuario: usuario,
      origen: "caja"
    });

    if(mov.error){
      console.error("Error insertando movimiento:", mov.error);
      alert("Se abrió la sesión pero falló el movimiento de apertura");
      return;
    }

    await db.from("cajas_logs").insert({
      caja_id: sesion.id,
      accion: "apertura",
      detalle: "Caja abierta con fondo inicial",
      usuario: usuario
    });

    await cajaCargarResumenDia();
    renderConta("caja");
  }catch(e){
    console.error("Error general al abrir caja:", e);
    alert("No se pudo abrir la caja");
  }
}

async function cajaCerrar(){
  try{
    var sesion = window._cajaCache.sesion || await cajaBuscarSesionAbierta();
    if(!sesion || sesion.estado!=="abierta"){
      alert("No hay caja abierta.");
      return;
    }

    var contado = Number(document.getElementById("cajaContadoReal").value || 0);
    var usuario = cajaUsuarioActual();
    var resumen = window._cajaCache.resumen || {};
    var esperado = Number(resumen.esperado || 0);
    var diferencia = contado - esperado;

    var upd = await db.from("cajas_sesiones").update({
      estado: "cerrada",
      usuario_cierre: usuario,
      cierre_fecha: new Date().toISOString(),
      cierre_monto_contado: contado,
      cierre_monto_esperado: esperado,
      diferencia: diferencia,
      total_ventas: Number(resumen.ventas || 0),
      total_ingresos_extra: Number(resumen.ingresosExtra || 0),
      total_egresos: Number(resumen.egresos || 0),
      ticket_promedio: Number(resumen.ticketPromedio || 0),
      numero_ventas: Number(resumen.ventasCount || 0)
    }).eq("id", sesion.id);

    if(upd.error) throw upd.error;

    await db.from("cajas_movimientos").insert({
      caja_id: sesion.id,
      fecha: cajaFechaHoy(),
      tipo: "cierre",
      subtipo: "arqueo",
      categoria: "cierre",
      descripcion: "Cierre de caja",
      metodo_pago: "efectivo",
      valor: contado,
      saldo_acumulado: contado,
      usuario: usuario,
      origen: "caja"
    });

    await db.from("cajas_logs").insert({
      caja_id: sesion.id,
      accion: "cierre",
      detalle: "Caja cerrada. Diferencia: " + diferencia,
      usuario: usuario
    });

    await cajaCargarResumenDia();
    renderConta("caja");
  }catch(e){
    console.error(e);
    alert("No se pudo cerrar la caja");
  }
}

async function cajaExportarCSV(){
  try{
    var sesion = window._cajaCache.sesion || await cajaBuscarSesionAbierta();
    var movimientos = window._cajaCache.movimientos || [];
    var resumen = window._cajaCache.resumen || {};
    var filas = [["fecha","tipo","categoria","descripcion","metodo_pago","valor","saldo_acumulado","usuario"]];

    movimientos.forEach(function(m){
      filas.push([
        m.fecha||"",
        m.tipo||"",
        m.categoria||"",
        (m.descripcion||"").replace(/,/g," "),
        m.metodo_pago||"",
        Number(m.valor||0),
        Number(m.saldo_acumulado||0),
        m.usuario||""
      ]);
    });

    filas.push([]);
    filas.push(["RESUMEN"]);
    filas.push(["ventas", Number(resumen.ventas||0)]);
    filas.push(["numero_ventas", Number(resumen.ventasCount||0)]);
    filas.push(["ticket_promedio", Number(resumen.ticketPromedio||0)]);
    filas.push(["ingresos_extra", Number(resumen.ingresosExtra||0)]);
    filas.push(["egresos", Number(resumen.egresos||0)]);
    filas.push(["esperado", Number(resumen.esperado||0)]);
    filas.push(["diferencia", Number(resumen.diferencia||0)]);

    var csv = filas.map(function(f){
      return f.map(function(v){
        return '"'+String(v===undefined?'':v).replace(/"/g,'""')+'"';
      }).join(",");
    }).join("\n");

    var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "caja_"+(sesion ? sesion.fecha : cajaFechaHoy())+".csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    console.error(e);
    alert("No se pudo exportar el CSV");
  }
}

function recaudoTipoLabel(tipo){
  if(tipo==="moto") return "Cercano";
  if(tipo==="auto") return "Abuelo";
  if(tipo==="recoge") return "Recogen";
  if(tipo==="lejano") return "Lejano";
  return "Otro";
}

function recaudoMoney(n){
  return "$" + (Number(n)||0).toLocaleString("es-CO");
}

function recaudoClasificarResumen(deudaCliente, deudaMia){
  let dc = Number(deudaCliente)||0;
  let dm = Number(deudaMia)||0;
  let neto = dc - dm;
  if(neto > 0){
    return {
      texto: "ME DEBE " + recaudoMoney(neto),
      clase: "rojo"
    };
  }
  if(neto < 0){
    return {
      texto: "LE DEBO " + recaudoMoney(Math.abs(neto)),
      clase: "azul"
    };
  }
  return {
    texto: "AL DÍA",
    clase: "neutro"
  };
}

function recaudoGetDeudaHistorica(nombre) {
  let deudaCliente = 0, deudaMia = 0;

  for (let i = 0; i < localStorage.length; i++) {
    let key = localStorage.key(i);
    if (key && key.startsWith('recaudo_')) {
      try {
        let obj = JSON.parse(localStorage.getItem(key));
        if (obj && obj[nombre]) {
          deudaCliente += Number(obj[nombre].deudaCliente) || 0;
          deudaMia     += Number(obj[nombre].deudaMia)     || 0;
          // ← NO sumar deudasPagadas aquí, se lee de cartera_deudas
        }
      } catch(e) {}
    }
  }

  // Pagos permanentes SOLO desde cartera_deudas
  let deudasPagadas = 0, fechaPago = '—';
  try {
    let cartera = JSON.parse(localStorage.getItem('cartera_deudas') || '{}');
    if (cartera[nombre]) {
      deudasPagadas = Number(cartera[nombre].deudasPagadas) || 0;
      fechaPago     = cartera[nombre].fechaPago || '—';
    }
  } catch(e) {}

  return {
    deudaCliente:  Math.max(deudaCliente - deudasPagadas, 0),
    deudaMia:      Math.max(deudaMia     - deudasPagadas, 0),
    deudasPagadas,
    fechaPago
  };
}



async function recaudoConstruirData(){
  let pedidos = await recaudoPedidosDelDia();
  let estado = recaudoLeerEstado();
  let mapaPedidos = {};
 
  pedidos.forEach(function(p){
    mapaPedidos[p.cliente] = p;
  });
 
  let rows = (clientes || []).map(function(c){
    let ped = mapaPedidos[c.nombre] || null;
    let saved = estado[c.nombre] || {};
 
    let subtotal = Number(ped && ped.total || 0);
    let deudaHist = recaudoGetDeudaHistorica(c.nombre);
 
    let row = {
      cliente: c.nombre,
      tipo: c.tipo || "moto",
      subtotal: subtotal,
      recaudoDomi: Number(saved.recaudoDomi || 0),
      recibido: !!saved.recibido,
      nequi: Number(saved.nequi || 0),
      bancolombia: Number(saved.bancolombia || 0),
      deudaCliente: deudaHist.deudaCliente,
      deudaMia: deudaHist.deudaMia,
      deudasPagadas: deudaHist.deudasPagadas,
      deudaMetodo: saved.deudaMetodo || null,
      deudaBanco: saved.deudaBanco || null,
      deudaMiaPagada: Number(saved.deudaMiaPagada || 0),
      fechaPago: deudaHist.fechaPago,
      faltantes: Number(saved.faltantes || 0),
      salidas: Number(saved.salidas || 0),
      observacion: saved.observacion || ""
    };
 
    row.resumen = recaudoClasificarResumen(row.deudaCliente, row.deudaMia);
    row.totalTransferencia = row.nequi + row.bancolombia;
 
    // EFECTIVO NETO POR CLIENTE (solo lo que entregó en efectivo físico)
    // Si marcaste recaudo domi, el cliente le dio al domiciliario el efectivo
    // Si no, el efectivo es: subtotal - transferencias - faltantes - salidas - deudaMiaDescontada
    let efectivoFila = row.subtotal - row.totalTransferencia - row.faltantes - row.salidas - row.deudaMiaPagada;
    if(efectivoFila < 0) efectivoFila = 0;
    row.efectivoNeto = efectivoFila;
 
    return row;
  });
 
  return rows.sort(function(a,b){
    const orden = { moto:1, auto:2, recoge:3, lejano:4 };
    let oa = orden[a.tipo] || 99;
    let ob = orden[b.tipo] || 99;
    if(oa !== ob) return oa - ob;
    return a.cliente.localeCompare(b.cliente);
  });
}

async function renderRecaudo(){
  let body = document.getElementById("recaudoBody");
  if(!body) return;
 
  try{
    let rows = await recaudoConstruirData();
 
    // ============ CÁLCULOS GLOBALES ============
    let bruto = 0;
    let recaudoDomi = 0;
    let nequiVentas = 0;
    let bancolombiaVentas = 0;
    let pagoDeudaEfectivo = 0;
    let pagoDeudaNequi = 0;
    let pagoDeudaBancolombia = 0;
    let faltantes = 0;
    let salidas = 0;
    let deudasDescontadas = 0;
    let efectivoVentasTotal = 0;  // Efectivo real de ventas
 
    rows.forEach(function(r){
      bruto += r.subtotal;
      recaudoDomi += r.recaudoDomi;
      nequiVentas += r.nequi;
      bancolombiaVentas += r.bancolombia;
      faltantes += r.faltantes;
      salidas += r.salidas;
      deudasDescontadas += r.deudaMiaPagada;
      efectivoVentasTotal += r.efectivoNeto;
 
      // Clasificar pago de deuda
      if(r.deudaMetodo === 'efectivo'){
        pagoDeudaEfectivo += r.deudasPagadas;
      } else if(r.deudaMetodo === 'transferencia'){
        let bancoUp = (r.deudaBanco||'').toUpperCase();
        if(bancoUp.indexOf('NEQUI') > -1){
          pagoDeudaNequi += r.deudasPagadas;
        } else {
          pagoDeudaBancolombia += r.deudasPagadas;
        }
      }
    });
 
    // Efectivo TOTAL del día = efectivo de ventas + pagos de deuda en efectivo
    let efectivoTotal = efectivoVentasTotal + pagoDeudaEfectivo;
    let transferenciasVentas = nequiVentas + bancolombiaVentas;
    let pagosDeudaTransf = pagoDeudaNequi + pagoDeudaBancolombia;
    let totalRecaudado = efectivoTotal + transferenciasVentas + pagosDeudaTransf;

      fecha: cajaFechaHoy(),

        bruto, recaudoDomi, faltantes, salidas,
        netoEfectivo: efectivoTotal,
        transferencias: transferenciasVentas,
        pagosDeudaTransf: pagosDeudaTransf,
        desglose: {
          efectivoVentas: efectivoVentasTotal,
          efectivoDeudas: pagoDeudaEfectivo,
          efectivoTotal: efectivoTotal,
          nequi: nequiVentas,
          bancolombia: bancolombiaVentas,
          pagoDeudaNequi: pagoDeudaNequi,
          pagoDeudaBancolombia: pagoDeudaBancolombia,
          pagosDeudaTransf: pagosDeudaTransf,
          deudasDescontadas: deudasDescontadas,
          totalRecaudado: totalRecaudado
        }
      }
    };
 
    // ============ HTML ============
    // DESGLOSE COMPACTO ARRIBA (pequeño)
    let desgloseCompactoHtml = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px;">
        <div style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:10px;padding:10px 12px;">

function recaudoGuardarFila(nombre){
  let estado = recaudoLeerEstado();
  let base = estado[nombre] || {};
 
  let q = function(id){ return document.getElementById(id); };
 
  estado[nombre] = Object.assign({}, base, {
    recaudoDomi: getRawRecaudo(q("rec_domi_" + nombre)) || (base.recaudoDomi || 0),
    nequi: getRawRecaudo(q("rec_nequi_" + nombre)),
    bancolombia: getRawRecaudo(q("rec_banco_" + nombre)),
    deudaCliente: getRawRecaudo(q("rec_dc_" + nombre)),
    deudaMia: getRawRecaudo(q("rec_dm_" + nombre)),
    faltantes: getRawRecaudo(q("rec_fal_" + nombre)),
    salidas: getRawRecaudo(q("rec_sal_" + nombre)),
    observacion: (q("rec_obs_" + nombre) && q("rec_obs_" + nombre).value || "").trim()
  });
 
  recaudoGuardarEstado(estado);
}

// ============ MÓDULO CARTERA ============

async function carteraCargarDatos() {
  let hoy = new Date();
  let { data: pedidos } = await db.from('pedidos').select('*');

  // Leer pagos permanentes de cartera
  let carteraDeudas = {};
  try {
    carteraDeudas = JSON.parse(localStorage.getItem('cartera_deudas') || '{}');
  } catch(e) {}

  // Lee TODAS las fechas del localStorage que sean de recaudo
  let todosLosEstados = {};
  for (let i = 0; i < localStorage.length; i++) {
    let key = localStorage.key(i);
    if (key && key.startsWith('recaudo_')) {
      try {
        let obj = JSON.parse(localStorage.getItem(key));
        if (obj && typeof obj === 'object') {
          Object.keys(obj).forEach(nombre => {
            if (!todosLosEstados[nombre]) {
              todosLosEstados[nombre] = { deudaCliente: 0, nequi: 0, bancolombia: 0, recaudoDomi: 0 };
            }
            let est = obj[nombre];
            todosLosEstados[nombre].deudaCliente += Number(est.deudaCliente) || 0;
            todosLosEstados[nombre].nequi        += Number(est.nequi)        || 0;
            todosLosEstados[nombre].bancolombia  += Number(est.bancolombia)  || 0;
            todosLosEstados[nombre].recaudoDomi  += Number(est.recaudoDomi)  || 0;
          });
        }
      } catch(e) {}
    }
  }

  let lista = [];

  Object.keys(todosLosEstados).forEach(nombre => {
    let est = todosLosEstados[nombre];

    // Leer pagos desde cartera_deudas (permanente)
    let deudasPagadas = Number(carteraDeudas[nombre]?.deudasPagadas) || 0;
    let ultimoPago    = carteraDeudas[nombre]?.fechaPago || '—'; // ← fecha real

    let deuda = est.deudaCliente - deudasPagadas;
    if (deuda <= 0) return; // Ya pagó, no aparece en cartera

    let pedidosCliente = (pedidos || []).filter(p => p.cliente === nombre);
    let totalPedidos = pedidosCliente.reduce((s, p) => s + (Number(p.total) || 0), 0);
    let totalPagado  = est.nequi + est.bancolombia + est.recaudoDomi + deudasPagadas;

    let fechas = pedidosCliente.map(p => new Date(p.fecha)).filter(f => !isNaN(f));
    let masAntiguo = fechas.length ? new Date(Math.min(...fechas)) : hoy;
    let diasMora = Math.floor((hoy - masAntiguo) / 86400000);

    let ranking  = diasMora <= 30 ? 'bueno'     : diasMora <= 60 ? 'ocasional' : 'critico';
    let estado   = diasMora <= 30 ? 'Normal'    : diasMora <= 60 ? 'Riesgo'    : 'Crítico';
    let semaforo = diasMora <= 30 ? 'verde'     : diasMora <= 60 ? 'amarillo'  : 'rojo';

    lista.push({ nombre, deuda, diasMora, ultimoPago, ranking, estado, semaforo, pedidos: pedidosCliente, totalPedidos, totalPagado });
  });

  lista.sort((a, b) => b.deuda - a.deuda);
  return lista;
}



async function renderCartera(filtroMora, filtroNombre) {
  let body = document.getElementById('carteraBody');
  body.innerHTML = '<div class="loading-skeleton"><div class="skel skel-h"></div><div class="skel skel-c"></div></div>';
 
  filtroMora = filtroMora || 'todos';
  filtroNombre = filtroNombre || '';
 
  let lista = await carteraCargarDatos();
 
  let listaFiltrada = lista.slice();
  if (filtroMora === '0-30')  listaFiltrada = listaFiltrada.filter(c => c.diasMora <= 30);
  if (filtroMora === '31-60') listaFiltrada = listaFiltrada.filter(c => c.diasMora > 30 && c.diasMora <= 60);
  if (filtroMora === '61+')   listaFiltrada = listaFiltrada.filter(c => c.diasMora > 60);
  if (filtroNombre) listaFiltrada = listaFiltrada.filter(c => c.nombre.toLowerCase().includes(filtroNombre.toLowerCase()));
 
  let totalCartera    = lista.reduce((s,c) => s+c.deuda, 0);
  let carteraVencida  = lista.filter(c=>c.diasMora>30).reduce((s,c)=>s+c.deuda,0);
  let cartVencer      = lista.filter(c=>c.diasMora<=30).reduce((s,c)=>s+c.deuda,0);
  let totalPedidosTodos = lista.reduce((s,c)=>s+c.totalPedidos,0);
  let pctRecuperacion = totalPedidosTodos > 0 ? Math.round(((totalPedidosTodos - totalCartera)/totalPedidosTodos)*100) : 0;
 
  // ========== DATOS DE TIBERIO ==========
  let tiberioNombre = "MARKET DEL RIO - TIBERIO";
 
  let pagosTiberio = [];
  try {

// ===== REGISTRAR PAGO DE TIBERIO =====
function carteraRegistrarPagoTiberio() {
  let tiberioNombre = "MARKET DEL RIO - TIBERIO";
  let montoInput = document.getElementById('carteraPagoMonto');
  let notaInput = document.getElementById('carteraPagoNota');
  let cuentaSelect = document.getElementById('carteraCuentaDestino');
  let monto = Number(montoInput ? montoInput.value : 0) || 0;
  let nota = notaInput ? notaInput.value.trim() : '';
  let metodo = window._carteraMetodoSeleccionado || '';
 
  if (monto <= 0) { alert('Ingresa un monto v\u00e1lido mayor a 0'); return; }
  if (!metodo) { alert('Selecciona un m\u00e9todo de pago (Efectivo o Transferencia)'); return; }
 
  let cuentaIdx = -1;
  let nombreBanco = '';
 
  if (metodo === 'efectivo') {
    cuentaIdx = cuentasMemoria.findIndex(c => c.tipo === 'EFECTIVO');
    nombreBanco = 'Efectivo';
  } else {
    cuentaIdx = cuentaSelect ? Number(cuentaSelect.value) : -1;
    if (cuentaIdx >= 0 && cuentasMemoria[cuentaIdx]) {
      nombreBanco = cuentasMemoria[cuentaIdx].nombre;
    } else {
      alert('Selecciona la cuenta a la que te hizo la transferencia');
      return;
    }
  }
 
  let hoy = new Date().toLocaleDateString('es-CO', { day:'numeric', month:'long', year:'numeric' });
 
  // 1. HISTORIAL DE PAGOS
  let historial = [];
  try { historial = JSON.parse(localStorage.getItem('cartera_pagos_historial') || '[]'); } catch(e) { historial = []; }
  historial.push({
    cliente: tiberioNombre,
    monto: monto,
    metodo: metodo,
    banco: nombreBanco,
    cuentaIdx: cuentaIdx,
    nota: nota,
    fecha: hoy
  });
  localStorage.setItem('cartera_pagos_historial', JSON.stringify(historial));
 
  // 2. CARTERA_DEUDAS
  let carteraDeudas = {};
  try { carteraDeudas = JSON.parse(localStorage.getItem('cartera_deudas') || '{}'); } catch(e) {}
  if (!carteraDeudas[tiberioNombre]) carteraDeudas[tiberioNombre] = {};
  let pagosPrevios = Number(carteraDeudas[tiberioNombre].deudasPagadas) || 0;
  carteraDeudas[tiberioNombre].deudasPagadas = pagosPrevios + monto;
  carteraDeudas[tiberioNombre].fechaPago = hoy;
  localStorage.setItem('cartera_deudas', JSON.stringify(carteraDeudas));
 
  // 3. RECAUDO
  let estadoRecaudo = recaudoLeerEstado();
  if (!estadoRecaudo[tiberioNombre]) estadoRecaudo[tiberioNombre] = {};
  let dpPrevio = Number(estadoRecaudo[tiberioNombre].deudasPagadas) || 0;
  estadoRecaudo[tiberioNombre].deudasPagadas = dpPrevio + monto;
  estadoRecaudo[tiberioNombre].fechaPago = hoy;
 
  if (metodo === 'transferencia' && cuentaIdx >= 0 && cuentasMemoria[cuentaIdx]) {
    let nombreCuenta = cuentasMemoria[cuentaIdx].nombre.toUpperCase();
    let tipoCuenta = (cuentasMemoria[cuentaIdx].tipo || '').toUpperCase();
 
    if (nombreCuenta.includes('NEQUI') || tipoCuenta === 'NEQUI') {
      estadoRecaudo[tiberioNombre].nequi = (Number(estadoRecaudo[tiberioNombre].nequi) || 0) + monto;
    } else {
      estadoRecaudo[tiberioNombre].bancolombia = (Number(estadoRecaudo[tiberioNombre].bancolombia) || 0) + monto;
    }
  }
 
  recaudoGuardarEstado(estadoRecaudo);
 
  // 4. ACREDITAR EN CUENTA
  if (cuentaIdx >= 0 && cuentasMemoria[cuentaIdx]) {
    cuentasMemoria[cuentaIdx].saldo += monto;
    cuentasGuardar();
  }
 
  // 5. MOVIMIENTOS CONTABLES
  movimientosContables.push({
    tipo: 'ingreso',
    monto: monto,
    cuenta: nombreBanco,
    descripcion: 'Pago deuda ' + tiberioNombre + (nota ? ' - ' + nota : ''),
    fecha: new Date().toISOString()
  });
 
  window._carteraMetodoSeleccionado = '';
  renderCartera();
}
 
// ===== ELIMINAR PAGO =====
function carteraEliminarPago(idx) {
  let tiberioNombre = "MARKET DEL RIO - TIBERIO";
 
  let historial = [];
  try { historial = JSON.parse(localStorage.getItem('cartera_pagos_historial') || '[]'); } catch(e) { historial = []; }
 
  let pagosTiberio = [];
  let indicesGlobal = [];
  historial.forEach((p, gi) => {
    if (p.cliente === tiberioNombre) {
      pagosTiberio.push(p);
      indicesGlobal.push(gi);
    }
  });
 
  if (idx < 0 || idx >= pagosTiberio.length) return;
  if (!confirm('\u00bfEliminar este pago de ' + recaudoMoney(pagosTiberio[idx].monto) + '?')) return;
 
  let pago = pagosTiberio[idx];
  let globalIdx = indicesGlobal[idx];
 
  historial.splice(globalIdx, 1);
  localStorage.setItem('cartera_pagos_historial', JSON.stringify(historial));
 
  let carteraDeudas = {};
  try { carteraDeudas = JSON.parse(localStorage.getItem('cartera_deudas') || '{}'); } catch(e) {}
  if (carteraDeudas[tiberioNombre]) {
    carteraDeudas[tiberioNombre].deudasPagadas = Math.max(0, (Number(carteraDeudas[tiberioNombre].deudasPagadas)||0) - (Number(pago.monto)||0));
    localStorage.setItem('cartera_deudas', JSON.stringify(carteraDeudas));
  }
 
  let estadoRecaudo = recaudoLeerEstado();
  if (estadoRecaudo[tiberioNombre]) {
    estadoRecaudo[tiberioNombre].deudasPagadas = Math.max(0, (Number(estadoRecaudo[tiberioNombre].deudasPagadas)||0) - (Number(pago.monto)||0));
 
    if (pago.metodo === 'transferencia') {
      let cIdx = Number(pago.cuentaIdx);
      if (cIdx >= 0 && cuentasMemoria[cIdx]) {
        let nc = cuentasMemoria[cIdx].nombre.toUpperCase();
        let tc = (cuentasMemoria[cIdx].tipo || '').toUpperCase();
        if (nc.includes('NEQUI') || tc === 'NEQUI') {
          estadoRecaudo[tiberioNombre].nequi = Math.max(0, (Number(estadoRecaudo[tiberioNombre].nequi)||0) - (Number(pago.monto)||0));
        } else {
          estadoRecaudo[tiberioNombre].bancolombia = Math.max(0, (Number(estadoRecaudo[tiberioNombre].bancolombia)||0) - (Number(pago.monto)||0));
        }
      }
    }
 
    recaudoGuardarEstado(estadoRecaudo);
  }
 
  let cIdx2 = Number(pago.cuentaIdx);
  if (cIdx2 >= 0 && cuentasMemoria[cIdx2]) {
    cuentasMemoria[cIdx2].saldo -= (Number(pago.monto)||0);
    cuentasGuardar();
  } else if (pago.metodo === 'efectivo') {
    let idxEf = cuentasMemoria.findIndex(c => c.tipo === 'EFECTIVO');
    if (idxEf >= 0) {
      cuentasMemoria[idxEf].saldo -= (Number(pago.monto)||0);
      cuentasGuardar();
    }
  }
 
  renderCartera();
}

async function carteraVerPerfil(nombre) {
  let lista = await carteraCargarDatos();
  let cliente = lista.find(c => c.nombre === nombre);
  if (!cliente) return;

  let est = JSON.parse(localStorage.getItem('recaudoEstado') || '{}')[nombre] || {};
  let pagos = [
    { tipo:'Nequi', valor: Number(est.nequi)||0 },
    { tipo:'Bancolombia', valor: Number(est.bancolombia)||0 },
    { tipo:'Domicilio', valor: Number(est.recaudoDomi)||0 },
    { tipo:'Deudas pagas', valor: Number(est.deudasPagadas)||0 },
  ].filter(p => p.valor > 0);

  let totalPagado = pagos.reduce((s,p)=>s+p.valor,0);
  let saldoAcum = 0;

  let movimientos = [

function recaudoConfirmarPago(nombre, monto){
  let metodo = window._recMetSel || '';
  if(!metodo){ alert('Selecciona un método'); return; }
 
  let cuentaIdx = -1;
  let nombreBanco = '';
 
  if(metodo === 'efectivo'){
    cuentaIdx = cuentasMemoria.findIndex(function(c){ return c.tipo === 'EFECTIVO'; });
    nombreBanco = 'Efectivo';
  } else {
    let sel = document.getElementById('recCuentaSel');
    cuentaIdx = sel ? Number(sel.value) : -1;
    if(cuentaIdx < 0 || !cuentasMemoria[cuentaIdx]){
      alert('Selecciona cuenta'); return;
    }
    nombreBanco = cuentasMemoria[cuentaIdx].nombre;
  }
 
  let hoy = new Date().toLocaleDateString('es-CO', {day:'numeric', month:'long', year:'numeric'});
 
  // 1. Estado del recaudo del día
  let estado = recaudoLeerEstado();
  if(!estado[nombre]) estado[nombre] = {};
  estado[nombre].deudasPagadas = monto;
  estado[nombre].deudaMetodo = metodo;
  estado[nombre].deudaCuentaIdx = cuentaIdx;
  estado[nombre].deudaBanco = nombreBanco;
  estado[nombre].fechaPago = hoy;
  recaudoGuardarEstado(estado);
 
  // 2. Cartera permanente (se sincroniza con el módulo Cartera)
  let cartera = {};
  try { cartera = JSON.parse(localStorage.getItem('cartera_deudas') || '{}'); } catch(e){}
  if(!cartera[nombre]) cartera[nombre] = {};
  cartera[nombre].deudasPagadas = monto;
  cartera[nombre].fechaPago = hoy;
  cartera[nombre].metodoPago = metodo;
  cartera[nombre].banco = nombreBanco;
  localStorage.setItem('cartera_deudas', JSON.stringify(cartera));
 
  // 3. Historial de pagos de cartera (para que aparezca en módulo Cartera)
  let historial = [];
  try { historial = JSON.parse(localStorage.getItem('cartera_pagos_historial') || '[]'); } catch(e){ historial = []; }
  historial.push({
    cliente: nombre,
    monto: monto,
    metodo: metodo,
    banco: nombreBanco,
    cuentaIdx: cuentaIdx,
    nota: 'Desde recaudo diario',
    fecha: hoy
  });
  localStorage.setItem('cartera_pagos_historial', JSON.stringify(historial));
 
  // 4. Acreditar la cuenta
  if(cuentaIdx >= 0 && cuentasMemoria[cuentaIdx]){
    cuentasMemoria[cuentaIdx].saldo += monto;
    cuentasGuardar();
  }
 
  // 5. Movimientos contables
  if(!Array.isArray(movimientosContables)) movimientosContables = [];
  movimientosContables.push({
    tipo: 'ingreso',
    monto: monto,
    cuenta: nombreBanco,
    descripcion: 'Pago deuda ' + nombre,
    fecha: new Date().toISOString()
  });
 
  // Cerrar modal y refrescar
  cerrarMC();
  renderRecaudo();
}

function recaudoRevertirPagoDeuda(nombre){
  let estado = recaudoLeerEstado();
  let cartera = {};
  try { cartera = JSON.parse(localStorage.getItem('cartera_deudas') || '{}'); } catch(e){}
 
  let pagoAnterior = Number(estado[nombre] && estado[nombre].deudasPagadas || 0);
  let cuentaIdx = Number(estado[nombre] && estado[nombre].deudaCuentaIdx);
 
  // Revertir saldo
  if(pagoAnterior > 0 && cuentaIdx >= 0 && cuentasMemoria[cuentaIdx]){
    cuentasMemoria[cuentaIdx].saldo -= pagoAnterior;
    cuentasGuardar();
  }
 
  // Limpiar estado
  if(estado[nombre]){
    estado[nombre].deudasPagadas = 0;
    estado[nombre].deudaMetodo = null;
    estado[nombre].deudaCuentaIdx = null;
    estado[nombre].deudaBanco = null;
    estado[nombre].fechaPago = null;
    estado[nombre].deudaMiaPagada = 0;
  }
  recaudoGuardarEstado(estado);
 
  if(cartera[nombre]){
    cartera[nombre].deudasPagadas = 0;
    cartera[nombre].fechaPago = null;
    cartera[nombre].deudaMiaPagada = 0;
  }
  localStorage.setItem('cartera_deudas', JSON.stringify(cartera));
 
  // Quitar del historial el último pago
  let historial = [];
  try { historial = JSON.parse(localStorage.getItem('cartera_pagos_historial') || '[]'); } catch(e){}
  for(let i = historial.length - 1; i >= 0; i--){
    if(historial[i].cliente === nombre && historial[i].nota === 'Desde recaudo diario'){
      historial.splice(i, 1);
      break;
    }
  }
  localStorage.setItem('cartera_pagos_historial', JSON.stringify(historial));
 
  renderRecaudo();
}

async function historialRecolectar(){
  let movs = [];
 
  // 1. VENTAS DEL DÍA (Supabase)
  try {
    let resVentas = await db.from("pedidos").select("*").order("fecha", {ascending: false}).limit(5000);
    if(resVentas && !resVentas.error && Array.isArray(resVentas.data)){
      let ventasUnicas = depurarPedidosUnicos(resVentas.data);
      ventasUnicas.forEach(function(v){
        if(Number(v.total) > 0){
          movs.push({
            fecha: v.fecha,
            tipo: 'ingreso',
            categoria: 'Venta',
            descripcion: 'Venta — ' + (v.cliente || 'Cliente'),
            cuenta: 'Ventas del día',
            monto: Number(v.total)||0,
            origen: 'venta',
            origenIdx: v.id || null
          });
        }
      });
    }
  } catch(e){ console.error('Error ventas:', e); }
 
  // 2. MOVIMIENTOS CONTABLES
  if(Array.isArray(movimientosContables)){
    movimientosContables.forEach(function(m, idx){
      let fechaISO = '';
      if(m.fecha){
        let d = new Date(m.fecha);
        if(!isNaN(d.getTime())) fechaISO = d.toISOString().slice(0,10);
      }
      if(!fechaISO) fechaISO = new Date().toISOString().slice(0,10);
 
      let origen = 'movContable';
      let desc = m.descripcion || '—';
      if(desc.toLowerCase().indexOf('cuota') > -1) origen = 'cuota';
      else if(desc.toLowerCase().indexOf('pago deuda') > -1) origen = 'carteraPago';
 
      movs.push({
        fecha: fechaISO,
        tipo: m.tipo || 'gasto',
        categoria: (m.tipo === 'ingreso' ? 'Ingreso' : (m.categoria || 'Gasto')),
        descripcion: desc,
        cuenta: m.cuenta || '—',
        monto: Number(m.monto)||0,
        origen: origen,
        origenIdx: idx
      });
    });
  }
 
  // 3. GASTOS MANUALES
  if(Array.isArray(gastosMemoria)){
    gastosMemoria.forEach(function(g, idx){
      let yaExiste = movs.some(function(m){
        return (m.origen === 'cuota' || m.origen === 'movContable') &&
               m.descripcion === (g.descripcion||'') &&
               m.monto === (Number(g.monto)||0);
      });
      if(yaExiste) return;
 
      let fechaISO = '';
      if(g.fecha){
        let d = new Date(g.fecha);
        if(!isNaN(d.getTime())) fechaISO = d.toISOString().slice(0,10);
      }
      if(!fechaISO) fechaISO = new Date().toISOString().slice(0,10);
 
      movs.push({
        fecha: fechaISO,
        tipo: 'gasto',
        categoria: g.categoria || 'Gasto',
        descripcion: g.descripcion || '—',
        cuenta: g.cuenta || 'Efectivo',
        monto: Number(g.monto)||0,
        origen: 'gastoManual',
        origenIdx: idx
      });
    });
  }
 
  // 4. MOVIMIENTOS DE CAJA
  try {
    let resCaja = await db.from("cajas_movimientos").select("*").order("fecha", {ascending: false}).limit(2000);
    if(resCaja && !resCaja.error && Array.isArray(resCaja.data)){
      resCaja.data.forEach(function(c){
        if(c.tipo === 'apertura' || c.tipo === 'cierre') return;
 
        let yaExiste = movs.some(function(m){
          return m.fecha === c.fecha &&
                 m.descripcion === (c.descripcion||'') &&
                 m.monto === (Number(c.valor)||0);
        });
        if(yaExiste) return;
 
        movs.push({
          fecha: c.fecha,
          tipo: c.tipo === 'ingreso' ? 'ingreso' : 'gasto',
          categoria: c.categoria || (c.tipo === 'ingreso' ? 'Ingreso' : 'Gasto'),
          descripcion: c.descripcion || '—',
          cuenta: c.metodo_pago || 'Efectivo',
          monto: Number(c.valor)||0,
          origen: 'caja',
          origenIdx: c.id || null
        });
      });
    }
  } catch(e){ console.error('Error caja:', e); }
 
  // 5. PAGOS DE CARTERA
  try {
    let pagosCartera = JSON.parse(localStorage.getItem('cartera_pagos_historial') || '[]');
    if(Array.isArray(pagosCartera)){
      pagosCartera.forEach(function(p){
        let fechaISO = '';
        if(p.fecha){
          let partes = p.fecha.split(' de ');
          if(partes.length === 3){
            let meses = {enero:'01',febrero:'02',marzo:'03',abril:'04',mayo:'05',junio:'06',julio:'07',agosto:'08',septiembre:'09',octubre:'10',noviembre:'11',diciembre:'12'};
            let dia = partes[0].padStart(2,'0');
            let mes = meses[partes[1].toLowerCase()] || '01';
            let ano = partes[2];
            fechaISO = ano+'-'+mes+'-'+dia;
          }
        }
        if(!fechaISO) fechaISO = new Date().toISOString().slice(0,10);
 
        let yaExiste = movs.some(function(m){
          return (m.origen === 'carteraPago' || m.origen === 'movContable') &&
                 m.descripcion.indexOf(p.cliente) > -1 &&
                 m.monto === (Number(p.monto)||0);
        });
        if(yaExiste) return;
 
        movs.push({
          fecha: fechaISO,
          tipo: 'ingreso',
          categoria: 'Pago deuda',
          descripcion: 'Pago deuda ' + (p.cliente||'') + (p.nota ? ' - '+p.nota : ''),
          cuenta: p.banco || (p.metodo === 'efectivo' ? 'Efectivo' : 'Transferencia'),
          monto: Number(p.monto)||0,
          origen: 'carteraPago',
          origenIdx: null
        });
      });
    }
  } catch(e){ console.error('Error cartera:', e); }
 
  return movs;
}
 
function historialMesesDisponibles(movs){
  let meses = {};
  movs.forEach(function(m){
    let mes = (m.fecha||'').slice(0,7);
    if(mes) meses[mes] = true;
  });
  return Object.keys(meses).sort().reverse();
}

function historialGuardarEdicion(idx){
  let desc = (document.getElementById('histEditDesc').value||'').trim();
  let cat = document.getElementById('histEditCat').value;
  let monto = Number(document.getElementById('histEditMonto').value)||0;
 
  if(!desc){ alert('La descripción no puede estar vacía'); return; }
  if(monto <= 0){ alert('El monto debe ser mayor a 0'); return; }
 
  if(!Array.isArray(gastosMemoria) || !gastosMemoria[idx]) return;
 
  gastosMemoria[idx].descripcion = desc;
  gastosMemoria[idx].categoria = cat;
  gastosMemoria[idx].monto = monto;
 
  try { sessionStorage.setItem('gastos', JSON.stringify(gastosMemoria)); } catch(e){}
 
  cerrarMC();
  renderConta('historial');
}
 
function historialEliminarGasto(idx){
  if(!Array.isArray(gastosMemoria) || !gastosMemoria[idx]) return;
  if(!confirm('¿Eliminar este movimiento?')) return;
  gastosMemoria.splice(idx, 1);
  try { sessionStorage.setItem('gastos', JSON.stringify(gastosMemoria)); } catch(e){}
  renderConta('historial');
}

    efectivoDeudas: 0,
    efectivoTotal: 0,
    nequi: 0,
    bancolombia: 0,
    pagosDeudaTransf: 0,
    pagosDeudaNequi: 0,
    pagosDeudaBancolombia: 0,
    deudasDescontadas: 0,
    faltantes: 0,
    salidas: 0,
    totalBruto: 0,
    totalRecaudado: 0
  };
 
  rows.forEach(function(r){
    desglose.totalBruto += r.subtotal;
    desglose.nequi += r.nequi;
    desglose.bancolombia += r.bancolombia;
    desglose.faltantes += r.faltantes;
    desglose.salidas += r.salidas;
    desglose.deudasDescontadas += (r.deudaMiaPagada || 0);
 
    if(r.deudaMetodo === 'efectivo'){
      desglose.efectivoDeudas += r.deudasPagadas;
    } else if(r.deudaMetodo === 'transferencia'){
      desglose.pagosDeudaTransf += r.deudasPagadas;
      // Detectar si fue Nequi o Bancolombia
      let bancoUp = (r.deudaBanco||'').toUpperCase();
      if(bancoUp.indexOf('NEQUI') > -1){
        desglose.pagosDeudaNequi += r.deudasPagadas;
      } else {
        desglose.pagosDeudaBancolombia += r.deudasPagadas;
      }
    }
 
    desglose.efectivoVentas += Math.max(r.subtotal - r.totalTransferencia - r.faltantes - r.salidas - (r.deudaMiaPagada||0), 0);
  });
 
  desglose.efectivoTotal = desglose.efectivoVentas + desglose.efectivoDeudas;
  desglose.totalRecaudado = desglose.efectivoTotal + desglose.nequi + desglose.bancolombia + desglose.pagosDeudaTransf;
 
  return desglose;
}

async function historialRecolectar(){
  let movs = [];
 
  // 1. VENTAS
  try {
    let resVentas = await db.from("pedidos").select("*").order("fecha",{ascending:false}).limit(5000);
    if(resVentas && !resVentas.error && Array.isArray(resVentas.data)){
      let ventasUnicas = depurarPedidosUnicos(resVentas.data);
      ventasUnicas.forEach(function(v){
        if(Number(v.total) > 0){
          movs.push({
            fecha: v.fecha, tipo: 'ingreso', categoria: 'Venta',
            descripcion: 'Venta — ' + (v.cliente || 'Cliente'),
            cuenta: 'Ventas del día', monto: Number(v.total)||0,
            origen: 'venta', origenIdx: v.id || null
          });
        }
      });
    }
  } catch(e){ console.error('Error ventas:', e); }
 
  // 2. MOVIMIENTOS CONTABLES
  if(Array.isArray(movimientosContables)){
    movimientosContables.forEach(function(m, idx){
      let fechaISO = '';
      if(m.fecha){
        let d = new Date(m.fecha);
        if(!isNaN(d.getTime())) fechaISO = d.toISOString().slice(0,10);
      }
      if(!fechaISO) fechaISO = new Date().toISOString().slice(0,10);
 
      let origen = 'movContable';
      let desc = m.descripcion || '—';
      if(desc.toLowerCase().indexOf('cuota') > -1) origen = 'cuota';
      else if(desc.toLowerCase().indexOf('pago deuda') > -1) origen = 'carteraPago';
 
      movs.push({
        fecha: fechaISO, tipo: m.tipo || 'gasto',
        categoria: (m.tipo === 'ingreso' ? 'Ingreso' : (m.categoria || 'Gasto')),
        descripcion: desc, cuenta: m.cuenta || '—',
        monto: Number(m.monto)||0, origen: origen, origenIdx: idx
      });
    });
  }
 
  // 3. GASTOS MANUALES
  if(Array.isArray(gastosMemoria)){
    gastosMemoria.forEach(function(g, idx){
      let yaExiste = movs.some(function(m){
        return (m.origen === 'cuota' || m.origen === 'movContable') &&
               m.descripcion === (g.descripcion||'') &&
               m.monto === (Number(g.monto)||0);
      });
      if(yaExiste) return;
 
      let fechaISO = '';
      if(g.fecha){
        let d = new Date(g.fecha);
        if(!isNaN(d.getTime())) fechaISO = d.toISOString().slice(0,10);
      }
      if(!fechaISO) fechaISO = new Date().toISOString().slice(0,10);
 
      movs.push({
        fecha: fechaISO, tipo: 'gasto',
        categoria: g.categoria || 'Gasto',
        descripcion: g.descripcion || '—',
        cuenta: g.cuenta || 'Efectivo',
        monto: Number(g.monto)||0,
        origen: 'gastoManual', origenIdx: idx
      });
    });
  }
 
  // 4. MOVIMIENTOS DE CAJA
  try {
    let resCaja = await db.from("cajas_movimientos").select("*").order("fecha",{ascending:false}).limit(2000);
    if(resCaja && !resCaja.error && Array.isArray(resCaja.data)){
      resCaja.data.forEach(function(c){
        if(c.tipo === 'apertura' || c.tipo === 'cierre') return;
 
        let yaExiste = movs.some(function(m){
          return m.fecha === c.fecha && m.descripcion === (c.descripcion||'') && m.monto === (Number(c.valor)||0);
        });
        if(yaExiste) return;
 
        movs.push({
          fecha: c.fecha,
          tipo: c.tipo === 'ingreso' ? 'ingreso' : 'gasto',
          categoria: c.categoria || (c.tipo === 'ingreso' ? 'Ingreso' : 'Gasto'),
          descripcion: c.descripcion || '—',
          cuenta: c.metodo_pago || 'Efectivo',
          monto: Number(c.valor)||0,
          origen: 'caja', origenIdx: c.id || null
        });
      });
    }
  } catch(e){ console.error('Error caja:', e); }
 
  // 5. PAGOS DE CARTERA
  try {
    let pagosCartera = JSON.parse(localStorage.getItem('cartera_pagos_historial') || '[]');
    if(Array.isArray(pagosCartera)){
      pagosCartera.forEach(function(p){
        let fechaISO = '';
        if(p.fecha){
          let partes = p.fecha.split(' de ');
          if(partes.length === 3){
            let meses = {enero:'01',febrero:'02',marzo:'03',abril:'04',mayo:'05',junio:'06',julio:'07',agosto:'08',septiembre:'09',octubre:'10',noviembre:'11',diciembre:'12'};
            let dia = partes[0].padStart(2,'0');
            let mes = meses[partes[1].toLowerCase()] || '01';
            let ano = partes[2];
            fechaISO = ano+'-'+mes+'-'+dia;
          }
        }
        if(!fechaISO) fechaISO = new Date().toISOString().slice(0,10);
 
        let yaExiste = movs.some(function(m){
          return (m.origen === 'carteraPago' || m.origen === 'movContable') &&
                 m.descripcion.indexOf(p.cliente) > -1 &&
                 m.monto === (Number(p.monto)||0);
        });
        if(yaExiste) return;
 
        movs.push({
          fecha: fechaISO, tipo: 'ingreso', categoria: 'Pago deuda',
          descripcion: 'Pago deuda ' + (p.cliente||'') + (p.nota ? ' - '+p.nota : ''),
          cuenta: p.banco || (p.metodo === 'efectivo' ? 'Efectivo' : 'Transferencia'),
          monto: Number(p.monto)||0, origen: 'carteraPago', origenIdx: null
        });
      });
    }
  } catch(e){ console.error('Error cartera:', e); }
 
  return movs;
}
 
function historialMesesDisponibles(movs){
  let meses = {};
  movs.forEach(function(m){
    let mes = (m.fecha||'').slice(0,7);
    if(mes) meses[mes] = true;
  });
  return Object.keys(meses).sort().reverse();
}

function historialGuardarEdicion(idx){
  let desc = (document.getElementById('histEditDesc').value||'').trim();
  let cat = document.getElementById('histEditCat').value;
  let monto = Number(document.getElementById('histEditMonto').value)||0;
  if(!desc){ alert('Descripción vacía'); return; }
  if(monto <= 0){ alert('Monto inválido'); return; }
  if(!Array.isArray(gastosMemoria) || !gastosMemoria[idx]) return;
  gastosMemoria[idx].descripcion = desc;
  gastosMemoria[idx].categoria = cat;
  gastosMemoria[idx].monto = monto;
  try { sessionStorage.setItem('gastos', JSON.stringify(gastosMemoria)); } catch(e){}

function historialEliminarGasto(idx){
  if(!Array.isArray(gastosMemoria) || !gastosMemoria[idx]) return;

  gastosMemoria.splice(idx, 1);
  try { sessionStorage.setItem('gastos', JSON.stringify(gastosMemoria)); } catch(e){}
  renderConta('historial');
}
