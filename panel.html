.video-sidebar{

:root{
  --bg:#0b1020;
  --bg-soft:#11182d;
  --panel:#121a2f;
  --panel-2:#17213b;
  --line:rgba(255,255,255,.08);
  --text:#eaf0ff;
  --muted:#9aa6c7;
  --primary:#4f8cff;
  --primary-2:#6ea8fe;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --violet:#8b5cf6;
  --cyan:#06b6d4;
  --card-shadow:0 20px 40px rgba(0,0,0,.25);
  --radius:18px;
  --radius-sm:12px;
  --transition:all .28s cubic-bezier(.2,.8,.2,1);
}

*{box-sizing:border-box}
body{
  font-family:'Inter',Arial,sans-serif;
  background:linear-gradient(180deg,#0b1020 0%,#0f172a 100%);
  color:var(--text);
}

.sidebar{
  background:linear-gradient(180deg,#0b1020 0%,#111827 100%);
  border-right:1px solid var(--line);
  padding:18px 14px;
}

.main{
  background:
    radial-gradient(circle at top right, rgba(79,140,255,.08), transparent 28%),
    linear-gradient(180deg,#f3f6fb 0%,#eef2f8 100%);
  color:#111827;
}

.sidebar h3{
  margin:0 0 10px;
  font-size:15px;
  font-weight:700;
  color:#dbe6ff;
  letter-spacing:.02em;
}

.sidebar input[type="date"]{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  color:#fff;
  margin-bottom:12px;
  outline:none;
}

.sidebar button,
.side-action-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:11px 12px;
  margin-bottom:10px;
  font-weight:600;
  font-size:14px;
  transition:var(--transition);
  cursor:pointer;
}

.sidebar button{
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  color:white;
  box-shadow:0 10px 20px rgba(79,140,255,.25);
}

.sidebar button:hover{
  transform:translateY(-1px);
  filter:brightness(1.03);
}

.side-actions{
  display:grid;
  gap:10px;
  margin-top:6px;
}

.side-action-btn{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  background:rgba(255,255,255,.06);
  color:#e5edff;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
}

.side-action-btn i{
  width:18px;
  text-align:center;
  color:#8fb2ff;
}

.side-action-btn:hover{
  background:rgba(255,255,255,.10);
  transform:translateX(2px);
  border-color:rgba(255,255,255,.14);
}

.dashboard-search{
  width:100%;
  padding:14px 16px;
  font-size:15px;
  border-radius:16px;
  border:1px solid rgba(15,23,42,.08);
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(8px);
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(15,23,42,.06);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.9);
  border:1px solid rgba(15,23,42,.06);
  border-radius:18px;
  box-shadow:0 12px 30px rgba(15,23,42,.08);
  padding:14px;
  transition:var(--transition);
  overflow:hidden;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 36px rgba(15,23,42,.12);
}

.card.moto{border-left:4px solid #16a34a;}
.card.auto{border-left:4px solid #3b82f6;}
.card.recoge{border-left:4px solid #f59e0b;}
.card.lejano{border-left:4px solid #8b5cf6;}
.card.editado{background:#fff7cc;}

.erp-overlay{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.48);
  backdrop-filter:blur(6px);
  opacity:0;
  visibility:hidden;
  transition:var(--transition);
  z-index:2000;
}

.erp-overlay.show{
  opacity:1;
  visibility:visible;
}

.erp-panel{
  position:absolute;
  top:0;
  right:0;
  width:min(1100px,96vw);
  height:100vh;
  background:linear-gradient(180deg,#0d1425 0%,#111b31 100%);
  color:var(--text);
  box-shadow:-30px 0 60px rgba(0,0,0,.35);
  transform:translateX(100%);
  transition:var(--transition);
  display:flex;
  flex-direction:column;
  border-left:1px solid rgba(255,255,255,.08);
}

.erp-overlay.show .erp-panel{
  transform:translateX(0);
}

.erp-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:20px 22px 14px;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  background:rgba(13,20,37,.86);
  backdrop-filter:blur(10px);
  z-index:3;
}

.erp-title-wrap h2{
  margin:0;
  font-size:24px;
  line-height:1.1;
}

.erp-title-wrap p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:13px;
}

.erp-close{
  width:42px;
  height:42px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:#fff;
  cursor:pointer;
  transition:var(--transition);
}

.erp-close:hover{
  background:rgba(255,255,255,.1);
  transform:scale(1.03);
}

.erp-body{
  flex:1;
  overflow:auto;
  padding:20px 22px 28px;
}

.erp-toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.filter-group,
.range-group{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

.erp-chip{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:#dbe6ff;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:var(--transition);
}

.erp-chip.active,
.erp-chip:hover{
  background:rgba(79,140,255,.18);
  border-color:rgba(79,140,255,.35);
  color:#fff;
}

.erp-date{
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:#fff;
}

.erp-section{
  margin-top:18px;
}

.erp-section h3{
  margin:0 0 14px;
  font-size:16px;
  color:#f3f6ff;
  letter-spacing:.01em;
}

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.kpi-card{
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:16px;
  box-shadow:var(--card-shadow);
  min-height:118px;
}

.kpi-label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  margin-bottom:12px;
}

.kpi-value{
  font-size:28px;
  font-weight:800;
  line-height:1.1;
}

.kpi-trend{
  margin-top:10px;
  font-size:13px;
  color:#cfe0ff;
}

.kpi-trend.up{color:#86efac;}
.kpi-trend.down{color:#fca5a5;}
.kpi-trend.neutral{color:#cbd5e1;}

.stats-grid{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:14px;
}

.chart-card,
.info-card,
.accounting-card,
.table-card{
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:16px;
  box-shadow:var(--card-shadow);
}

.chart-card canvas{
  width:100% !important;
  max-height:340px !important;
}

.info-list{
  display:grid;
  gap:10px;
}

.info-item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:10px 0;
  border-bottom:1px dashed rgba(255,255,255,.08);
}

.info-item:last-child{
  border-bottom:none;
}

.info-item span:first-child{
  color:var(--muted);
}

.empty-state{
  padding:24px;
  border-radius:18px;
  text-align:center;
  color:var(--muted);
  border:1px dashed rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);
}

.accounting-form{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.accounting-form input,
.accounting-form select{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:#fff;
  outline:none;
}

.accounting-submit{
  border:none;
  border-radius:14px;
  padding:12px 14px;
  font-weight:700;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  cursor:pointer;
}

.expense-list{
  display:grid;
  gap:10px;
  margin-top:14px;
}

.expense-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
}

.erp-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  background:rgba(255,255,255,.06);
  color:#dce6ff;
  border:1px solid rgba(255,255,255,.08);
}

.erp-two-cols{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.soft-note{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
}

@media (max-width: 980px){
  .stats-grid,
  .erp-two-cols{
    grid-template-columns:1fr;
  }

  .erp-panel{
    width:100vw;
  }
}

@media (max-width: 640px){
  .sidebar{
    width:100%;
  }

  .container{
    flex-direction:column;
    height:auto;
    min-height:100vh;
  }

  .main{
    min-height:60vh;
  }

  .erp-header{
    padding:16px;
  }

  .erp-body{
    padding:16px;
  }

  .kpi-value{
    font-size:24px;
  }
}
</style>
</head>

/* ========= Helpers ========= */

function formatMoney(value){
  return new Intl.NumberFormat("es-CO", {
    style:"currency",
    currency:"COP",
    maximumFractionDigits:0
  }).format(Number(value || 0));
}

function formatNumber(value){
  return new Intl.NumberFormat("es-CO").format(Number(value || 0));
}

function escapeHtml(str=""){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function toISODate(date){
  const d = new Date(date);
  const offset = d.getTimezoneOffset();
  const local = new Date(d.getTime() - offset * 60000);
  return local.toISOString().split("T")[0];
}

function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function endOfWeek(date){
  const d = startOfWeek(date);
  d.setDate(d.getDate() + 6);
  d.setHours(23,59,59,999);
  return d;
}

function startOfMonth(date){
  const d = new Date(date);
  d.setDate(1);
  d.setHours(0,0,0,0);
  return d;
}

function endOfMonth(date){
  const d = new Date(date.getFullYear(), date.getMonth() + 1, 0);
  d.setHours(23,59,59,999);
  return d;
}

function getSelectedBaseDate(){
  const input = document.getElementById("fecha");
  return input?.value ? new Date(input.value + "T12:00:00") : new Date();
}

function getRangeFromMode(mode){
  const baseDate = getSelectedBaseDate();

  if(mode === "hoy"){
    const start = new Date(baseDate);
    start.setHours(0,0,0,0);
    const end = new Date(baseDate);
    end.setHours(23,59,59,999);
    return { start, end, label: "Hoy" };
  }

  if(mode === "semana"){
    return {
      start: startOfWeek(baseDate),
      end: endOfWeek(baseDate),
      label: "Esta semana"
    };
  }

  if(mode === "mes"){
    return {
      start: startOfMonth(baseDate),
      end: endOfMonth(baseDate),
      label: "Este mes"
    };
  }

  const customFrom = document.getElementById("erpDateFrom")?.value;
  const customTo = document.getElementById("erpDateTo")?.value;

  if(customFrom && customTo){
    return {
      start: new Date(customFrom + "T00:00:00"),
      end: new Date(customTo + "T23:59:59"),
      label: "Rango personalizado"
    };
  }

  return {
    start: startOfMonth(baseDate),
    end: endOfMonth(baseDate),
    label: "Este mes"
  };
}

function getPreviousRange(range){
  const diff = range.end.getTime() - range.start.getTime();
  const prevEnd = new Date(range.start.getTime() - 1);
  const prevStart = new Date(prevEnd.getTime() - diff);
  return { start: prevStart, end: prevEnd };
}

function eachDayBetween(start, end){
  const days = [];
  const current = new Date(start);
  current.setHours(0,0,0,0);

  while(current <= end){
    days.push(toISODate(current));
    current.setDate(current.getDate() + 1);
  }
  return days;
}

function groupBy(items, keyFn, valueFn = () => 1){
  return items.reduce((acc, item) => {
    const key = keyFn(item);
    const value = valueFn(item);
    acc[key] = (acc[key] || 0) + value;
    return acc;
  }, {});
}

function sumBy(items, fn){
  return items.reduce((acc, item) => acc + Number(fn(item) || 0), 0);
}

function average(values){
  if(!values.length) return 0;
  return values.reduce((a,b) => a+b, 0) / values.length;
}

function destroyERPCharts(){
  Object.values(erpCharts).forEach(chart => {
    if(chart && typeof chart.destroy === "function") chart.destroy();
  });
  erpCharts = {};
}

function showERPEmpty(message){
  return `<div class="empty-state"><i class="fa-regular fa-folder-open" style="font-size:26px;margin-bottom:10px;"></i><div>${message}</div></div>`;
}

function showERPError(message){
  return `<div class="empty-state" style="color:#fecaca;border-color:rgba(239,68,68,.25);">
    <i class="fa-solid fa-circle-exclamation" style="font-size:26px;margin-bottom:10px;"></i>
    <div>${message}</div>
  </div>`;
}

/* ========= Supabase data ========= */

async function fetchPedidosByRange(range){
  const from = toISODate(range.start);
  const to = toISODate(range.end);

  const { data, error } = await db
    .from(ERP_CONFIG.pedidosTable)
    .select("*")
    .gte(ERP_CONFIG.fechaColumn, from)
    .lte(ERP_CONFIG.fechaColumn, to)
    .order(ERP_CONFIG.fechaColumn, { ascending: true });

  if(error) throw error;
  return data || [];
}

async function fetchGastosByRange(range){
  const from = toISODate(range.start);
  const to = toISODate(range.end);

  const { data, error } = await db
    .from(ERP_CONFIG.gastosTable)
    .select("*")
    .gte("fecha", from)
    .lte("fecha", to)
    .order("fecha", { ascending: false });

  if(error){
    if(String(error.message || "").toLowerCase().includes("relation") || String(error.message || "").toLowerCase().includes("does not exist")){
      return [];
    }
    throw error;
  }

  return data || [];
}

async function fetchPedidoDetallesByPedidoIds(ids=[]){
  if(!ids.length) return [];

  const { data, error } = await db
    .from(ERP_CONFIG.detallesTable)
    .select("*")
    .in(ERP_CONFIG.detallesPedidoIdColumn, ids);

  if(error){
    if(String(error.message || "").toLowerCase().includes("relation") || String(error.message || "").toLowerCase().includes("does not exist")){
      return [];
    }
    throw error;
  }

  return data || [];
}

/* ========= Estadísticas ========= */

async function loadStatisticsModule(){
  const content = document.getElementById("statsContent");

  try{
    const range = getRangeFromMode(erpCurrentRange);
    const previousRange = getPreviousRange(range);

    const [pedidos, pedidosPrevios] = await Promise.all([
      fetchPedidosByRange(range),
      fetchPedidosByRange(previousRange)
    ]);

    if(!pedidos.length){
      content.innerHTML = showERPEmpty("No hay pedidos en el rango seleccionado.");
      return;
    }

    const pedidoIds = pedidos.map(p => p.id).filter(Boolean);
    const detalles = await fetchPedidoDetallesByPedidoIds(pedidoIds);

    const currentSales = sumBy(pedidos, p => p[ERP_CONFIG.totalColumn]);
    const prevSales = sumBy(pedidosPrevios, p => p[ERP_CONFIG.totalColumn]);
    const pedidosCount = pedidos.length;
    const avgTicket = pedidosCount ? currentSales / pedidosCount : 0;
    const growth = prevSales > 0 ? ((currentSales - prevSales) / prevSales) * 100 : (currentSales > 0 ? 100 : 0);

    const today = toISODate(getSelectedBaseDate());
    const currentMonthStart = toISODate(startOfMonth(getSelectedBaseDate()));
    const ventasDelDia = sumBy(pedidos.filter(p => p[ERP_CONFIG.fechaColumn] === today), p => p[ERP_CONFIG.totalColumn]);
    const ventasDelMes = sumBy(pedidos.filter(p => p[ERP_CONFIG.fechaColumn] >= currentMonthStart), p => p[ERP_CONFIG.totalColumn]);

    const dailyMap = groupBy(
      pedidos,
      p => p[ERP_CONFIG.fechaColumn],
      p => Number(p[ERP_CONFIG.totalColumn] || 0)
    );

    const weekdayNames = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const weekdayMap = pedidos.reduce((acc, p) => {
      const day = new Date(p[ERP_CONFIG.fechaColumn] + "T12:00:00").getDay();
      const key = weekdayNames[day];
      acc[key] = (acc[key] || 0) + Number(p[ERP_CONFIG.totalColumn] || 0);
      return acc;
    }, {});

    const topClientesMap = groupBy(
      pedidos,
      p => p[ERP_CONFIG.clienteColumn] || "Sin cliente",
      p => Number(p[ERP_CONFIG.totalColumn] || 0)
    );

    const topClientes = Object.entries(topClientesMap)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5);

    const topProductosMap = detalles.reduce((acc, item) => {
      const key = item[ERP_CONFIG.detalleProductoColumn] || "Producto";
      const qty = Number(item[ERP_CONFIG.detalleCantidadColumn] || 0);
      acc[key] = (acc[key] || 0) + qty;
      return acc;
    }, {});

    const topProductos = Object.entries(topProductosMap)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,8);

    const dailyEntries = Object.entries(dailyMap).sort((a,b)=>a[0].localeCompare(b[0]));
    const bestDay = dailyEntries.length ? dailyEntries.reduce((a,b)=>a[1] > b[1] ? a : b) : null;
    const worstDay = dailyEntries.length ? dailyEntries.reduce((a,b)=>a[1] < b[1] ? a : b) : null;
    const bestClient = topClientes[0] || null;

    content.innerHTML = `
      <div class="erp-section">
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">Ventas del día</div>
            <div class="kpi-value">${formatMoney(ventasDelDia)}</div>
            <div class="kpi-trend neutral">Fecha base: ${escapeHtml(today)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Ventas del mes</div>
            <div class="kpi-value">${formatMoney(ventasDelMes)}</div>
            <div class="kpi-trend neutral">Acumulado mensual</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Número de pedidos</div>
            <div class="kpi-value">${formatNumber(pedidosCount)}</div>
            <div class="kpi-trend neutral">En ${range.label.toLowerCase()}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Ticket promedio</div>
            <div class="kpi-value">${formatMoney(avgTicket)}</div>
            <div class="kpi-trend neutral">Ingreso promedio por pedido</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Crecimiento</div>
            <div class="kpi-value">${growth.toFixed(1)}%</div>
            <div class="kpi-trend ${growth > 0 ? 'up' : growth < 0 ? 'down' : 'neutral'}">
              ${growth > 0 ? '▲' : growth < 0 ? '▼' : '•'} vs período anterior
            </div>
          </div>
        </div>
      </div>

      <div class="erp-section stats-grid">
        <div class="chart-card">
          <h3>Ventas por día</h3>
          <canvas id="salesByDayChart"></canvas>
          <div class="soft-note">Ideal para leer tendencia de los últimos días dentro del rango seleccionado.</div>
        </div>

        <div class="info-card">
          <h3>Lectura de negocio</h3>

    renderSalesByDayChart(dailyEntries);

async function registrarGasto(){

function calcular(){

let total = 0;
let texto = "";
let bendaje = "BENDAJE:\n";

productos.forEach((p,i)=>{

let cantInput = document.getElementById("cant"+i);
let dinInput = document.getElementById("din"+i);

// 🚨 si no encuentra inputs, salta
if(!cantInput || !dinInput) return;

let cant = Number(cantInput.value) || 0;
let din = Number(limpiarFormato(dinInput.value)) || 0;

let precio = p.precio;

// 🔥 MODOS
if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
if(modo==="tiberio" && p.name==="PAN QUESILLO (1.200)") precio=1000;

let panes = 0;
let subtotal = 0;

if(p.name === "PAN DE 2.000" && modo !== "original"){

    if(din > 0){

        if(din >= 5000 && din < 6000){
            panes = 3;
            subtotal = 5000;
        } 
        else if(din >= 14000 && din < 20000){
    panes = 9;
    subtotal = 15000;
} 
        else {
            panes = Math.floor(din / precio);
            subtotal = panes * precio;
        }

    } else if(cant > 0){

        // 🔥 PROMOS POR CANTIDAD (CORREGIDO)
        if(cant === 3){
            panes = 3;
            subtotal = 5000;
        } 
        else if(cant >= 7 && cant <= 9){
    panes = 9;
    subtotal = 15000;
} 
        else {
            panes = cant;
            subtotal = panes * precio;
        }
    }
}
    else {

    if(din > 0){
        panes = Math.floor(din / precio);
    } else if(cant > 0){
        panes = cant;
    }

    subtotal = panes * precio;
}     

// 🚨 SOLO SI HAY ALGO
if(subtotal > 0){

let b = 0;

if (p.name.trim() === "PAN DE 3.500") {
    b = 0;
}
else if (p.name.trim() === "PAN DE 2.000") {

    // 🔥 SIN BENDAJE EN PROMOS
    if(
        modo !== "original" &&
        (panes === 3 || panes === 7 || panes === 8 || panes === 9)
    ){
        b = 0;
    } else {
        b = Math.round(panes * 0.2);
    }

}
else {
    b = p.b ? Math.round(panes * 0.2) : 0;
}
bendaje += `${p.name}: ${b}\n`;
// 🔥 ESTO ES LO QUE TE FALLABA
total += subtotal;

texto += "------------------------------\n";
texto += `${p.name} x ${panes} =$${subtotal.toLocaleString('es-CO')}\n`;
texto += `Bendaje: ${b}\n`;

}

});

// 🔥 MOSTRAR RESULTADOS
document.getElementById("resultadoBox").innerText = texto;
document.getElementById("bendajeBox").innerText = bendaje;

// 🔥 GUARDAR GLOBAL
window.totalPedido = total;
window.bendajePedido = bendaje;
// 🔥 MANEJO DE DEUDAS
let leDebo = document.getElementById("leDebo")?.checked;
let meDebeCheck = document.getElementById("meDebeCheck")?.checked;
let meDebeValor = Number(document.getElementById("meDebeValor")?.value) || 0;

let leDeboValor = Number(document.getElementById("leDeboValor")?.value) || 0;

let totalFinal = total;

// 🔴 LE DEBO → RESTA LO QUE DEBO
if(leDebo && leDeboValor > 0){
    totalFinal -= leDeboValor;
}

// 🟢 ME DEBE → SUMA
if(meDebeCheck && meDebeValor > 0){
    totalFinal += meDebeValor;
}

// 🔥 mostrar total final
let textoFinal = "";

if(leDebo){
    textoFinal = "SALDO A FAVOR: $" + Math.abs(totalFinal).toLocaleString('es-CO');
} else {
    textoFinal = "COBRAR: $" + totalFinal.toLocaleString('es-CO');
}

document.getElementById("totalFinal").innerText = textoFinal;

// guardar global
window.totalFinal = totalFinal;
window.textoPedido = texto;
window.bendajePedido = bendaje;
}

function openERPPanel(tipo){
  const overlay = document.getElementById("erpOverlay");
  const title = document.getElementById("erpPanelTitle");
  const subtitle = document.getElementById("erpPanelSubtitle");
  const badge = document.getElementById("erpPanelBadge");
  const body = document.getElementById("erpPanelBody");

  if(!overlay || !title || !subtitle || !badge || !body){
    alert("Falta el panel ERP en el HTML");
    return;
  }

  if(tipo === "estadisticas"){
    title.innerText = "Estadísticas";
    subtitle.innerText = "Vista inicial del módulo estadístico.";
    badge.innerHTML = '<i class="fa-solid fa-chart-line"></i> Estadísticas';
    body.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-chart-column" style="font-size:26px;margin-bottom:10px;"></i>
        <div>El panel de estadísticas ya está conectado visualmente.</div>
      </div>
    `;
  } else {
    title.innerText = "Contabilidad";
    subtitle.innerText = "Vista inicial del módulo contable.";
    badge.innerHTML = '<i class="fa-solid fa-wallet"></i> Contabilidad';
    body.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-wallet" style="font-size:26px;margin-bottom:10px;"></i>
        <div>El panel de contabilidad ya está conectado visualmente.</div>
      </div>
    `;
  }

  overlay.classList.add("show");
}

function closeERPPanel(){
  const overlay = document.getElementById("erpOverlay");
  if(overlay){
    overlay.classList.remove("show");
  }
}

function handleOverlayClose(event){
  if(event.target && event.target.id === "erpOverlay"){
    closeERPPanel();
  }
}
