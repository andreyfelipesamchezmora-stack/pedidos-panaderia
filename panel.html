<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#222;
color:white;
padding:15px;
overflow-y:auto;
}

.fecha-btn{
background:#333;
padding:8px;
margin-bottom:8px;
border-radius:6px;
cursor:pointer;
}

.fecha-btn:hover{
background:#444;
}

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
position:relative;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.ticket{
background:white;
width:80mm;
max-width:80mm;
padding:5px; /* menos margen interno */
font-family:monospace;
font-size:15px; /* letra más grande */
line-height:1.4;
}
textarea{
width:100%;
font-size:12px;
border:1px solid #ccc;
resize:none;
overflow:hidden;
}

button{
width:100%;
margin-top:6px;
padding:8px;
cursor:pointer;
}

.gran-total{
font-size:22px;
font-weight:bold;
color:black;
text-align:center;
margin-top:10px;
}

@media print {

body{
margin:0;
}

body *{
visibility:hidden;
}

.ticket, .ticket *{
visibility:visible;
}

.ticket{
position:absolute;
left:0;
top:0;
width:80mm;
margin:0;
padding:5px;
}

button{
display:none;
}

textarea{
border:none;
}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>Fechas</h3>
<div id="fechas"></div>
</div>

<div class="main">
<h2>Pedidos del día</h2>
<div class="grid" id="grid"></div>
</div>

</div>

<div class="modal" id="modal">
<div class="ticket">

<div contenteditable="true" style="text-align:center;">
<strong>Panadería VIANNYS</strong><br>
NIT: 1.076.501.617<br>
Tel: 3134062278<br>
Barrio: San Jorge
</div>

<hr>

<div id="clienteNombre"></div>

<textarea id="facturaTexto"></textarea>

<button onclick="imprimir()">🖨 Imprimir</button>
<button onclick="guardar()">💾 Guardar cambios</button>
<button onclick="cerrar()">Cerrar</button>

</div>
</div>

<script>

const SUPABASE_URL = "https://vswostjubcxjotpqnzhk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzd29zdGp1YmN4am90cHFuemhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTAyNDksImV4cCI6MjA4Nzg2NjI0OX0.VIWMJWyubtKj7QCoOybia_Fv2S4sjxFelQz9x1tZKBo";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let pedidoId = null;

async function cargarFechas(){
const { data } = await db.from("pedidos").select("fecha");

if(!data) return;

let fechas = [...new Set(data.map(p => p.fecha.split("T")[0]))].sort().reverse();

let cont = document.getElementById("fechas");
cont.innerHTML = "";

fechas.forEach(f=>{
cont.innerHTML += `<div class="fecha-btn" onclick="cargarPedidos('${f}')">${f}</div>`;
});
}

async function cargarPedidos(fecha){

const { data } = await db.from("pedidos").select("*");

let grid = document.getElementById("grid");
grid.innerHTML = "";

if(!data) return;

let filtrados = data.filter(p => p.fecha.split("T")[0] === fecha);

if(filtrados.length === 0){
grid.innerHTML = "<p>No hay pedidos este día</p>";
return;
}

filtrados.forEach(p=>{
grid.innerHTML += `
<div class="card">
<div onclick="abrir(${p.id}, \`${p.pedido}\`, \`${p.cliente}\`)">
<h4>${p.cliente}</h4>
<p>$${p.total}</p>
</div>
<div onclick="event.stopPropagation(); eliminarPedido(${p.id})" 
style="position:absolute;top:8px;right:10px;color:red;font-weight:bold;cursor:pointer;font-size:18px;">
✖
</div>
</div>
`;
});
}

function abrir(id, texto, cliente){

pedidoId = id;
document.getElementById("modal").style.display = "flex";
document.getElementById("clienteNombre").innerHTML = "<strong>Cliente:</strong> " + cliente;

let lineas = texto.split("\n");
let nuevoTexto = "";
let total = 0;

const conBendaje = [
"PAN DE 500",
"PAN DE 1.000",
"PAN DE 2.000",
"PAN AGRIDULCE 500",
"PAN AGRIDULCE 1.000",
"PAN ROLLO",
"MOGICON DE 500"
];

lineas.forEach(l=>{

if(l.includes("x") && l.includes("$")){

let nombre = l.split("x")[0].trim();
let cantidad = parseInt(l.split("x")[1]) || 0;
let subtotal = parseInt(l.split("$")[1].replace(/\./g,"")) || 0;

total += subtotal;
nuevoTexto += `--------------------------\n`;
nuevoTexto += `${nombre} x${cantidad} = $${subtotal.toLocaleString()}\n`;

if(conBendaje.some(p => nombre.toUpperCase().includes(p))){
let bendaje = Math.floor(cantidad * 0.20);
nuevoTexto += `Bendaje 20%: ${bendaje} panes\n`;
}

nuevoTexto += "\n";
}
});

nuevoTexto += `--------------------------\n`;
nuevoTexto += `===========================\n`;
nuevoTexto += `TOTAL A COBRAR: $${total.toLocaleString()}\n`;
nuevoTexto += `===========================\n`;

document.getElementById("facturaTexto").value = nuevoTexto;
autoResize();
}

async function eliminarPedido(id){
if(!confirm("¿Eliminar este pedido?")) return;
await db.from("pedidos").delete().eq("id", id);
cargarFechas();
document.getElementById("grid").innerHTML="";
}

async function guardar(){
let nuevo = document.getElementById("facturaTexto").value;
await db.from("pedidos").update({pedido:nuevo}).eq("id", pedidoId);
alert("Factura actualizada ✔");
}

function imprimir(){ window.print(); }

function cerrar(){ document.getElementById("modal").style.display="none"; }

function autoResize(){
let area = document.getElementById("facturaTexto");
area.style.height = "auto";
area.style.height = area.scrollHeight + "px";
}

cargarFechas();

</script>

</body>
</html>
