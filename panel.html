.x{
position:absolute;
top:5px;
right:8px;

cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;

async function cargar(){

    let fechaInput = document.getElementById("fecha");

    // 🔥 asegurar fecha SIEMPRE
    if(!fechaInput.value){
        fechaInput.value = new Date().toISOString().split("T")[0];
    }

    let fechaSeleccionada = fechaInput.value;

    let data = [];

    try {

        let res = await db.from("pedidos")
        .select("*")
        .eq("fecha", fechaSeleccionada);

        if(res.error){
            console.error("❌ Supabase error:", res.error);
        } else {
            data = res.data || [];
        }

    } catch(e){
        console.error("❌ Error general:", e);
        data = [];
    }

    let total = 0;
    let grid = document.getElementById("grid");

    // 🔥 SIEMPRE limpiar
    grid.innerHTML = "";

    // 🔥 SI NO HAY CLIENTES (ultra defensa)
    if(!clientes || clientes.length === 0){
        grid.innerHTML = "<h3 style='color:red'>No hay clientes cargados</h3>";
        return;
    }

    // 🔥 RENDER SEGURO
    clientes.forEach(c => {

        let p = data.find(x => x.cliente === c.nombre) || null;

        let t = p ? Number(p.total) || 0 : 0;
        total += t;

        grid.innerHTML += `
        <div class="card ${c.tipo} ${p ? (p.editado ? 'editado' : 'nuevo') : ''}"
        onclick="abrir('${c.nombre}', ${p?.id || 0})">

        <div class="printMini" 
onclick="event.stopPropagation(); imprimirDirecto('${c.nombre}')">
🖨️
</div>

        <div class="x" 
        onclick="event.stopPropagation(); eliminar(${p?.id || 0}, '${c.nombre}')">
        ✖
        </div>

        <h4>${c.nombre}</h4>
        <p>$${t.toLocaleString('es-CO')}</p>

        </div>`;
    });
// 🔥 guardar siempre el estado actual
localStorage.setItem("clientes", JSON.stringify(clientes));
}

async function abrir(nombre,id){
clienteActivo = nombre;
actualCliente = nombre;
actualId = id || null;

document.getElementById("clienteTitulo").innerText = nombre;
document.getElementById("modalPedido").style.display = "flex";

// 🔥 CARGAR PEDIDO REAL POR CLIENTE + FECHA
let fechaSeleccionada = document.getElementById("fecha").value;

let {data} = await db.from("pedidos")
.select("*")
.eq("cliente", nombre)
.eq("fecha", fechaSeleccionada)
.single();

if(data){
// 🔥 CARGAR PRODUCTOS EN INPUTS
if(data.productos && Array.isArray(data.productos)){

    data.productos.forEach(prodGuardado => {

        let index = productos.findIndex(p => p.name === prodGuardado.nombre);

        if(index !== -1){

            let cantInput = document.getElementById("cant"+index);
            let dinInput = document.getElementById("din"+index);

            if(cantInput) cantInput.value = prodGuardado.cantidad || "";
            if(dinInput) dinInput.value = prodGuardado.dinero || "";

            // 🔥 pintar en verde como activo
            marcar(index);
        }

    });

}
window.totalPedido = data.total;
window.textoPedido = data.pedido;

document.getElementById("resultadoBox").innerText = data.pedido;
document.getElementById("bendajeBox").innerText = "";

document.getElementById("comentarios").value = data.comentario || "";
clienteActivo = nombre;

// limpiar inputs primero
document.querySelectorAll(".cantidad").forEach(i => i.value = "");
document.querySelectorAll(".precio").forEach(i => i.value = "");

}

}
function calcular(){

let total = 0;
let texto = "";
let bendaje = "BENDAJE:\n";

productos.forEach((p,i)=>{

let cantInput = document.getElementById("cant"+i);
let dinInput = document.getElementById("din"+i);

// 🚨 si no encuentra inputs, salta
if(!cantInput || !dinInput) return;

let cant = Number(cantInput.value) || 0;
let din = Number(limpiarFormato(dinInput.value)) || 0;

let precio = p.precio;

// 🔥 MODOS
if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
if(modo==="tiberio" && p.name==="PAN QUESILLO") precio=1000;

let panes = din>0 ? Math.floor(din/precio) : cant;
let subtotal = panes * precio;

// 🔥 CONDICIONES PAN 2.000
if(p.name==="PAN DE 2.000" && modo!=="original"){
if(panes>=3 && panes<=4){panes=3; subtotal=5000;}
if(panes>=7){panes=9; subtotal=15000;}
}

// 🚨 SOLO SI HAY ALGO
if(subtotal > 0){

let b = 0;

// 🔥 regla especial PAN DE 2.000
if(p.name === "PAN DE 2.000"){

    // 👉 solo calcula bendaje en modo ORIGINAL
    if(modo === "original"){
        b = Math.round(panes * 0.2);
    } else {
        b = 0;
    }

} else {

    // 👉 resto de productos normal
    b = p.b ? Math.round(panes * 0.2) : 0;

}

// 🔥 ESTO ES LO QUE TE FALLABA
total += subtotal;

texto += "------------------------------\n";
texto += `${p.name} x${panes} =$${subtotal.toLocaleString('es-CO')}\n`;
texto += `Bendaje: ${b}\n`;

}

});

// 🔥 MOSTRAR RESULTADOS
document.getElementById("resultadoBox").innerText = texto;
document.getElementById("bendajeBox").innerText = bendaje;

// 🔥 GUARDAR GLOBAL
window.totalPedido = total;
// 🔥 MANEJO DE DEUDAS
let leDebo = document.getElementById("leDebo")?.checked;
let meDebeCheck = document.getElementById("meDebeCheck")?.checked;
let meDebeValor = Number(document.getElementById("meDebeValor")?.value) || 0;

let leDeboValor = Number(document.getElementById("leDeboValor")?.value) || 0;

let totalFinal = total;

// 🔴 LE DEBO → RESTA LO QUE DEBO
if(leDebo && leDeboValor > 0){
    totalFinal -= leDeboValor;
}

// 🟢 ME DEBE → SUMA
if(meDebeCheck && meDebeValor > 0){
    totalFinal += meDebeValor;
}

// 🔥 mostrar total final
let textoFinal = "";

if(leDebo){
    textoFinal = "SALDO A FAVOR: $" + Math.abs(totalFinal).toLocaleString('es-CO');
} else {
    textoFinal = "COBRAR: $" + totalFinal.toLocaleString('es-CO');
}

document.getElementById("totalFinal").innerText = textoFinal;

// guardar global
window.totalFinal = totalFinal;
window.textoPedido = texto;

}

async function guardar() {

    if (!actualCliente) {
        alert("No hay cliente activo");
        return;
    }

    let fechaInput = document.getElementById("fecha");
    let fecha = fechaInput.value;

    if (!fecha) {
        fecha = new Date().toISOString().split("T")[0];
        fechaInput.value = fecha;
    }

    let total = 0;
    let texto = "";
    let listaProductos = []; // ✅ FUERA del loop

    productos.forEach((p, i) => {

        let cant = Number(document.getElementById("cant"+i)?.value) || 0;
        let din = Number(limpiarFormato(document.getElementById("din"+i)?.value || "0")) || 0;

        let precio = p.precio;

        if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
        if(modo==="tiberio" && p.name==="PAN QUESILLO") precio=1000;

        let panes = din>0 ? Math.floor(din/precio) : cant;
        let subtotal = panes * precio;

        if(cant > 0 || din > 0){
            listaProductos.push({
                nombre: p.name,
                cantidad: cant,
                dinero: din
            });
        }

        if(subtotal > 0){
            total += subtotal;

            texto += `
${p.name} x${panes} = $${subtotal}
`;
        }
    });

    let comentario = document.getElementById("comentarios").value || "";

    if (actualId) {

        let { error } = await db.from("pedidos")
        .update({
            total: total,
            pedido: texto,
            comentario: comentario,
            productos: listaProductos,
            editado: true
        })
        .eq("id", actualId);

        if (error) {
            console.error(error);
            alert("Error al actualizar");
            return;
        }

    } else {

        let { error } = await db.from("pedidos")
        .insert([{
            cliente: actualCliente,
            fecha: fecha,
            total: total,
            pedido: texto,
            comentario: comentario,
            productos: listaProductos,
            editado: false
        }]);

        if (error) {
            console.error(error);
            alert("Error al guardar");
            return;
        }
    }


    cerrarModal();
    cargar();
}

function resetear(){

    // 🔥 limpiar inputs de productos
    productos.forEach((p,i)=>{
        let cant = document.getElementById("cant"+i);
        let din = document.getElementById("din"+i);

        if(cant) cant.value = "";
        if(din) din.value = "";

        // 🔥 quitar color activo
        let div = document.getElementById("prod"+i);
        if(div) div.style.background = "white";
    });

    // 🔥 limpiar comentarios
    let comentario = document.getElementById("comentarios");
    if(comentario) comentario.value = "";

    // 🔥 limpiar checks
    let leDebo = document.getElementById("leDebo");
    let meDebe = document.getElementById("meDebeCheck");

    if(leDebo) leDebo.checked = false;
    if(meDebe) meDebe.checked = false;

    // 🔥 limpiar valores deuda
    let leDeboValor = document.getElementById("leDeboValor");
    if(leDeboValor) leDeboValor.value = "";

    // 🔥 limpiar resultados
    document.getElementById("resultadoBox").innerText = "";
    document.getElementById("bendajeBox").innerText = "";

    // 🔥 reset global
    window.totalPedido = 0;
    window.totalFinal = 0;
    window.textoPedido = "";

    // 🔥 recalcular UI (CLAVE)
    calcular();
}
