<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel PRO Panadería</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
.container{display:flex;height:100vh;}

.sidebar{
width:250px;
background:#111;
color:white;
padding:10px;
overflow:auto;
}

.main{flex:1;padding:15px;overflow:auto;}

.topbar{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
padding:8px;
flex:1;
}

button{
padding:8px;
cursor:pointer;
}

.total-general{
font-size:22px;
font-weight:bold;
background:#fff;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
position:relative;
cursor:pointer;
}

.card.moto{border-left:6px solid green;}
.card.auto{border-left:6px solid blue;}
.card.recoge{border-left:6px solid orange;}
.card.lejano{border-left:6px solid purple;}
.card.editado{background:#fff3a6;}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
overflow:hidden; /* 🔥 clave */
}

.ticket{
background:white;
width:80mm;
padding:5px;
font-family:monospace;
font-size:16px;
}

textarea{
width:100%;
border:none;
resize:none;
font-size:14px;
}

.x{
position:absolute;
top:5px;
right:8px;
color:red;
cursor:pointer;
font-weight:bold;
}

@media print{
body *{visibility:hidden;}
.ticket, .ticket *{visibility:visible;}
.ticket{
position:absolute;
left:0;
top:0;
width:80mm;
}
}
#resultadoBox, #bendajeBox{
background:#f9f9f9;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:14px;
white-space:pre-line;
}

#bendajeBox{
background:#fff3cd;
}
</style>
</head>

<body>

<div class="sidebar">

<input type="date" id="fecha">
<br><br>
<button onclick="nuevoCliente()">➕ Agregar Cliente</button>
</div>

<div class="main">

<div class="topbar">
<input type="text" placeholder="Buscar cliente..." oninput="filtrar(this.value)">
</div>

<div class="total-general" id="totalGeneral">
TOTAL: $0
</div>

<div class="grid" id="grid"></div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="ticket">

<div style="text-align:center;">
<strong>Panadería VIANNYS</strong><br>
NIT: 1.076.501.617<br>
Tel: 3134062278<br>
Barrio: San Jorge
</div>

<hr>

<div id="clienteNombre"></div>

<textarea id="factura"></textarea>

<button onclick="tomarPedido()">🧾 Tomar pedido</button>
<button onclick="imprimir()">🖨 Imprimir</button>
<button onclick="cerrar()">Cerrar</button>

</div>
</div>
<div class="modal" id="modalPedido">
<div class="ticket" style="
width:95%;
max-width:900px;
max-height:90vh;
overflow-y:auto;
padding:15px;
border-radius:12px;
">

<div class="container">

<h2>Pedido</h2>

<div class="layout">

<!-- 🔹 PANEL IZQUIERDO (PRODUCTOS) -->
<div style="flex:1;">
<div id="productos"></div>

<!-- 🔹 PANEL DERECHO (BOTONES) -->
<div class="panel-botones">

<button onclick="modo='original'">ORIGINAL</button>

<div id="bendajeBox"></div>

<style>
.layout{
display:flex;
gap:15px;
align-items:flex-start;
}

.panel-botones{
width:180px;
min-width:180px;
position:sticky;
top:10px;
height:fit-content;
}

.producto{
display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
align-items:flex-start; /* 🔥 evita deformación */

.producto img{
width:120px;
height:120px;
min-width:120px; /* 🔥 evita que se achiquen */

}

.producto.activo-cant{background:#d4ffd4;}
.producto.activo-din{background:#d4e4ff;}
</style>

<script>

let modo="promo";

const productos=[
{name:"PAN DE 500",precio:500,b:true,img:""},
{name:"PAN DE 1.000",precio:1000,b:true,img:""},
{name:"PAN DE 2.000",precio:2000,b:true,img:""},
{name:"PAN DE 3.500",precio:3500,b:true,img:""},
{name:"PAN AGRIDULCE DE 500",precio:500,b:true,img:""},
{name:"PAN AGRIDULCE DE 1.000",precio:1000,b:true,img:""},
{name:"PAN ROLLO",precio:500,b:true,img:""},
{name:"PAN QUESILLO",precio:1200,b:false,img:""},
{name:"LIBERALES",precio:500,b:false,img:""},
{name:"CAÑAS",precio:500,b:false,img:""},
{name:"PAN COCO",precio:500,b:false,img:""},
{name:"MOGICON DE 500",precio:500,b:true,img:""},
{name:"MOGICON DE 1.200",precio:1200,b:false,img:""},
{name:"ROSCON DE 2.500",precio:2500,b:false,img:""},
{name:"HAWAIANOS",precio:1500,b:false,img:""},
{name:"CROASANES",precio:1500,b:false,img:""}
];

// 🔹 RENDER PRODUCTOS
const div=document.getElementById("productos");

productos.forEach((p,i)=>{
div.innerHTML+=`
<div class='producto' id='prod${i}'>
<img src='${p.img || "https://via.placeholder.com/130"}'>
<div style='flex:1'>
<b>${p.name}</b><br>
Cantidad:
<input id='cant${i}' type='number' min="0">
Dinero:
<input id='din${i}' type='number' min="0">
</div>
</div>`;
});

// 🔹 COLORES AUTOMÁTICOS
productos.forEach((p,i)=>{
let cant=document.getElementById("cant"+i);
let din=document.getElementById("din"+i);
let cont=document.getElementById("prod"+i);

cant.addEventListener("input",()=>{
cont.classList.remove("activo-din");
if(cant.value>0){
cont.classList.add("activo-cant");
}else{
cont.classList.remove("activo-cant");
}
});

din.addEventListener("input",()=>{
cont.classList.remove("activo-cant");
if(din.value>0){
cont.classList.add("activo-din");
}else{
cont.classList.remove("activo-din");
}
});
});

// 🔹 PROMO PAN 2000
function promo2000(cant){

if(modo==="original") return {panes:cant,total:cant*2000};

if(cant>=3 && cant<=4){
return {panes:3,total:5000};
}
if(cant>=7 && cant<=9){
return {panes:9,total:15000};
}

return {panes:cant,total:cant*2000};
}

// 🔹 CALCULAR
function calcular(){

let total=0;
let texto="";
let textoB="BENDAJE 20%:\n";
let bendajeTotal=0;

productos.forEach((p,i)=>{

let cant=Number(document.getElementById('cant'+i).value)||0;
let din=Number(document.getElementById('din'+i).value)||0;

let precio=p.precio;

// MODOS
if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
if(modo==="tiberio" && p.name==="PAN QUESILLO") precio=1000;

let panes = din>0 ? Math.floor(din/precio) : cant;
let subtotal=0;

// 🔥 PROMO SOLO SI NO ES ORIGINAL
if(p.name==="PAN DE 2.000" && modo!=="original"){

if(panes>=3 && panes<=4){
panes=3;
subtotal=5000;
}
else if(panes>=7 && panes<=9){
panes=9;
subtotal=15000;
}
else{
subtotal=panes*precio;
}

}else{
subtotal=panes*precio;
}

// SUMAR
if(subtotal>0){

texto+=`${p.name} x${panes} = $${subtotal.toLocaleString()}\n`;
total+=subtotal;

// 🔥 BENDAJE
if(p.b){
let b = Math.round(panes*0.20);
if(b>0){
textoB+=`${p.name} → ${b} panes\n`;
bendajeTotal += b * precio;
}
}

}

});

texto+=`\nTOTAL = $${total.toLocaleString()}`;
textoB+=`\nTOTAL BENDAJE = $${bendajeTotal.toLocaleString()}`;

// MOSTRAR BONITO
document.getElementById("resultadoBox").innerText=texto;
document.getElementById("bendajeBox").innerText=textoB;
document.getElementById("totalCobrar").innerText="TOTAL A COBRAR: $"+total.toLocaleString();

window.totalPedido=total;
window.textoPedido=texto + "\n\n" + textoB;
}

// PROMO SOLO PAN 2000
if(p.name==="PAN DE 2.000"){
let res=promo2000(panes);
panes=res.panes;
subtotal=res.total;
}else{
subtotal=panes*precio;
}

if(subtotal>0){
texto+=`${p.name} x${panes} = $${subtotal.toLocaleString()}\n`;
total+=subtotal;
}

});

texto+=`\nTOTAL = $${total.toLocaleString()}`;

document.getElementById("resultado").innerText=texto;
document.getElementById("totalCobrar").innerText="TOTAL: $"+total.toLocaleString();

window.totalPedido=total;
window.textoPedido=texto;
}

// 🔥 GUARDAR + CERRAR + REFRESCAR
async function guardarPedidoDirecto(){

if(!window.totalPedido){
alert("Primero calcula el pedido");
return;
}

await db.from("pedidos")
.update({
pedido:window.textoPedido,
total:window.totalPedido,
editado:false
})
.eq("id", actualId);

// 🔥 CERRAR MODAL PRINCIPAL
document.getElementById("modal").style.display="none";

// 🔥 REFRESCAR PANEL
cargar();

}

</script>

</div>
</div>

async function cargar(){

let fecha = document.getElementById("fecha").value;

const {data} = await db.from("pedidos").select("*");

let grid = document.getElementById("grid");
grid.innerHTML="";
let total=0;

clientes.forEach(c=>{

let p = data.find(x=>x.cliente===c.nombre && x.fecha.startsWith(fecha));

let t = p ? p.total : 0;
if(t) total += t;

grid.innerHTML+=`
<div class="card ${c.tipo} ${p?.editado?"editado":""}" onclick="abrir('${c.nombre}','${c.tipo}',${p?.id||0})">

<h4>${c.nombre}</h4>
<p>$${t}</p>
</div>
`;

});

document.getElementById("totalGeneral").innerText = "TOTAL: $" + total.toLocaleString();

}

function filtrar(txt){
document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(txt.toLowerCase())?"block":"none";
});
}

function abrir(nombre,tipo,id){
actualId=id;
document.getElementById("modal").style.display="flex";
document.getElementById("clienteNombre").innerHTML="<b>"+nombre+"</b>";
document.getElementById("factura").value="";
}

async function guardarAuto(texto){
let fecha = document.getElementById("fecha").value;

let total = [...texto.matchAll(/\$(\d+)/g)].reduce((a,b)=>a+parseInt(b[1]),0);

if(actualId){
await db.from("pedidos").update({pedido:texto,total,editado:true}).eq("id",actualId);
}else{
await db.from("pedidos").insert({
cliente:document.getElementById("clienteNombre").innerText,
pedido:texto,
total,
fecha,
editado:false
});
}

cargar();
}

document.getElementById("factura").addEventListener("input",(e)=>{
guardarAuto(e.target.value);
});

function cerrar(){document.getElementById("modal").style.display="none";}
function imprimir(){window.print();}

function eliminar(id){
if(!id) return;
if(confirm("Eliminar?")){
db.from("pedidos").delete().eq("id",id);
cargar();
}
}

function nuevoCliente(){
let nombre = prompt("Nombre cliente");
let tipo = prompt("Tipo: moto / auto / recoge / lejano");

if(nombre && tipo){
clientes.push({nombre,tipo});
cargar();
}
}

function tomarPedido(){

}

cargar();
 
  function resetear(){

productos.forEach((p,i)=>{

document.getElementById('din'+i).value="";

});

}
