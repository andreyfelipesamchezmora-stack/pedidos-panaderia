// MÓDULO V20 — DEUDAS + CARTERA (LIMPIO)
// =====================================================
(function(){
'use strict';

var DK = 'vn_deudas_v20';
function dLeer(){ try{return JSON.parse(localStorage.getItem(DK)||'{}');}catch(e){return {};} }
function dGuardar(d){ localStorage.setItem(DK, JSON.stringify(d||{})); }
function dGet(n){ var d=dLeer(); if(!d[n]) d[n]={sc:0,sm:0,h:[]}; if(!Array.isArray(d[n].h)) d[n].h=[]; if(typeof d[n].sc!=='number') d[n].sc=Number(d[n].sc)||0; if(typeof d[n].sm!=='number') d[n].sm=Number(d[n].sm)||0; return d[n]; }
function dMoney(n){ return '$'+(Number(n)||0).toLocaleString('es-CO'); }

// Normaliza la estructura de un registro de deuda (migración segura)
function dNorm(d, nombre){
  if(!d[nombre]) d[nombre] = {sc:0, sm:0, h:[]};
  if(typeof d[nombre].sc !== 'number') d[nombre].sc = Number(d[nombre].sc)||0;
  if(typeof d[nombre].sm !== 'number') d[nombre].sm = Number(d[nombre].sm)||0;
  if(!Array.isArray(d[nombre].h)) d[nombre].h = [];
  return d[nombre];
}

// Agregar deuda
window.vnDeudaAgregar = function(nombre, tipo, monto, nota){
  var d=dLeer(); dNorm(d, nombre);
  monto=Math.abs(Number(monto)||0); if(monto<=0) return;
  if(tipo==='cliente') d[nombre].sc+=monto; else d[nombre].sm+=monto;
  d[nombre].h.push({id:'d'+Date.now(),fecha:new Date().toISOString().slice(0,10),hora:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),tipo:'deuda',sub:tipo,monto:monto,saldo:tipo==='cliente'?d[nombre].sc:d[nombre].sm,nota:nota||''});
  dGuardar(d);
  if(Array.isArray(window.movimientosContables)){
    window.movimientosContables.push({tipo:'deuda',monto:monto,cuenta:'—',descripcion:(tipo==='cliente'?'Deuda de ':'Le debo a ')+nombre+(nota?' - '+nota:''),fecha:new Date().toISOString()});
    if(typeof window._mcPersist==='function') window._mcPersist();
  }
};

// Pagar deuda
window.vnDeudaPagar = function(nombre, tipo, monto, metodo, banco, ci, nota){
  var d=dLeer(); dNorm(d, nombre);
  monto=Math.abs(Number(monto)||0); if(monto<=0) return;
  if(tipo==='cliente') d[nombre].sc=Math.max(d[nombre].sc-monto,0); else d[nombre].sm=Math.max(d[nombre].sm-monto,0);
  d[nombre].h.push({id:'p'+Date.now(),fecha:new Date().toISOString().slice(0,10),hora:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),tipo:'pago',sub:tipo,monto:monto,metodo:metodo||'',banco:banco||'',saldo:tipo==='cliente'?d[nombre].sc:d[nombre].sm,nota:nota||''});
  dGuardar(d);
  if(ci>=0 && Array.isArray(window.cuentasMemoria) && window.cuentasMemoria[ci]){
    window.cuentasMemoria[ci].saldo+=monto; if(typeof cuentasGuardar==='function') cuentasGuardar();
  }
  if(Array.isArray(window.movimientosContables)){
    window.movimientosContables.push({tipo:'ingreso',monto:monto,cuenta:banco||'Efectivo',descripcion:'Pago deuda '+nombre+(nota?' - '+nota:''),fecha:new Date().toISOString()});
    if(typeof window._mcPersist==='function') window._mcPersist();
  }
};

// Set saldo inicial
window.vnDeudaSetInicial = function(nombre, tipo, monto){
  var d=dLeer(); dNorm(d, nombre);
  monto=Math.abs(Number(monto)||0);
  if(tipo==='cliente') d[nombre].sc=monto; else d[nombre].sm=monto;
  d[nombre].h.push({id:'i'+Date.now(),fecha:new Date().toISOString().slice(0,10),hora:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),tipo:'saldo_ini',sub:tipo,monto:monto,saldo:monto,nota:'Saldo inicial'});
  dGuardar(d);
};

// Eliminar linea historial
window.vnDeudaEliminar = function(nombre, id){
  if(!confirm('¿Eliminar esta línea?')) return;
  var d=dLeer(); if(!d[nombre]) return;
  d[nombre].h=(d[nombre].h||[]).filter(function(x){return x.id!==id;});
  // Recalcular saldos
  var sc=0,sm=0;
  d[nombre].h.forEach(function(x){
    if(x.tipo==='saldo_ini'){ if(x.sub==='cliente') sc=x.monto; else sm=x.monto; }
    else if(x.tipo==='deuda'){ if(x.sub==='cliente') sc+=x.monto; else sm+=x.monto; }
    else if(x.tipo==='pago'){ if(x.sub==='cliente') sc=Math.max(sc-x.monto,0); else sm=Math.max(sm-x.monto,0); }
  });
  d[nombre].sc=sc; d[nombre].sm=sm;
  dGuardar(d);
  if(typeof renderCartera==='function') renderCartera();
};

// Listar clientes con deuda
window.vnDeudaListar = function(){
  var d=dLeer(),lista=[];
  Object.keys(d).forEach(function(n){
    if((d[n].sc||0)>0||(d[n].sm||0)>0) lista.push({nombre:n,sc:d[n].sc||0,sm:d[n].sm||0,h:d[n].h||[]});
  });
  return lista.sort(function(a,b){return (b.sc+b.sm)-(a.sc+a.sm);});
};

// ==========================================
// OVERRIDE recaudoGetDeudaHistorica → lee del store
// ==========================================
window.recaudoGetDeudaHistorica = function(nombre){
  var d=dGet(nombre);
  return {deudaCliente:d.sc||0, deudaMia:d.sm||0, deudasPagadas:0, fechaPago:'—'};
};

// ==========================================
// OVERRIDE recaudoConstruirData → add _deudaTotal
// ==========================================
var _bRC = window.recaudoConstruirData;
window.recaudoConstruirData = async function(){
  var rows = await _bRC.apply(this, arguments);
  var hoyStr = (typeof cajaFechaHoy==='function') ? cajaFechaHoy() : new Date().toISOString().slice(0,10);
  rows.forEach(function(r){
    var d = dGet(r.cliente);
    r._deudaTotalCliente = d.sc || 0;
    r._deudaTotalMia = d.sm || 0;
    r.deudaCliente = 0;
    r.deudaMia = 0;

    // Deudas REGISTRADAS HOY (afectan efectivo del día)
    var dcHoy = 0, dmHoy = 0, pagoClienteHoyEfectivo = 0, pagoMiaHoyEfectivo = 0;
    (d.h||[]).forEach(function(x){
      if(x.fecha !== hoyStr) return;
      if(x.tipo === 'deuda'){
        if(x.sub === 'cliente') dcHoy += Number(x.monto)||0;
        else if(x.sub === 'mia') dmHoy += Number(x.monto)||0;
      } else if(x.tipo === 'pago' && x.metodo === 'efectivo'){
        if(x.sub === 'cliente') pagoClienteHoyEfectivo += Number(x.monto)||0;
        else if(x.sub === 'mia') pagoMiaHoyEfectivo += Number(x.monto)||0;
      }
    });
    r._deudaClienteHoy = dcHoy;
    r._deudaMiaHoy = dmHoy;
    r._pagoClienteHoyEfectivo = pagoClienteHoyEfectivo;
    r._pagoMiaHoyEfectivo = pagoMiaHoyEfectivo;

    // Ajuste al efectivoNeto del día:
    //  - deuda cliente registrada HOY → NO me pagó esa plata → resta
    //  - deuda mía registrada HOY → cliente me dio de más / yo recibí → suma
    //  - pago de deuda en efectivo ya se suma por recaudoDomi/caja aparte
    var ef = Number(r.efectivoNeto)||0;
    ef = ef - dcHoy + dmHoy;
    if(ef < 0) ef = 0;
    r.efectivoNeto = ef;

    if(typeof recaudoClasificarResumen==='function')
      r.resumen = recaudoClasificarResumen(r._deudaTotalCliente, r._deudaTotalMia);
  });
  return rows;
};

// =====================================================
// PARCHE V23 — FIXES OPTIMIZACIÓN (sin pérdida de datos)
//   1. Fecha LOCAL real (corrige cajaFechaHoy → no más fecha de mañana por UTC)
//   2. Auto-registro del BRUTO del día en movimientosContables (historial + flujo)
//   3. Ingresos adicionales (cajaRegistrarIngreso) → registrar también en
//      movimientosContables con X para borrar (efecto contable real)
//   4. Cerrar caja NO toca ingresos/flujo (verificado, no cambia)
//   5. Cartera: nuevo "Historial General de Deudas" agregado a partir de
//      todas las h[] del store V20 (lectura, no muta nada)
//   6. Reset de Categorías por mes (excluyendo movimientos relacionados a deudas)
// =====================================================
(function(){
  'use strict';

  // ---------- Helpers de fecha local ----------
  function _pad(n){ n=String(n); return n.length<2 ? '0'+n : n; }
  function _localISO(d){
    d = d || new Date();
    if(typeof d === 'string'){
      // Si ya es YYYY-MM-DD lo devolvemos tal cual
      if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
      d = new Date(d);
    }
    if(isNaN(d.getTime())) d = new Date();
    return d.getFullYear() + '-' + _pad(d.getMonth()+1) + '-' + _pad(d.getDate());
  }
  window._fechaLocalISO = _localISO;

  // Sobreescribir cajaFechaHoy para usar fecha local SI no hay input #fecha con valor
  if(typeof window.cajaFechaHoy === 'function'){
    var _origCFH = window.cajaFechaHoy;
    window.cajaFechaHoy = function(){
      try {
        var f = document.getElementById('fecha');
        if(f && f.value) return f.value;
      } catch(e){}
      return _localISO();
    };
  }

  // ---------- 2. AUTO-BRUTO del día → movimientosContables ----------
  // Mantener UN único movimiento por día con el bruto actual.
  // Etiquetado con _autoBruto:'YYYY-MM-DD' para idempotencia.
  function _registrarBrutoDia(){
    try {
      var c = window._recaudoCache;
      if(!c || !c.resumen) return;
      var fechaStr = c.fecha || _localISO();
      var bruto = Number(c.resumen.bruto)||0;
      if(bruto <= 0) return;

      if(!Array.isArray(window.movimientosContables)) window.movimientosContables = [];
      var arr = window.movimientosContables;

      // Buscar entrada existente del día
      var idx = -1;
      for(var i=0; i<arr.length; i++){
        if(arr[i] && arr[i]._autoBruto === fechaStr){ idx = i; break; }
      }

      var fechaISO = fechaStr + 'T12:00:00';   // mediodía local: evita drift por TZ
      var entry = {
        tipo: 'ingreso',
        monto: bruto,
        cuenta: 'Ventas del día',
        descripcion: 'Bruto ventas del ' + fechaStr,
        categoria: 'Venta de Reparto',
        fecha: fechaISO,
        _autoBruto: fechaStr
      };

      if(idx >= 0){
        if((Number(arr[idx].monto)||0) === bruto) return; // sin cambios
        arr[idx] = entry;
      } else {
        arr.push(entry);
      }
      if(typeof window._mcPersist === 'function') window._mcPersist();
    } catch(e){ console.warn('V23 bruto:', e); }
  }

  // Wrap vnPrecargarRecaudo para registrar bruto cada vez que se actualiza el cache
  if(typeof window.vnPrecargarRecaudo === 'function'){
    var _origPrec = window.vnPrecargarRecaudo;
    window.vnPrecargarRecaudo = async function(){
      var r = await _origPrec.apply(this, arguments);
      try { _registrarBrutoDia(); } catch(e){}
      return r;
    };
  }
  // También al cerrar el panel de recaudo (cuando el usuario lo guardó)
  if(typeof window.renderRecaudo === 'function'){
    var _origRR = window.renderRecaudo;
    window.renderRecaudo = async function(){
      var r = await _origRR.apply(this, arguments);
      setTimeout(_registrarBrutoDia, 350);
      return r;
    };
  }

  // ---------- 2.b RECALCULAR BRUTO desde Supabase pedidos ----------
  // Mantiene UN movimiento contable por día con el bruto real de la tabla pedidos.
  // Se ejecuta al abrir Contabilidad (cualquier tab) y cada 60s mientras esté abierta.
  async function _actualizarAutoBrutoDesdePedidos(fechaArg){
    try {
      if(typeof db === 'undefined' || !db || !db.from) return;
      var fechaStr = fechaArg || ((typeof cajaFechaHoy==='function') ? cajaFechaHoy() : _localISO());

      var res = await db.from('pedidos').select('total,fecha,cliente,id').eq('fecha', fechaStr);
      if(!res || res.error || !Array.isArray(res.data)) return;

      var lista = (typeof depurarPedidosUnicos==='function')
        ? depurarPedidosUnicos(res.data)
        : res.data;

      var bruto = 0;
      lista.forEach(function(p){ bruto += Number(p.total)||0; });

      if(!Array.isArray(window.movimientosContables)) window.movimientosContables = [];
      var arr = window.movimientosContables;

      var idx = -1;
      for(var i=0; i<arr.length; i++){
        if(arr[i] && arr[i]._autoBruto === fechaStr){ idx = i; break; }
      }

      if(bruto <= 0){
        // Si no hay ventas y existía entrada → quitarla (evita ruido)
        if(idx >= 0){
          arr.splice(idx,1);
          if(typeof window._mcPersist==='function') window._mcPersist();
        }
        return;
      }

      var entry = {
        tipo: 'ingreso',
        monto: bruto,
        cuenta: 'Ventas del día',
        descripcion: 'Bruto ventas del ' + fechaStr,
        categoria: 'Venta de Reparto',
        fecha: fechaStr + 'T12:00:00',
        _autoBruto: fechaStr,
        _ventasCount: lista.length
      };

      if(idx >= 0){
        if((Number(arr[idx].monto)||0) === bruto && (Number(arr[idx]._ventasCount)||0) === lista.length) return;
        arr[idx] = entry;
      } else {
        arr.push(entry);
      }
      if(typeof window._mcPersist==='function') window._mcPersist();
    } catch(e){ console.warn('V23.1 auto-bruto pedidos:', e); }
  }
  window._actualizarAutoBrutoDesdePedidos = _actualizarAutoBrutoDesdePedidos;

  // ---------- 3. INGRESOS ADICIONALES → movimientosContables ----------
  if(typeof window.cajaRegistrarIngreso === 'function'){
    var _origCRI = window.cajaRegistrarIngreso;
    window.cajaRegistrarIngreso = async function(){
      // Capturar valores ANTES porque la función original limpia los inputs
      var pre = {
        tipo: '', desc: '', valor: 0
      };
      try {
        pre.tipo  = (document.getElementById('cajaIngresoTipo')||{}).value || '';
        pre.desc  = (document.getElementById('cajaIngresoDesc')||{}).value || '';
        pre.valor = Number((document.getElementById('cajaIngresoValor')||{}).value || 0);
      } catch(e){}

      var res = await _origCRI.apply(this, arguments);

      try {
        if(pre.valor > 0 && pre.tipo && pre.desc){
          if(!Array.isArray(window.movimientosContables)) window.movimientosContables = [];
          var fechaStr = (typeof cajaFechaHoy==='function') ? cajaFechaHoy() : _localISO();
          window.movimientosContables.push({
            tipo: 'ingreso',
            monto: Number(pre.valor)||0,
            cuenta: 'Efectivo',
            descripcion: 'Ingreso: ' + pre.desc + (pre.tipo ? ' ('+pre.tipo+')' : ''),
            categoria: pre.tipo || 'Otro Ingreso',
            fecha: fechaStr + 'T12:00:00',
            _origenCaja: 'ingreso-extra'
          });
          if(typeof window._mcPersist === 'function') window._mcPersist();
          if(typeof renderConta === 'function') setTimeout(function(){
            try { renderConta('caja'); } catch(e){}
          }, 200);
        }
      } catch(e){ console.warn('V23 ingreso extra:', e); }

      return res;
    };
  }

      var c = store[nombre]||{};
      if(!Array.isArray(c.h)) return;
      c.h.forEach(function(x){
        if(!x) return;
        todas.push({
          cliente: nombre,
          fecha: x.fecha || '',
          hora: x.hora || '',
          tipo: x.tipo || '',
          sub:  x.sub  || '',

          banco: x.banco || '',
          saldo: Number(x.saldo)||0,
          nota: x.nota || '',
          _reconstruido: x._reconstruido === true,
          id: x.id || ''
        });
      });
    });
    // Orden descendente por fecha+hora
    todas.sort(function(a,b){
      var fa = (a.fecha||'') + ' ' + (a.hora||'');
      var fb = (b.fecha||'') + ' ' + (b.hora||'');
      return fb.localeCompare(fa);
    });

    // Filtros (estado en window._vnHGFiltro)
    var f = window._vnHGFiltro || { tipo:'todos', cliente:'' };

        if(f.tipo === 'le_debo'  && !(x.tipo==='deuda' && x.sub==='mia')) return false;
        if(f.tipo === 'pagos'    && x.tipo !== 'pago') return false;
      }
      if(f.cliente && f.cliente.trim()){
        if((x.cliente||'').toLowerCase().indexOf(f.cliente.trim().toLowerCase()) === -1) return false;
      }
      return true;

    var nMoney = function(n){ return '$'+(Number(n)||0).toLocaleString('es-CO'); };

            '<td style="padding:8px 10px;font-size:13px;font-weight:800;color:'+tipoColor+';text-align:right;font-variant-numeric:tabular-nums;">'+nMoney(x.monto)+'</td>'+

// =====================================================
// PARCHE V23.2 — SYNC ROBUSTO MOVIMIENTOS CONTABLES
//   Problema raíz: el sync V12 solo sube a Supabase cuando cambia el LARGO del
//   array movimientosContables. Las actualizaciones in-place (auto-bruto que
//   reemplaza la entrada del día) no cambiaban el largo → NO se subían →
//   "En Vivo" descargaba datos viejos y sobreescribía las locales.
//
//   Fix:
//   1. Force-push inmediato a Supabase tras cada cambio que hagamos.
//   2. Merge inteligente: cuando recibimos datos de Supabase (En Vivo o
//      realtime), combinamos con lo local (preservando _autoBruto e
//      _origenCaja:'ingreso-extra' locales si Supabase no los tiene).
//   3. NO toca cartera ni deudas (otros stores).
// =====================================================
(function(){
  'use strict';

  if(typeof db === 'undefined' || !db || !db.from){
    console.warn('V23.2: db no disponible al cargar; sync robusto deshabilitado');
    return;
  }

  // ---------- Force-push directo a Supabase ----------
  var _lastPush = 0, _pushPending = null;
  window._vnSyncMC = async function(){
    try {
      var arr = window.movimientosContables;
      if(!Array.isArray(arr)) return false;
      // Throttle: máximo 1 push cada 1500ms; pendiente acumula
      var ahora = Date.now();
      if(ahora - _lastPush < 1500){
        if(_pushPending) return true;
        _pushPending = setTimeout(function(){
          _pushPending = null;
          window._vnSyncMC();
        }, 1500 - (ahora - _lastPush) + 50);
        return true;
      }
      _lastPush = ahora;
      var r = await db.from('movimientos_contables').upsert(
        {id:1, datos:arr, updated_at:new Date().toISOString()},
        {onConflict:'id'}
      );
      if(r && r.error){ console.warn('vnSyncMC err:', r.error.message||r.error); return false; }
      return true;
    } catch(e){ console.warn('vnSyncMC ex:', e); return false; }
  };

  // ---------- Merge inteligente local + remoto ----------
  // Mantiene las entradas con _autoBruto y _origenCaja:'ingreso-extra' del lado
  // que sea más reciente. Para el resto, deduplica por (descripcion+fecha+monto).
  window._vnMergeMC = function(remote, local){
    if(!Array.isArray(remote)) remote = [];
    if(!Array.isArray(local)) local = [];

    function sig(m){
      if(!m) return '';
      return (m.descripcion||'') + '|' + (m.fecha||'') + '|' + (Number(m.monto)||0) + '|' + (m.tipo||'');
    }

    var resultado = remote.slice();
    var seen = {};
    var autoBrutoIdx = {};
    resultado.forEach(function(m, i){
      seen[sig(m)] = i;
      if(m && m._autoBruto) autoBrutoIdx[m._autoBruto] = i;
    });

    local.forEach(function(m){
      if(!m) return;
      // Auto-bruto: si existe en remote, preferir el local (más reciente)
      if(m._autoBruto){
        var ix = autoBrutoIdx[m._autoBruto];
        if(ix !== undefined){
          // Comparar monto: si local trae más, usar local
          var localMonto = Number(m.monto)||0;
          var remoteMonto = Number(resultado[ix].monto)||0;
          if(localMonto >= remoteMonto) resultado[ix] = m;
        } else {
          resultado.push(m);
          autoBrutoIdx[m._autoBruto] = resultado.length - 1;
        }
        return;
      }
      // Resto: dedupe por signature
      var s = sig(m);
      if(seen[s] === undefined){
        resultado.push(m);
        seen[s] = resultado.length - 1;
      }
    });
    return resultado;
  };

  // ---------- Hook _mcPersist para que también force-push ----------
  if(typeof window._mcPersist === 'function'){
    var _origMCP = window._mcPersist;
    window._mcPersist = function(){
      try { _origMCP.apply(this, arguments); } catch(e){}
      // Force-push asíncrono (throttled)
      try { window._vnSyncMC(); } catch(e){}
    };
  }

  // ---------- Realtime: merge cuando Supabase notifica cambios ----------
  // No reemplaza el listener V12; añadimos uno paralelo con merge.
  try {
    db.channel('vn-mc-merge')
      .on('postgres_changes',
        {event:'*', schema:'public', table:'movimientos_contables', filter:'id=eq.1'},
        function(payload){
          try {
            if(payload && payload.new && Array.isArray(payload.new.datos)){
              // Esperar 600ms para que el listener V12 ya haya hecho su replace
              setTimeout(function(){
                try {
                  var local = (window.movimientosContables||[]).slice();
                  var remote = payload.new.datos;
                  var merged = window._vnMergeMC(remote, local);
                  if(merged.length > local.length || JSON.stringify(merged) !== JSON.stringify(local)){
                    window.movimientosContables = merged;
                    try { localStorage.setItem('mc_local', JSON.stringify(merged)); } catch(e){}
                  }
                } catch(e){ console.warn('merge realtime err', e); }
              }, 700);
            }
          } catch(e){}
        }
      ).subscribe();
  } catch(e){ console.warn('realtime sub err', e); }

  // ---------- Hook botón "En Vivo": snapshot antes, merge después ----------
  function _hookEnVivo(){
    var btn = document.getElementById('vnSB');
    if(!btn || btn._vnHooked) {
      if(!btn) return setTimeout(_hookEnVivo, 500);
      return;
    }
    btn._vnHooked = true;
    btn.addEventListener('click', function(){
      try {
        var snapshot = (window.movimientosContables||[]).slice();
        var snapshotGM = (window.gastosMemoria||[]).slice();
        // Save snapshot in case init wipes
        try { localStorage.setItem('mc_snapshot_envivo', JSON.stringify(snapshot)); } catch(e){}
        // Wait for init to finish (~4s buffer)
        setTimeout(function(){
          try {
            var current = window.movimientosContables || [];
            var merged = window._vnMergeMC(current, snapshot);
            if(merged.length !== current.length || JSON.stringify(merged) !== JSON.stringify(current)){
              window.movimientosContables = merged;
              try { localStorage.setItem('mc_local', JSON.stringify(merged)); } catch(e){}
              window._vnSyncMC(); // re-subir merged
              console.log('🔁 En Vivo: merge restauró '+(merged.length - current.length)+' entradas locales');
            }
            // Re-render contabilidad si está abierta
            try {
              if(document.getElementById('contaBody') && typeof renderConta === 'function'){
                renderConta(window._lastContaTab || 'resumen');
              }
            } catch(e){}
          } catch(e){ console.warn('post-envivo merge err', e); }
        }, 4500);
      } catch(e){}
    }, true); // capture phase para correr antes que el onclick V12
  }
  setTimeout(_hookEnVivo, 1500);

  // ---------- Restaurar snapshot al cargar (por si init() del V12 ya wipeo) ----------
  setTimeout(function(){
    try {
      var snap = localStorage.getItem('mc_snapshot_envivo');
      if(snap){
        var parsed = JSON.parse(snap);
        if(Array.isArray(parsed) && parsed.length > 0){
          var current = window.movimientosContables || [];
          var merged = window._vnMergeMC(current, parsed);
          if(merged.length > current.length){
            window.movimientosContables = merged;
            try { localStorage.setItem('mc_local', JSON.stringify(merged)); } catch(e){}
            console.log('🔁 V23.2: restauradas '+(merged.length - current.length)+' entradas del snapshot');
          }
        }
      }
    } catch(e){}
  }, 5000);

  console.log('✅ Parche V23.2: sync robusto + merge anti-wipe en movimientosContables');
})();

// =====================================================
// PARCHE V24 — VENTAS DESDE PEDIDOS (FUENTE REAL)
// =====================================================
// Estrategia simplificada: en lugar de competir con el sync para guardar el
// bruto en movimientosContables, leemos las ventas directamente de la tabla
// pedidos (persistente para siempre en Supabase) e inyectamos entradas

//  · Las ventas SIEMPRE aparecen porque pedidos NUNCA se borra.
//  · No duplicación: las virtuales solo viven durante el render.
//  · No toca cartera, deudas, ni datos existentes.
// =====================================================
// Cache + diagnóstico SIEMPRE disponibles, aunque db tarde
window._vnVentasPorFecha = (function(){

  console.log('_uFlujo wrapped (V24 indicador)?', !!(window._uFlujo && window._uFlujo.toString().indexOf('_conInyeccionVentas') > -1));

};

(function(){
  'use strict';

  // Setup deferido: reintentar hasta que db esté disponible
  var _setupHecho = false;
  function _setup(){
    if(_setupHecho) return;
    if(typeof db === 'undefined' || !db || !db.from) return false;
    _setupHecho = true;
    _doSetup();
    return true;
  }
  window._vnSetupV24 = _setup;

  // Reintentar varias veces
  var _intentos = 0;
  var _retryId = setInterval(function(){
    _intentos++;
    if(_setup() || _intentos > 30){ clearInterval(_retryId); }
  }, 400);
  // Intento inmediato
  _setup();

  function _doSetup(){
    console.log('🔧 V24 setup iniciado');

  // Carga ventas de Supabase y actualiza el cache
  window._vnVentasCargar = async function(){
    try {
      var res = await db.from('pedidos').select('fecha,total,id,cliente').limit(20000);
      if(!res){ console.warn('[V24] pedidos: sin respuesta'); return; }
      if(res.error){ console.warn('[V24] pedidos error:', res.error.message||res.error); return; }
      if(!Array.isArray(res.data)){ console.warn('[V24] pedidos: data no es array', res.data); return; }
      console.log('[V24] pedidos descargados:', res.data.length);
      var lista = (typeof depurarPedidosUnicos === 'function')
        ? depurarPedidosUnicos(res.data)
        : res.data;
      var byFecha = {};
      lista.forEach(function(p){
        var f = (p && p.fecha) ? String(p.fecha).slice(0,10) : '';
        if(!f) return;
        var t = Number(p.total)||0;
        if(t <= 0) return;
        byFecha[f] = (byFecha[f]||0) + t;
      });
      var nuevoJSON = JSON.stringify(byFecha);
      var antesJSON = JSON.stringify(window._vnVentasPorFecha||{});
      var cambio = (nuevoJSON !== antesJSON);
      window._vnVentasPorFecha = byFecha;
      try { localStorage.setItem('_vnVentasPorFecha', nuevoJSON); } catch(e){}
      var fechas = Object.keys(byFecha);
      if(cambio){
        console.log('[V24] ventas por fecha ('+fechas.length+' días):',
          fechas.slice(-5).map(function(f){ return f+'=$'+byFecha[f].toLocaleString('es-CO'); }).join(' | '));
      }
      // Re-render SOLO si la data cambió y Contabilidad está abierta
      if(cambio){
        try {
          if(document.getElementById('contaBody') && typeof renderConta === 'function'){
            var activa = 'resumen';
            var act = document.querySelector('#contaBody .ftab.active');
            if(act){
              var t = (act.textContent||'').toLowerCase();
              if(t.indexOf('flujo') > -1) activa = 'flujo';
              else if(t.indexOf('histor') > -1) activa = 'historial';
              else if(t.indexOf('categor') > -1) activa = 'categorias';
              else if(t.indexOf('cuenta') > -1) activa = 'cuentas';
              else if(t.indexOf('caja') > -1) activa = 'caja';
              else if(t.indexOf('cuotas') > -1) activa = 'cuotas';
            }
            if(['flujo','historial','categorias','resumen'].indexOf(activa) > -1){
              // Bandera para evitar que el hook de renderConta dispare otra carga
              window._vnSkipNextLoad = true;
              renderConta(activa);
            }
          }
        } catch(e){}
      }
    } catch(e){ console.warn('V24 ventasCargar:', e); }
  };

  // Throttle: máximo una carga cada 5s
  var _lastLoad = 0;
  var _origCargar = window._vnVentasCargar;
  window._vnVentasCargar = function(){
    var ahora = Date.now();
    if(ahora - _lastLoad < 5000) return Promise.resolve();
    _lastLoad = ahora;
    return _origCargar.apply(this, arguments);
  };

  // Cargar al inicio y refrescar cada 30s
  setTimeout(window._vnVentasCargar, 800);
  setInterval(window._vnVentasCargar, 30000);

  // Función de diagnóstico ejecutable desde consola
  window.vnDiagVentas = function(){
    var c = window._vnVentasPorFecha || {};
    var keys = Object.keys(c);
    console.log('=========== DIAGNÓSTICO V24 ===========');
    console.log('Cache _vnVentasPorFecha:', keys.length, 'fechas');
    keys.sort().forEach(function(f){
      console.log('  ', f, '→ $'+(c[f]||0).toLocaleString('es-CO'));
    });
    console.log('_uHistRecolectar wrapped?', typeof window._uHistRecolectar);
    console.log('_uFlujo wrapped?', typeof window._uFlujo);
    var test = (typeof window._uHistRecolectar === 'function') ? window._uHistRecolectar() : null;
    if(test){
      var ventas = test.filter(function(m){ return m.origen === '_autoVenta'; });
      console.log('Ventas en histRecolectar():', ventas.length);
      ventas.forEach(function(v){ console.log('  ', v.fecha, '→ $'+v.monto.toLocaleString('es-CO')); });
    }
    console.log('Forzando recarga de pedidos…');
    return window._vnVentasCargar();
  };

  // Helpers ---
  function _ventasComoMovs(){
    var movs = [];
    var byFecha = window._vnVentasPorFecha || {};
    Object.keys(byFecha).forEach(function(fecha){
      var total = Number(byFecha[fecha])||0;
      if(total <= 0) return;
      movs.push({
        fecha: fecha,
        fechaISO: fecha + 'T12:00:00',
        tipo: 'ingreso',
        categoria: 'Venta de Reparto',
        descripcion: 'Bruto ventas del ' + fecha,
        cuenta: 'Ventas del día',
        monto: total
      });
    });
    return movs;
  }

  // Detecta si una entrada existente del array es nuestro auto-bruto residual
  // (lo dejamos de usar pero por si quedó persistido lo reconocemos)
  function _esAutoBrutoResidual(m){
    return m && (m._autoBruto || (m.descripcion||'').indexOf('Bruto ventas del ') === 0);
  }

  // ---------- 1. _uHistRecolectar: añadir ventas ----------
  if(typeof window._uHistRecolectar === 'function'){
    var _origUHR = window._uHistRecolectar;
    window._uHistRecolectar = function(){

      // Quitar auto-brutos residuales (los reemplazaremos por la fuente real)
      movs = movs.filter(function(m){ return !_esAutoBrutoResidual(m); });
      // Añadir ventas reales desde pedidos
      _ventasComoMovs().forEach(function(v){
        movs.push({
          fecha: v.fecha,
          tipo: 'ingreso',
          categoria: v.categoria,
          descripcion: v.descripcion,
          cuenta: v.cuenta,
          monto: v.monto,
          origen: '_autoVenta',
          origenIdx: v.fecha
        });
      });
      return movs;
    };
  }

  // ---------- 2. _uFlujo: inyectar ventas temporalmente ----------
  function _conInyeccionVentas(origFn, ctx, args){
    var arr = window.movimientosContables;
    if(!Array.isArray(arr)){ window.movimientosContables = []; arr = window.movimientosContables; }

    // Filtrar auto-brutos residuales para evitar doble conteo
    var residuales = [];
    var limpio = arr.filter(function(m){
      if(_esAutoBrutoResidual(m)){ residuales.push(m); return false; }
      return true;
    });
    if(residuales.length > 0){
      window.movimientosContables = limpio;
      arr = limpio;
    }

    // Inyectar ventas como entradas virtuales
    var temp = [];
    _ventasComoMovs().forEach(function(v){
      temp.push({
        tipo: 'ingreso',
        monto: v.monto,
        cuenta: v.cuenta,
        descripcion: v.descripcion,
        categoria: v.categoria,
        fecha: v.fechaISO,
        _vnVirtualVenta: true
      });
    });
    var startLen = arr.length;
    Array.prototype.push.apply(arr, temp);

    try { return origFn.apply(ctx, args); }
    finally {
      // Quitar las virtuales (length-based para no afectar cualquier otro push concurrente)
      arr.length = startLen;
    }
  }

  if(typeof window._uFlujo === 'function'){
    var _origUFlujo = window._uFlujo;
    window._uFlujo = function(){
      return _conInyeccionVentas(_origUFlujo, this, arguments);
    };
  }
  if(typeof window._uCategorias === 'function'){
    var _origUCat = window._uCategorias;
    window._uCategorias = function(){
      return _conInyeccionVentas(_origUCat, this, arguments);
    };
  }
  if(typeof window._v9RenderCategorias === 'function'){
    var _origV9Cat = window._v9RenderCategorias;
    window._v9RenderCategorias = function(){
      return _conInyeccionVentas(_origV9Cat, this, arguments);
    };
  }

  // ---------- 3. Limpiar auto-brutos residuales en cada renderConta ----------
  // Quita las entradas con _autoBruto que V23.1 pudo haber dejado
  // (ahora son redundantes con la inyección virtual)
  function _limpiarAutoBrutoResiduales(){
    if(!Array.isArray(window.movimientosContables)) return false;
    var antes = window.movimientosContables.length;
    window.movimientosContables = window.movimientosContables.filter(function(m){
      return !_esAutoBrutoResidual(m);
    });
    var despues = window.movimientosContables.length;
    if(antes !== despues){
      try { localStorage.setItem('mc_local', JSON.stringify(window.movimientosContables)); } catch(e){}
      if(typeof window._vnSyncMC === 'function') window._vnSyncMC();
      console.log('🧹 V24: '+(antes-despues)+' auto-brutos residuales removidos de movimientosContables');
      return true;
    }
    return false;
  }
  // Ejecutar limpieza una vez al cargar
  setTimeout(_limpiarAutoBrutoResiduales, 3500);
  // Y desactivar la función V23.1 que los creaba
  if(typeof window._actualizarAutoBrutoDesdePedidos === 'function'){
    window._actualizarAutoBrutoDesdePedidos = async function(){
      // Ahora solo refresca el cache de ventas
      return window._vnVentasCargar();
    };
  }

  console.log('✅ Parche V24: ventas desde pedidos como ingresos virtuales (fuente real)');

  } // fin _doSetup
})();
</script>
<div id="mcOverlayGlobal" style="display:none;">
  <div id="mcBoxGlobal"></div>
</div>
