  async function _historialRecolectar(){
    var movs = [];
 
    // 1. VENTAS desde Supabase
    try {
      if(typeof window.db !== 'undefined'){
        var rV = await window.db.from("pedidos").select("*").order("fecha",{ascending:false}).limit(5000);
        if(rV && !rV.error && Array.isArray(rV.data)){
          var ventas = (typeof depurarPedidosUnicos === 'function') ? depurarPedidosUnicos(rV.data) : rV.data;
          ventas.forEach(function(v){
            if(Number(v.total) > 0){
              movs.push({
                fecha: v.fecha, tipo:'ingreso', categoria:'Venta',
                descripcion:'Venta — '+(v.cliente||'Cliente'),
                cuenta:'Ventas del día', monto:Number(v.total)||0,
                origen:'venta', origenIdx:v.id||null
              });
            }
          });
        }
      }
    } catch(e){ console.error('Error ventas:', e); }
 
    // 2. MOVIMIENTOS CONTABLES
    if(Array.isArray(window.movimientosContables)){
      window.movimientosContables.forEach(function(m, idx){
        var fISO = '';
        if(m.fecha){ var d = new Date(m.fecha); if(!isNaN(d.getTime())) fISO = d.toISOString().slice(0,10); }
        if(!fISO) fISO = new Date().toISOString().slice(0,10);
 
        var origen = 'movContable';
        var desc = m.descripcion || '—';
        if(desc.toLowerCase().indexOf('cuota') > -1) origen = 'cuota';
        else if(desc.toLowerCase().indexOf('pago deuda') > -1) origen = 'carteraPago';
 
        movs.push({
          fecha:fISO, tipo:m.tipo||'gasto',
          categoria:(m.tipo === 'ingreso' ? 'Ingreso' : (m.categoria || 'Gasto')),
          descripcion:desc, cuenta:m.cuenta||'—',
          monto:Number(m.monto)||0, origen:origen, origenIdx:idx
        });
      });
    }
 
    // 3. GASTOS MANUALES
    if(Array.isArray(window.gastosMemoria)){
      window.gastosMemoria.forEach(function(g, idx){
        var ya = movs.some(function(m){
          return (m.origen === 'cuota' || m.origen === 'movContable') &&
                 m.descripcion === (g.descripcion||'') &&
                 m.monto === (Number(g.monto)||0);
        });
        if(ya) return;
 
        var fISO = '';
        if(g.fecha){ var d = new Date(g.fecha); if(!isNaN(d.getTime())) fISO = d.toISOString().slice(0,10); }
        if(!fISO) fISO = new Date().toISOString().slice(0,10);
 
        movs.push({
          fecha:fISO, tipo:'gasto', categoria:g.categoria||'Gasto',
          descripcion:g.descripcion||'—', cuenta:g.cuenta||'Efectivo',
          monto:Number(g.monto)||0, origen:'gastoManual', origenIdx:idx
        });
      });
    }
 
    // 4. CAJA
    try {
      if(typeof window.db !== 'undefined'){
        var rC = await window.db.from("cajas_movimientos").select("*").order("fecha",{ascending:false}).limit(2000);
        if(rC && !rC.error && Array.isArray(rC.data)){
          rC.data.forEach(function(c){
            if(c.tipo === 'apertura' || c.tipo === 'cierre') return;
            var ya = movs.some(function(m){
              return m.fecha === c.fecha && m.descripcion === (c.descripcion||'') && m.monto === (Number(c.valor)||0);
            });
            if(ya) return;
            movs.push({
              fecha:c.fecha, tipo:c.tipo === 'ingreso' ? 'ingreso' : 'gasto',
              categoria:c.categoria || (c.tipo === 'ingreso' ? 'Ingreso' : 'Gasto'),
              descripcion:c.descripcion||'—', cuenta:c.metodo_pago||'Efectivo',
              monto:Number(c.valor)||0, origen:'caja', origenIdx:c.id||null
            });
          });
        }
      }
    } catch(e){ console.error('Error caja:', e); }
 
    // 5. PAGOS DE CARTERA
    try {
      var pagos = JSON.parse(localStorage.getItem('cartera_pagos_historial') || '[]');
      if(Array.isArray(pagos)){
        pagos.forEach(function(p){
          var fISO = '';
          if(p.fecha){
            var partes = p.fecha.split(' de ');
            if(partes.length === 3){
              var ms = {enero:'01',febrero:'02',marzo:'03',abril:'04',mayo:'05',junio:'06',julio:'07',agosto:'08',septiembre:'09',octubre:'10',noviembre:'11',diciembre:'12'};
              fISO = partes[2]+'-'+(ms[partes[1].toLowerCase()]||'01')+'-'+partes[0].padStart(2,'0');
            }
          }
          if(!fISO) fISO = new Date().toISOString().slice(0,10);
 
          var ya = movs.some(function(m){
            return (m.origen === 'carteraPago' || m.origen === 'movContable') &&
                   m.descripcion.indexOf(p.cliente) > -1 && m.monto === (Number(p.monto)||0);
          });
          if(ya) return;
 
          movs.push({
            fecha:fISO, tipo:'ingreso', categoria:'Pago deuda',
            descripcion:'Pago deuda '+(p.cliente||'')+(p.nota?' - '+p.nota:''),
            cuenta:p.banco || (p.metodo === 'efectivo' ? 'Efectivo' : 'Transferencia'),
            monto:Number(p.monto)||0, origen:'carteraPago', origenIdx:null
          });
        });
      }
    } catch(e){ console.error('Error cartera:', e); }
 
    return movs;
  }
 
  function _historialMesesDisp(movs){
    var ms = {};
    movs.forEach(function(m){ var x = (m.fecha||'').slice(0,7); if(x) ms[x] = true; });
    return Object.keys(ms).sort().reverse();
  }

  function getSemanaId(){
    var d = new Date();
    var day = d.getDay();

    return lunes.toISOString().split('T')[0];

      var data = JSON.parse(raw);

      if(data.semanaActual !== getSemanaId()){
        data.semanaActual = getSemanaId();
        data.empleados.forEach(function(e){
          e.asistencia = [false,false,false,false,false,false];

      }
      return data;
    } catch(e){
      return nominaDefaults();
    }

  window.nominaToggleAsistencia = function(idx, dia){
    var data = nominaLeer();
    if(!data.empleados[idx]) return;
    data.empleados[idx].asistencia[dia] = !data.empleados[idx].asistencia[dia];
    nominaGuardar(data);
    renderNomina();
  };
 
  window.nominaEditarSalarioD = function(idx, input){
    var data = nominaLeer();
    if(!data.empleados[idx]) return;
    var val = Number(input.value.replace(/\./g,'')) || 0;
    data.empleados[idx].salarioDia = val;
    nominaGuardar(data);
    renderNomina();
  };
 
  window.nominaEditarSalarioQ = function(idx, input){
    var data = nominaLeer();
    if(!data.empleados[idx]) return;
    var val = Number(input.value.replace(/\./g,'')) || 0;
    data.empleados[idx].salarioQuincena = val;
    nominaGuardar(data);
    renderNomina();
  };
 
  window.nominaAgregarAdelanto = function(idx){
    var mInput = document.getElementById('nq_adm_'+idx) || document.getElementById('ns_adm_'+idx);
    var rInput = document.getElementById('nq_adr_'+idx) || document.getElementById('ns_adr_'+idx);
    if(!mInput) return;
 
    var monto = Number(mInput.value.replace(/\./g,'')) || 0;
    var razon = rInput ? rInput.value.trim() : '';
 
    if(monto <= 0){ alert('Ingresa el monto del adelanto'); return; }
 
    var data = nominaLeer();
    if(!data.empleados[idx]) return;
    if(!Array.isArray(data.empleados[idx].adelantos)) data.empleados[idx].adelantos = [];
 
    var fechaHoy = new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
    data.empleados[idx].adelantos.push({
      monto: monto,
      razon: razon || ('Adelanto ' + fechaHoy),
      fecha: fechaHoy
    });
 
    nominaGuardar(data);
    renderNomina();
  };
 
  window.nominaBorrarAdelanto = function(idx, ai){
    var data = nominaLeer();
    if(!data.empleados[idx]) return;
    if(!confirm('¿Eliminar este adelanto?')) return;
    data.empleados[idx].adelantos.splice(ai, 1);
    nominaGuardar(data);
    renderNomina();
  };

  // REGISTRAR PAGO SEMANAL

  window.nominaRegistrarSemanal = function(){
    var data = nominaLeer();
    var semanales = data.empleados.filter(function(e){ return e.tipo === 'semanal'; });
 
    var totalPagar = 0;
    var detalle = [];
 
    semanales.forEach(function(e){
      var diasTrab = e.asistencia.filter(function(a){ return a; }).length;
      var bruto = diasTrab * (Number(e.salarioDia)||0);
      var adelantos = (e.adelantos||[]).reduce(function(s,a){ return s + (Number(a.monto)||0); }, 0);
      var neto = Math.max(bruto - adelantos, 0);
      totalPagar += neto;
      detalle.push(e.nombre + ': ' + nMoney(neto));
    });
 
    if(totalPagar <= 0){
      alert('No hay nómina semanal para registrar');
      return;
    }
 
    if(!confirm('¿Registrar pago semanal por ' + nMoney(totalPagar) + '?\n\n' + detalle.join('\n'))){
      return;
    }
 
    // Registrar gasto en contabilidad

            btn.onclick = function(){ nominaResetAdelantos(idx); };

    // Leer observaciones del recaudo del día
    var obsKey = 'obs_marquee';
    var obs = [];
    try { obs = JSON.parse(localStorage.getItem(obsKey) || '[]'); } catch(e){ obs = []; }
 
    // También leer del estado del recaudo actual
    try {

      var estado = JSON.parse(localStorage.getItem(fechaKey) || '{}');

        var o = estado[nombre];
        if(o && o.observacion && o.observacion.trim()){
          var yaExiste = obs.some(function(x){ return x.nombre === nombre && x.texto === o.observacion; });
          if(!yaExiste){

            });
          }

    if(obs.length === 0){

    marquee.classList.add('visible');

  window.cajaRegistrarCambio = function(){

    var persona = (document.getElementById('cambioPersona').value||'').trim();
    var cuentaSel = document.getElementById('cambioCuenta');
    var cuentaIdx = cuentaSel ? Number(cuentaSel.value) : -1;
 
    if(!tipo){ alert('Selecciona el tipo de cambio'); return; }
    if(monto <= 0){ alert('Ingresa el monto'); return; }
    if(!persona){ alert('Ingresa el nombre de la persona'); return; }
    if(cuentaIdx < 0 || !window.cuentasMemoria[cuentaIdx]){ alert('Selecciona la cuenta bancaria'); return; }
 
    var nombreCuenta = window.cuentasMemoria[cuentaIdx].nombre;
    var idxEfectivo = window.cuentasMemoria.findIndex(function(c){ return c.tipo === 'EFECTIVO'; });
 
    if(tipo === 'trans_a_efec'){
      // Me transfieren → doy efectivo
      // + a la cuenta bancaria (recibí transferencia)
      // - del efectivo (entregué cash)
      var desc = 'Cambio: ' + persona + ' transfirió a ' + nombreCuenta + ', se le dio efectivo';
 
      if(!confirm('Cambio de $' + monto.toLocaleString('es-CO') + ':\n\n' +
        '📥 +$' + monto.toLocaleString('es-CO') + ' a ' + nombreCuenta + ' (transferencia recibida)\n' +
        '📤 -$' + monto.toLocaleString('es-CO') + ' de Efectivo (cash entregado)\n\n' +
        '¿Confirmar?')) return;
 
      // Sumar a cuenta bancaria
      window.cuentasMemoria[cuentaIdx].saldo += monto;

async function _restarFacturasRandom(){
  var fecha = (typeof cajaFechaHoy === 'function') ? cajaFechaHoy() : new Date().toISOString().split('T')[0];
 
  // Obtener pedidos del día
  var res = null;
  try {

  } catch(e){ return; }
 
  if(!res || res.error || !Array.isArray(res.data)) return;
 
  var pedidos = res.data;
  var estado = {};
  try {
    estado = JSON.parse(localStorage.getItem('recaudo_' + fecha) || '{}');
  } catch(e){}
 
  // Filtrar elegibles
  var elegibles = pedidos.filter(function(p){
    var total = Number(p.total)||0;
    if(total <= 10000) return false; // Factura <= 10.000: NO
 
    // Verificar si tiene deudas
    var nombre = p.cliente;
    var est = estado[nombre] || {};
    var deudaC = Number(est.deudaCliente)||0;
    var deudaM = Number(est.deudaMia)||0;
 
    if(deudaC > 0 || deudaM > 0) return false; // Con deuda: NO
 
    // Verificar deuda histórica
    try {
      if(typeof recaudoGetDeudaHistorica === 'function'){

        if(hist.deudaCliente > 0 || hist.deudaMia > 0) return false;
      }
    } catch(e){}
 
    return true;
  });
 
  if(elegibles.length === 0) return;
 
  // Seleccionar 1 random
  var randomIdx = Math.floor(Math.random() * elegibles.length);
