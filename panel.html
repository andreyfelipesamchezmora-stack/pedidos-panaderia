<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
.container{display:flex;height:100vh;}

.sidebar{
width:250px;
background:#111;
color:white;
padding:10px;
overflow:auto;
}

.main{flex:1;padding:15px;overflow:auto;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
position:relative;
cursor:pointer;
}

.card.moto{border-left:6px solid green;}
.card.auto{border-left:6px solid blue;}
.card.recoge{border-left:6px solid orange;}
.card.lejano{border-left:6px solid purple;}
.card.editado{background:#fff3a6;}

.x{
position:absolute;
top:5px;
right:8px;
color:red;
cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
width:90%;
max-width:900px;
max-height:90vh;
overflow:auto;
padding:15px;
border-radius:10px;
}

.producto{
display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}

.producto img{
width:110px;
height:110px;
object-fit:cover;
border-radius:10px;
}

.producto.activo-cant{background:#d4ffd4;}
.producto.activo-din{background:#d4e4ff;}

.panel-botones{
position:sticky;
top:10px;
}

#resultadoBox, #bendajeBox{
background:#f9f9f9;
padding:10px;
border-radius:10px;
margin-top:10px;
white-space:pre-line;
}

#bendajeBox{background:#fff3cd;}
</style>
</head>

<div class="panel-botones">

<button onclick="guardar()">💾 GUARDAR</button>

<div id="resultadoBox"></div>
<div id="bendajeBox"></div>  
<textarea id="comentarios" placeholder="Comentarios del pedido..." style="width:100%;margin-top:10px;"></textarea>

<button onclick="calcular()" style="
width:70%;
padding:14px;
margin-top:10px;
font-size:18px;
font-weight:bold;
background:#111;
color:white;

⚡ CALCULAR
</button>
<button onclick="imprimirTicket()" style="
width:70%;
padding:12px;
margin-top:10px;
font-size:16px;

🖨️ Imprimir Ticket

</div>
</div>

function renderProductos(){
let div=document.getElementById("productos");
div.innerHTML="";

productos.forEach((p,i)=>{
div.innerHTML+=`
<div class="producto" id="prod${i}">
<img src="https://via.placeholder.com/120">
<div>
<b>${p.name}</b><br>
Cantidad:<input id="cant${i}" type="number" oninput="calcular()">
Dinero:<input id="din${i}" type="number" oninput="calcular()">
</div>
</div>`;
});
}

async function cargar(){
let fecha = document.getElementById("fecha").value;

let {data}=await db
.from("pedidos")
.select("*")
.eq("fecha", fecha);

let total=0;
let grid=document.getElementById("grid");
grid.innerHTML="";

clientes.forEach(c=>{
let p=data.find(x=>x.cliente===c.nombre);

let t=p?p.total:0;
total+=t;

grid.innerHTML+=`
<div class="card ${c.tipo} ${p && p.editado ? 'editado' : ''}" onclick="abrir('${c.nombre}',${p?.id||0})">
<div class="x" onclick="event.stopPropagation();borrarPedido(event, ${p?.id||0})">✖</div>
<h4>${c.nombre}</h4>
<p>$${t}</p>
</div>`;
});

document.getElementById("totalGeneral").innerText="TOTAL: $"+total;
}

function abrir(nombre,id){
actualCliente=nombre;
actualId=id;
document.getElementById("clienteTitulo").innerText=nombre;
document.getElementById("modalPedido").style.display="flex";
document.getElementById("comentarios").value="";
renderProductos();
setTimeout(calcular, 100);
}

function calcular(){

let total = 0;
let texto = "";
let bendaje = "BENDAJE:\n";

productos.forEach((p,i)=>{

let cantInput = document.getElementById("cant"+i);
let dinInput = document.getElementById("din"+i);

if(!cantInput || !dinInput) return;

let cant = Number(cantInput.value) || 0;
let din = Number(dinInput.value) || 0;

let precio = p.precio;

if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
if(modo==="tiberio" && p.name==="PAN QUESILLO") precio=1000;

let panes = din>0 ? Math.floor(din/precio) : cant;
let subtotal = panes * precio;

if(subtotal > 0){

let b = p.b ? Math.round(panes * 0.2) : 0;

texto += `
\n------------------------------\n
${p.name} x${panes} =$${subtotal.toLocaleString('es-CO')}
Bendaje: ${b}
`;

if(p.b){
let b = Math.round(panes * 0.2);
bendaje += `${p.name} → ${b}\n`;
}

}

});

document.getElementById("resultadoBox").innerText = texto;
document.getElementById("bendajeBox").innerText = bendaje;

window.totalPedido = total;
window.textoPedido = texto;

}
  
function cambiarModo(m){
modo = m;
calcular();
renderPreview();
}

async function guardar(){
if(!window.totalPedido)return alert("Calcula primero");

await db.from("pedidos").upsert({
id: actualId || undefined,
cliente: actualCliente,
pedido: window.textoPedido,
total: window.totalPedido,
editado: actualId ? true : false,
fecha: document.getElementById("fecha").value
});

cerrarModal();
cargar();
}
async function eliminarPedido(id){
if(!id) return;

let ok = confirm("¿Eliminar pedido?");
if(!ok) return;

await db.from("pedidos").delete().eq("id",id);
cargar();
}

function nuevoCliente(){
let nombre=prompt("Nombre:");
let tipo=prompt("moto / auto / recoge / lejano");

if(nombre){
clientes.push({nombre,tipo});
localStorage.setItem("clientes",JSON.stringify(clientes));
cargar();
}
}

function filtrar(txt){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(txt.toLowerCase())?"block":"none";
});
}

function resetear(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("resultadoBox").innerText = texto;
document.getElementById("bendajeBox").innerText = bendaje;
}
function cerrarModal(){
document.getElementById("modalPedido").style.display="none";
}

`;

async function borrarPedido(e, id){
e.stopPropagation();

if(!id){
alert("No hay pedido para borrar");

}

let ok = confirm("¿Eliminar pedido?");
if(!ok) return;

await db.from("pedidos").delete().eq("id",id);

cargar();
}
