<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<title>Panel PRO Panadería</title>

<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --font-body: 'Satoshi', Arial, sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.10);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.15);
  /* Dashboard colors */
  --clr-bg: #f4f4f4;
  --clr-surface: #ffffff;
  --clr-sidebar: #111111;
  --clr-text: #1a1a1a;
  --clr-muted: #6b7280;
  --clr-border: rgba(0,0,0,0.10);
  --clr-accent: #16a34a;
  --clr-accent2: #2563eb;
  --clr-accent3: #d97706;
  --clr-accent4: #7c3aed;
  --clr-panel-bg: #0f172a;
  --clr-panel-surface: #1e293b;
  --clr-panel-border: rgba(255,255,255,0.08);
  --clr-panel-text: #e2e8f0;
  --clr-panel-muted: #94a3b8;
  --clr-success: #16a34a;
  --clr-error: #dc2626;
  --clr-warning: #d97706;
  --clr-info: #2563eb;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--clr-bg); color: var(--clr-text); }

/* ===== ORIGINAL LAYOUT ===== */
.container { display: flex; height: 100vh; }

.sidebar {
  width: 250px; background: #111; color: white; padding: 10px;
  display: flex; flex-direction: column;
}

.main { flex: 1; padding: 15px; overflow: auto; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

.card {
  background: white; padding: 10px; border-radius: 10px;
  position: relative; cursor: pointer;
}
.card.nuevo { background: #d4ffd4; border-left: 6px solid green; }
.printMini {
  position: absolute; bottom: 5px; right: 8px; font-size: 14px;
  cursor: pointer; background: #111; color: white;
  padding: 3px 6px; border-radius: 6px;
}
.card.moto { border-left: 6px solid green; }
.card.auto { border-left: 6px solid blue; }
.card.recoge { border-left: 6px solid orange; }
.card.lejano { border-left: 6px solid purple; }
.card.editado { background: #fff3a6; }
.x { position: absolute; top: 5px; right: 8px; color: red; cursor: pointer; }

/* ===== MODAL ORIGINAL ===== */
.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); display: none;
  align-items: center; justify-content: center; z-index: 100;
}
.modal-content {
  background: white; width: 90%; max-width: 900px;
  max-height: 90vh; overflow: auto; padding: 15px; border-radius: 10px;
}

.producto {
  display: flex; gap: 10px; margin-bottom: 15px;
  border-bottom: 1px solid #ddd; padding-bottom: 10px;
  border-radius: 10px; padding: 10px;
}
.producto:nth-child(even) { background: #eef6ff; }
.producto:nth-child(odd) { background: #f9f9f9; }
.producto img { width: 110px; height: 110px; object-fit: cover; border-radius: 10px; }
.producto.activo-cant { background: #d4ffd4; }
.producto.activo-din { background: #d4e4ff; }

.panel-botones { position: sticky; top: 10px; }

#resultadoBox, #bendajeBox {
  background: #f9f9f9; padding: 10px; border-radius: 10px;
  margin-top: 10px; white-space: pre-line;
}
#bendajeBox { background: #fff3cd; }

.video-sidebar { display: flex; justify-content: center; align-items: center; margin-top: 195px; }

#meDebeValor::placeholder { color: red; font-weight: bold; }
#leDeboValor::placeholder { color: blue; font-weight: bold; }

/* ===== SIDEBAR MODULE BUTTONS ===== */
.module-btns {
  display: flex; flex-direction: column; gap: var(--space-2);
  margin-top: var(--space-3); padding-top: var(--space-3);
  border-top: 1px solid rgba(255,255,255,0.12);
}

.module-btn {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  color: #e2e8f0; font-size: var(--text-sm);
  font-family: var(--font-body); font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  text-align: left;
}
.module-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.22);
  transform: translateX(2px);
}
.module-btn svg { flex-shrink: 0; opacity: 0.85; }
.module-btn.stats-btn { border-left: 3px solid var(--clr-accent); }
.module-btn.conta-btn { border-left: 3px solid var(--clr-accent3); }

/* ===== OVERLAY PANEL ===== */
.overlay-panel {
  position: fixed; top: 0; right: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  display: none; z-index: 200;
  align-items: stretch; justify-content: flex-end;
}
.overlay-panel.open { display: flex; }

.panel-drawer {
  width: min(860px, 94vw);
  background: var(--clr-panel-bg);
  color: var(--clr-panel-text);
  height: 100%; overflow-y: auto;
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  animation: slideIn 0.32s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-5) var(--space-6);
  background: var(--clr-panel-surface);
  border-bottom: 1px solid var(--clr-panel-border);
  position: sticky; top: 0; z-index: 10;
}
.panel-header h2 {
  font-size: var(--text-lg); font-weight: 700; color: var(--clr-panel-text);
  display: flex; align-items: center; gap: var(--space-2);
}
.panel-close {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: var(--clr-panel-muted); border-radius: var(--radius-md);
  padding: var(--space-1) var(--space-3); cursor: pointer; font-size: var(--text-sm);
  transition: all var(--transition);
}
.panel-close:hover { background: rgba(255,255,255,0.15); color: white; }

.panel-body { padding: var(--space-5) var(--space-6); flex: 1; }

/* ===== FILTER TABS ===== */
.filter-tabs {
  display: flex; gap: var(--space-2); margin-bottom: var(--space-5);
  flex-wrap: wrap;
}
.ftab {
  padding: var(--space-1) var(--space-4);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-full); color: var(--clr-panel-muted);
  font-size: var(--text-xs); cursor: pointer; transition: all var(--transition);
  font-family: var(--font-body); font-weight: 500;
}
.ftab.active, .ftab:hover {
  background: var(--clr-accent); border-color: var(--clr-accent);
  color: white;
}

/* ===== KPI CARDS ===== */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: var(--space-3); margin-bottom: var(--space-5);
}
.kpi-card {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
}
.kpi-card.green::before { background: var(--clr-success); }
.kpi-card.blue::before { background: var(--clr-info); }
.kpi-card.orange::before { background: var(--clr-warning); }
.kpi-card.purple::before { background: var(--clr-accent4); }

.kpi-label {
  font-size: var(--text-xs); color: var(--clr-panel-muted);
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  margin-bottom: var(--space-1);
}
.kpi-value {
  font-size: var(--text-xl); font-weight: 700;
  font-variant-numeric: tabular-nums lining-nums;
  line-height: 1.1; color: white;
}
.kpi-delta {
  font-size: var(--text-xs); margin-top: var(--space-1); font-weight: 500;
}
.kpi-delta.up { color: var(--clr-success); }
.kpi-delta.down { color: var(--clr-error); }
.kpi-delta.neutral { color: var(--clr-panel-muted); }

/* ===== CHART CONTAINERS ===== */
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);
  margin-bottom: var(--space-5);
}
@media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);
}
.chart-card.full-w { grid-column: 1 / -1; }
.chart-title {
  font-size: var(--text-sm); font-weight: 600;
  color: var(--clr-panel-text); margin-bottom: var(--space-3);
}
.chart-wrap { position: relative; height: 200px; }
.chart-wrap.tall { height: 260px; }

/* ===== TOP LISTS ===== */
.top-list { display: flex; flex-direction: column; gap: var(--space-2); }
.top-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-2) 0; border-bottom: 1px solid var(--clr-panel-border);
}
.top-item:last-child { border-bottom: none; }
.top-rank {
  width: 22px; height: 22px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.08); color: var(--clr-panel-muted);
  font-size: var(--text-xs); font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.top-rank.gold { background: var(--clr-warning); color: white; }
.top-name { flex: 1; font-size: var(--text-sm); color: var(--clr-panel-text); font-weight: 500; }
.top-val {
  font-size: var(--text-sm); font-weight: 700; color: white;
  font-variant-numeric: tabular-nums;
}
.top-bar-wrap {
  height: 3px; background: rgba(255,255,255,0.08);
  border-radius: var(--radius-full); overflow: hidden; width: 60px;
}
.top-bar { height: 100%; background: var(--clr-accent); border-radius: var(--radius-full); }

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: var(--text-sm); font-weight: 700; color: var(--clr-panel-muted);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: var(--space-3); margin-top: var(--space-5);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--clr-panel-border);
}
.section-title:first-child { margin-top: 0; }

/* ===== CONTABILIDAD ===== */
.conta-kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: var(--space-3); margin-bottom: var(--space-5);
}

.gasto-form {
  background: var(--clr-panel-surface);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-xl); padding: var(--space-4);
  margin-bottom: var(--space-4);
}
.gasto-form h3 { font-size: var(--text-sm); font-weight: 600; color: var(--clr-panel-text); margin-bottom: var(--space-3); }
.gasto-row { display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: flex-end; margin-bottom: var(--space-2); }
.gasto-row input, .gasto-row select {
  flex: 1; min-width: 120px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-md); color: var(--clr-panel-text);
  padding: var(--space-2) var(--space-3); font-size: var(--text-sm);
  font-family: var(--font-body);
}
.gasto-row input::placeholder { color: var(--clr-panel-muted); }
.btn-add-gasto {
  background: var(--clr-warning); border: none;
  color: white; padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md); font-size: var(--text-sm);
  font-family: var(--font-body); font-weight: 600; cursor: pointer;
  transition: all var(--transition);
}
.btn-add-gasto:hover { filter: brightness(1.15); }

.gastos-list { display: flex; flex-direction: column; gap: var(--space-2); }
.gasto-item {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--clr-panel-border);
  border-radius: var(--radius-lg); padding: var(--space-2) var(--space-3);
  font-size: var(--text-sm);
}
.gasto-item span:first-child { color: var(--clr-panel-text); }
.gasto-cat { color: var(--clr-panel-muted); font-size: var(--text-xs); margin-left: var(--space-1); }
.gasto-monto { font-weight: 700; color: var(--clr-error); font-variant-numeric: tabular-nums; }
.gasto-del { background: none; border: none; color: var(--clr-panel-muted); cursor: pointer; font-size: 13px; margin-left: var(--space-2); }
.gasto-del:hover { color: var(--clr-error); }

.utilidad-box {
  background: linear-gradient(135deg, rgba(22,163,74,0.15), rgba(22,163,74,0.05));
  border: 1px solid rgba(22,163,74,0.3);
  border-radius: var(--radius-xl); padding: var(--space-5);
  text-align: center; margin-top: var(--space-4);
}
.utilidad-label { color: var(--clr-panel-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.utilidad-val { font-size: var(--text-xl); font-weight: 800; color: var(--clr-success); font-variant-numeric: tabular-nums; margin: var(--space-2) 0; }
.utilidad-val.negative { color: var(--clr-error); }
.utilidad-margen { font-size: var(--text-sm); color: var(--clr-panel-muted); }

/* ===== LOADING / EMPTY STATES ===== */
.loading-skeleton {
  display: flex; flex-direction: column; gap: var(--space-3);
  padding: var(--space-8) 0;
}
@keyframes shimmer {
  0%{background-position:-200% 0} 100%{background-position:200% 0}
}
.skel {
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
  border-radius: var(--radius-md);
}
.skel-h { height: 80px; }
.skel-c { height: 200px; }
.skel-l { height: 40px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: var(--space-12) var(--space-8); color: var(--clr-panel-muted);
  text-align: center;
}
.empty-state svg { margin-bottom: var(--space-4); opacity: 0.4; }
.empty-state p { font-size: var(--text-sm); max-width: 28ch; }
</style>
</head>

<body>
<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Fecha</h3>
  <input type="date" id="fecha" onchange="cargar()" style="
    width:100%; padding:10px; font-size:16px; border-radius:10px;
    border:1px solid #333; background:#1e1e1e; color:white;
    margin-bottom:10px; color-scheme:dark;
  ">
  <button onclick="nuevoCliente()">➕ Agregar Cliente</button>

  <!-- MODULE BUTTONS -->
  <div class="module-btns">
    <button class="module-btn stats-btn" onclick="abrirStats()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
      </svg>
      Estadísticas
    </button>
    <button class="module-btn conta-btn" onclick="abrirConta()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
        <path d="M6 8h.01M9 8h6M6 11h.01M9 11h3"/>
      </svg>
      Contabilidad
    </button>
  </div>

  <div class="video-sidebar">
    <video autoplay muted loop style="width:100%;height:auto;object-fit:contain;display:block;">
      <source src="https://res.cloudinary.com/deyaftfah/video/upload/v1774284949/0323645621_fotxsp.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <input type="text" placeholder="🔍 Buscar cliente..." oninput="filtrar(this.value)" style="
    width:100%; padding:12px; font-size:16px; border-radius:10px;
    border:1px solid #ccc; margin-bottom:10px;
  ">
  <div class="grid" id="grid"></div>
</div>
</div>

<!-- MODAL PEDIDO ORIGINAL -->
<div class="modal" id="modalPedido">
<div class="modal-content">
<div style="text-align:right"><button onclick="cerrarModal()">❌</button></div>
<h2 id="clienteTitulo"></h2>
<div>
  <div id="productos"></div>
  <div class="panel-botones">
    <button onclick="cambiarModo('promo')">PROMO</button>
    <button onclick="cambiarModo('original')">ORIGINAL</button>
    <button onclick="cambiarModo('alexa')">ALEXA</button>
    <button onclick="cambiarModo('tiberio')">TIBERIO</button>
    <button onclick="resetear()">🧹 LIMPIAR</button>
    <br><br>
    <button type="button" onclick="guardar()">💾 GUARDAR</button>
  </div>
  <div id="resultadoBox"></div>
  <div id="bendajeBox"></div>
  <textarea id="comentarios" placeholder="Comentarios del pedido..." style="width:100%;margin-top:10px;"></textarea>
  <div style="background:#f1f1f1;padding:10px;border-radius:10px;margin-top:10px;">
    <label style="display:block;margin-bottom:8px;">
      <input type="checkbox" id="leDebo" onchange="calcular()">
      <strong>Le debo al cliente</strong>
    </label>
    <label style="display:block;">
      <input type="checkbox" id="meDebeCheck" onchange="calcular()">
      <strong>Me debe el cliente</strong>
      <input type="number" id="meDebeValor" placeholder="Valor que el cliente te debe..."
        style="width:100%;margin-top:5px;padding:8px;border-radius:8px;border:1px solid #ccc;"
        oninput="calcular()">
    </label>
    <input type="number" id="leDeboValor" placeholder="Valor que le debes al cliente..."
      style="width:100%;margin-top:5px;padding:8px;border-radius:8px;border:1px solid #ccc;"
      oninput="calcular()">
  </div>
  <button onclick="imprimirTicket()" style="width:70%;padding:12px;margin-top:10px;font-size:16px;">🖨️ Imprimir Ticket</button>

    COBRAR: $0
  </div>
</div>
</div>
</div>

<!-- PANEL ESTADÍSTICAS -->
<div class="overlay-panel" id="panelStats">
  <div class="panel-drawer">
    <div class="panel-header">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Estadísticas de Ventas
      </h2>
      <button class="panel-close" onclick="cerrarPanel('panelStats')">✕ Cerrar</button>
    </div>
    <div class="panel-body" id="statsBody">
      <!-- Se llena con JS -->
    </div>
  </div>
</div>

<!-- PANEL CONTABILIDAD -->
<div class="overlay-panel" id="panelConta">
  <div class="panel-drawer">
    <div class="panel-header">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        Contabilidad
      </h2>
      <button class="panel-close" onclick="cerrarPanel('panelConta')">✕ Cerrar</button>
    </div>
    <div class="panel-body" id="contaBody">
      <!-- Se llena con JS -->
    </div>
  </div>
</div>

<script>

async function cargar(){
  let fechaInput = document.getElementById("fecha");
  if(!fechaInput.value) fechaInput.value = new Date().toISOString().split("T")[0];
  let fechaSeleccionada = fechaInput.value;
  let data = [];
  try {
    let res = await db.from("pedidos").select("*").eq("fecha", fechaSeleccionada);
    if(!res.error) data = res.data || [];
  } catch(e){ data = []; }

  let total = 0;
  let grid = document.getElementById("grid");
  grid.innerHTML = "";
  if(!clientes || clientes.length === 0){
    grid.innerHTML = "<h3 style='color:red'>No hay clientes cargados</h3>";
    return;
  }
  clientes.forEach(c => {
    let p = data.find(x => x.cliente === c.nombre) || null;
    let t = p ? Number(p.total) || 0 : 0;
    total += t;
    grid.innerHTML += `
    <div class="card ${c.tipo} ${p ? (p.editado ? 'editado' : 'nuevo') : ''}"
      onclick="abrir('${c.nombre}', ${p?.id || 0})">
      <div class="printMini" onclick="event.stopPropagation();imprimirDirecto('${c.nombre}')">🖨️</div>
      <div class="x" onclick="event.stopPropagation();eliminar(${p?.id||0},'${c.nombre}')">✖</div>
      <h4>${c.nombre}</h4>
      <p>$${t.toLocaleString('es-CO')}</p>
    </div>`;
  });
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

async function abrir(nombre,id){
  clienteActivo = nombre;
  actualCliente = nombre;
  actualId = id || null;
  document.getElementById("clienteTitulo").innerText = nombre;
  document.getElementById("modalPedido").style.display = "flex";
  renderProductos();
  if(!id) resetear();
  document.getElementById("comentarios").value = "";
  let fechaSeleccionada = document.getElementById("fecha").value;
  let { data, error } = await db.from("pedidos").select("*").eq("cliente",nombre).eq("fecha",fechaSeleccionada);
  if(error){ console.error(error); return; }
  if(data && data.length > 0) data = data[data.length-1]; else data = null;
  if(data){
    if(data.productos && Array.isArray(data.productos)){
      data.productos.forEach(prodGuardado => {
        let index = productos.findIndex(p => p.name === prodGuardado.nombre);
        if(index !== -1){
          let cantInput = document.getElementById("cant"+index);
          let dinInput = document.getElementById("din"+index);
          if(cantInput) cantInput.value = prodGuardado.cantidad || "";
          if(dinInput) dinInput.value = prodGuardado.dinero || "";
          marcar(index);
        }
      });
    }
    window.totalPedido = data.total;
    window.textoPedido = data.pedido;
    document.getElementById("resultadoBox").innerText = data.pedido;
    document.getElementById("comentarios").value = data.comentario || "";
    clienteActivo = nombre;
    document.querySelectorAll(".cantidad").forEach(i => i.value = "");
    document.querySelectorAll(".precio").forEach(i => i.value = "");
  }
}

function calcular(){
  let total = 0;
  let texto = "";
  let bendaje = "BENDAJE:\\n";
  productos.forEach((p,i) => {
    let cantInput = document.getElementById("cant"+i);
    let dinInput = document.getElementById("din"+i);
    if(!cantInput || !dinInput) return;
    let cant = Number(cantInput.value) || 0;
    let din = Number(limpiarFormato(dinInput.value)) || 0;
    let precio = p.precio;
    if(modo==="alexa" && p.name==="PAN DE 3.500") precio=3000;
    if(modo==="tiberio" && p.name==="PAN QUESILLO (1.200)") precio=1000;
    let panes=0,subtotal=0;
    if(p.name==="PAN DE 2.000" && modo!=="original"){
      if(din>0){
        if(din>=5000&&din<6000){panes=3;subtotal=5000;}
        else if(din>=14000&&din<20000){panes=9;subtotal=15000;}
        else{panes=Math.floor(din/precio);subtotal=panes*precio;}
      } else if(cant>0){
        if(cant===3){panes=3;subtotal=5000;}
        else if(cant>=7&&cant<=9){panes=9;subtotal=15000;}
        else{panes=cant;subtotal=panes*precio;}
      }
    } else {
      if(din>0) panes=Math.floor(din/precio); else if(cant>0) panes=cant;
      subtotal=panes*precio;
    }
    if(subtotal>0){
      let b=0;
      if(p.name.trim()==="PAN DE 3.500") b=0;
      else if(p.name.trim()==="PAN DE 2.000"){
        if(modo!=="original"&&(panes===3||panes===7||panes===8||panes===9)) b=0;
        else b=Math.round(panes*0.2);
      } else b=p.b?Math.round(panes*0.2):0;
      bendaje+=`${p.name}: ${b}\\n`;
      total+=subtotal;
      texto+="------------------------------\\n";
      texto+=`${p.name} x ${panes} =$${subtotal.toLocaleString('es-CO')}\\n`;
      texto+=`Bendaje: ${b}\\n`;
    }
  });
  document.getElementById("resultadoBox").innerText=texto;
  document.getElementById("bendajeBox").innerText=bendaje;
  window.totalPedido=total;
  window.bendajePedido=bendaje;
  let leDebo=document.getElementById("leDebo")?.checked;
  let meDebeCheck=document.getElementById("meDebeCheck")?.checked;
  let meDebeValor=Number(document.getElementById("meDebeValor")?.value)||0;
  let leDeboValor=Number(document.getElementById("leDeboValor")?.value)||0;
  let totalFinal=total;
  if(leDebo&&leDeboValor>0) totalFinal-=leDeboValor;
  if(meDebeCheck&&meDebeValor>0) totalFinal+=meDebeValor;
  let textoFinal=leDebo?"SALDO A FAVOR: $"+Math.abs(totalFinal).toLocaleString('es-CO'):"COBRAR: $"+totalFinal.toLocaleString('es-CO');
  document.getElementById("totalFinal").innerText=textoFinal;
  window.totalFinal=totalFinal;
  window.textoPedido=texto;
  window.bendajePedido=bendaje;
}

function cambiarModo(m){ modo=m; calcular(); }

async function guardar(){
  if(!actualCliente){alert("No hay cliente activo");return;}
  let fechaInput=document.getElementById("fecha");
  let fecha=fechaInput.value;
  if(!fecha){fecha=new Date().toISOString().split("T")[0];fechaInput.value=fecha;}
  let total=0,texto="",listaProductos=[];
  productos.forEach((p,i)=>{
    let cant=Number(document.getElementById("cant"+i)?.value)||0;
    let din=Number(limpiarFormato(document.getElementById("din"+i)?.value||"0"))||0;
    let precio=p.precio;
    if(modo==="alexa"&&p.name==="PAN DE 3.500") precio=3000;
    if(modo==="tiberio"&&p.name==="PAN QUESILLO (1.200)") precio=1000;
    let panes=0,subtotal=0;
    if(p.name==="PAN DE 2.000"&&modo!=="original"){
      if(din>0){if(din>=5000&&din<6000){panes=3;subtotal=5000;}else if(din>=14000&&din<20000){panes=9;subtotal=15000;}else{panes=Math.floor(din/precio);subtotal=panes*precio;}}
      else if(cant>0){if(cant===3){panes=3;subtotal=5000;}else if(cant>=7&&cant<=9){panes=9;subtotal=15000;}else{panes=cant;subtotal=panes*precio;}}
    } else {
      if(din>0) panes=Math.floor(din/precio); else if(cant>0) panes=cant;
      subtotal=panes*precio;
    }
    if(cant>0||din>0) listaProductos.push({nombre:p.name,cantidad:cant,dinero:din});
    if(subtotal>0){total+=subtotal;texto+=`\\n${p.name} x${panes} = $${subtotal}\\n`;}
  });
  let comentario=document.getElementById("comentarios").value||"";
  if(actualId){
    let{error}=await db.from("pedidos").update({total,pedido:texto,comentario,productos:listaProductos,editado:true}).eq("id",actualId);
    if(error){console.error(error);alert("Error al actualizar");return;}
  } else {
    let{error}=await db.from("pedidos").insert([{cliente:actualCliente,fecha,total,pedido:texto,comentario,productos:listaProductos,editado:false}]);
    if(error){console.error(error);alert("Error al guardar");return;}
  }
  cerrarModal(); cargar();
}

async function eliminar(id,nombre){
  if(!confirm("Eliminar cliente?")) return;
  if(id) await db.from("pedidos").delete().eq("id",id);
  clientes=clientes.filter(c=>c.nombre!==nombre);
  localStorage.setItem("clientes",JSON.stringify(clientes));
  cargar();
}

function generarNumeroTicket(){ let n=numeroTicket; numeroTicket++; localStorage.setItem("ticketNumero",numeroTicket); return n; }

async function imprimirDirecto(nombre){
  let fecha=document.getElementById("fecha").value;
  let{data,error}=await db.from("pedidos").select("*").eq("cliente",nombre).eq("fecha",fecha);
  if(error){console.error(error);alert("Error");return;}
  if(!data||data.length===0){alert("Sin pedido");return;}
  let pedido=data[0];
  window.totalPedido=pedido.total||0;window.totalFinal=pedido.total||0;window.textoPedido=pedido.pedido||"";
  actualCliente=nombre; imprimirTicket();
}

function formatearMiles(valor){ valor=valor.replace(/\\D/g,""); return valor.replace(/\\B(?=(\\d{3})+(?!\\d))/g,"."); }
function limpiarFormato(valor){ return valor.replace(/\\./g,""); }

async function abrirStats(){

async function cargarStats(filtro){
  let hoy=new Date();
  let fechaHoy=hoy.toISOString().split("T")[0];
  let fechaInicio,fechaFin=fechaHoy;

  if(filtro==="hoy") { fechaInicio=fechaHoy; }
  else if(filtro==="semana"){
    let d=new Date(hoy); d.setDate(d.getDate()-6);
    fechaInicio=d.toISOString().split("T")[0];
  } else if(filtro==="mes"){
    fechaInicio=fechaHoy.slice(0,7)+"-01";
  } else if(filtro==="custom"){
    let d1=document.getElementById("filtroDesde")?.value;
    let d2=document.getElementById("filtroHasta")?.value;
    if(!d1||!d2){return;}
    fechaInicio=d1; fechaFin=d2;
  }

  // Fetch data
  let {data,error}=await db.from("pedidos").select("*").gte("fecha",fechaInicio).lte("fecha",fechaFin);
  if(error||!data){ data=[]; }

  // Ayer para comparar
  let ayer=new Date(hoy); ayer.setDate(ayer.getDate()-1);
  let fechaAyer=ayer.toISOString().split("T")[0];
  let {data:dataAyer}=await db.from("pedidos").select("total").eq("fecha",fechaAyer);
  let totalAyer=(dataAyer||[]).reduce((s,r)=>s+(Number(r.total)||0),0);

  // KPIs
  let totalVentas=data.reduce((s,r)=>s+(Number(r.total)||0),0);
  let numPedidos=data.length;
  let ticketProm=numPedidos>0?Math.round(totalVentas/numPedidos):0;
  let diasUnicos=[...new Set(data.map(r=>r.fecha))].length||1;
  let promedioVentasDia=Math.round(totalVentas/diasUnicos);
  let diffHoy=totalAyer>0?Math.round((promedioVentasDia-totalAyer)/totalAyer*100):0;

  // Agrupar por fecha
  let porFecha={};
  data.forEach(r=>{
    if(!porFecha[r.fecha]) porFecha[r.fecha]=0;
    porFecha[r.fecha]+=(Number(r.total)||0);
  });
  let fechasOrdenadas=Object.keys(porFecha).sort();

  // Agrupar por día de semana
  const dias=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  let porDia=[0,0,0,0,0,0,0];
  let cntDia=[0,0,0,0,0,0,0];
  data.forEach(r=>{
    let d=new Date(r.fecha+"T00:00:00");
    let dw=d.getDay();
    porDia[dw]+=(Number(r.total)||0);
    cntDia[dw]++;
  });
  let promDia=porDia.map((v,i)=>cntDia[i]>0?Math.round(v/cntDia[i]):0);

  // Top clientes
  let porCliente={};
  data.forEach(r=>{
    if(!porCliente[r.cliente]) porCliente[r.cliente]=0;
    porCliente[r.cliente]+=(Number(r.total)||0);
  });
  let topClientes=Object.entries(porCliente).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Top productos
  let porProducto={};
  data.forEach(r=>{
    if(r.productos&&Array.isArray(r.productos)){
      r.productos.forEach(p=>{
        if(!porProducto[p.nombre]) porProducto[p.nombre]={cant:0,total:0};
        porProducto[p.nombre].cant+=(p.cantidad||0);
      });
    }
  });
  let topProductos=Object.entries(porProducto).sort((a,b)=>b[1].cant-a[1].cant).slice(0,6);

  // Mejor y peor día
  let mejorDia=fechasOrdenadas.reduce((a,b)=>(porFecha[a]||0)>(porFecha[b]||0)?a:b,"");
  let peorDia=fechasOrdenadas.reduce((a,b)=>(porFecha[a]||0)<(porFecha[b]||0)?a:b,"");
  let mejorCliente=topClientes[0]||["—",0];

  let deltaClass=diffHoy>0?"up":diffHoy<0?"down":"neutral";
  let deltaIcon=diffHoy>0?"↑":diffHoy<0?"↓":"→";

  // Render
  document.getElementById("statsBody").innerHTML=`
    <div class="filter-tabs">
      <button class="ftab ${filtro==='hoy'?'active':''}" onclick="cargarStats('hoy')">Hoy</button>
      <button class="ftab ${filtro==='semana'?'active':''}" onclick="cargarStats('semana')">7 días</button>
      <button class="ftab ${filtro==='mes'?'active':''}" onclick="cargarStats('mes')">Este mes</button>
      <button class="ftab ${filtro==='custom'?'active':''}" onclick="mostrarRango()">Rango</button>
    </div>
    <div id="rangoPersonalizado" style="display:none;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;">
      <input type="date" id="filtroDesde" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#e2e8f0;padding:6px 10px;font-size:13px;">
      <input type="date" id="filtroHasta" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#e2e8f0;padding:6px 10px;font-size:13px;">
      <button onclick="cargarStats('custom')" style="background:#16a34a;border:none;color:white;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;">Aplicar</button>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card green">
        <div class="kpi-label">Ventas del período</div>
        <div class="kpi-value" style="font-size:clamp(1rem,2.5vw,1.6rem);">$${totalVentas.toLocaleString('es-CO')}</div>
        <div class="kpi-delta ${deltaClass}">${deltaIcon} ${Math.abs(diffHoy)}% vs día ant.</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">N° de pedidos</div>
        <div class="kpi-value">${numPedidos}</div>
        <div class="kpi-delta neutral">${diasUnicos} día(s)</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-label">Ticket promedio</div>
        <div class="kpi-value" style="font-size:clamp(0.9rem,2vw,1.4rem);">$${ticketProm.toLocaleString('es-CO')}</div>
        <div class="kpi-delta neutral">por pedido</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">Mejor cliente</div>
        <div class="kpi-value" style="font-size:clamp(0.7rem,1.5vw,1rem);line-height:1.2;">${mejorCliente[0]||'—'}</div>
        <div class="kpi-delta neutral">$${(mejorCliente[1]||0).toLocaleString('es-CO')}</div>
      </div>
    </div>

    <p class="section-title">Ventas por día</p>
    <div class="chart-card full-w">
      <div class="chart-title">Tendencia de ventas diarias</div>
      <div class="chart-wrap"><canvas id="chartVentas"></canvas></div>
    </div>

    <div class="charts-grid" style="margin-top:16px;">
      <div class="chart-card">
        <div class="chart-title">Promedio por día de semana</div>
        <div class="chart-wrap"><canvas id="chartDia"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Top 8 Clientes</div>
        <div class="chart-wrap tall" id="topClientesWrap">
          ${topClientes.length===0?`<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Sin datos en este período</p></div>`:''}
          ${topClientes.map((c,i)=>`
          <div class="top-item">
            <div class="top-rank ${i===0?'gold':''}">${i+1}</div>
            <div class="top-name">${c[0].split(' ').slice(0,2).join(' ')}</div>
            <div class="top-bar-wrap"><div class="top-bar" style="width:${topClientes[0][1]>0?Math.round(c[1]/topClientes[0][1]*100):0}%"></div></div>
            <div class="top-val">$${c[1].toLocaleString('es-CO')}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    ${topProductos.length>0?`
    <p class="section-title">Productos más vendidos</p>
    <div class="chart-card full-w">
      <div class="chart-title">Cantidad por producto</div>
      <div class="chart-wrap"><canvas id="chartProductos"></canvas></div>
    </div>`:''}

    <p class="section-title">Análisis del período</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div class="chart-card">
        <div class="kpi-label">🏆 Mejor día</div>
        <div style="color:white;font-weight:700;margin-top:4px;">${mejorDia||'—'}</div>
        <div style="color:var(--clr-panel-muted);font-size:12px;">${mejorDia?'$'+porFecha[mejorDia].toLocaleString('es-CO'):''}</div>
      </div>
      <div class="chart-card">
        <div class="kpi-label">📉 Día más bajo</div>
        <div style="color:white;font-weight:700;margin-top:4px;">${peorDia||'—'}</div>
        <div style="color:var(--clr-panel-muted);font-size:12px;">${peorDia?'$'+porFecha[peorDia].toLocaleString('es-CO'):''}</div>
      </div>
    </div>
  `;

  // Chart: ventas por día
  if(chartVentas){ chartVentas.destroy(); chartVentas=null; }
  let ctx=document.getElementById("chartVentas");
  if(ctx&&fechasOrdenadas.length>0){
    chartVentas=new Chart(ctx,{
      type:'line',
      data:{
        labels:fechasOrdenadas.map(f=>f.slice(5)),
        datasets:[{
          label:'Ventas',
          data:fechasOrdenadas.map(f=>porFecha[f]),
          borderColor:'#16a34a', backgroundColor:'rgba(22,163,74,0.10)',
          borderWidth:2.5, tension:0.4, fill:true,
          pointBackgroundColor:'#16a34a', pointRadius:4, pointHoverRadius:6
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.raw.toLocaleString('es-CO')}}},
        scales:{x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},
                y:{ticks:{color:'#94a3b8',font:{size:11},callback:v=>'$'+v.toLocaleString('es-CO')},grid:{color:'rgba(255,255,255,0.05)'}}}}
    });
  }

  // Chart: por día de semana
  if(chartDia){ chartDia.destroy(); chartDia=null; }
  let ctx2=document.getElementById("chartDia");
  if(ctx2){
    chartDia=new Chart(ctx2,{
      type:'bar',
      data:{
        labels:dias,
        datasets:[{label:'Promedio',data:promDia,
          backgroundColor:['rgba(37,99,235,0.7)','rgba(22,163,74,0.7)','rgba(22,163,74,0.7)','rgba(22,163,74,0.7)','rgba(22,163,74,0.7)','rgba(22,163,74,0.7)','rgba(37,99,235,0.7)'],
          borderRadius:6,borderSkipped:false}]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.raw.toLocaleString('es-CO')}}},
        scales:{x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{display:false}},
                y:{ticks:{color:'#94a3b8',font:{size:11},callback:v=>'$'+v.toLocaleString('es-CO')},grid:{color:'rgba(255,255,255,0.05)'}}}}
    });
  }

  // Chart: productos
  if(topProductos.length>0){
    let ctx3=document.getElementById("chartProductos");
    if(ctx3){
      new Chart(ctx3,{
        type:'bar',
        data:{
          labels:topProductos.map(p=>p[0].split('(')[0].trim()),
          datasets:[{label:'Unidades',data:topProductos.map(p=>p[1].cant),
            backgroundColor:'rgba(124,58,237,0.7)',borderRadius:6,borderSkipped:false}]
        },
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},
                  y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{display:false}}}}
      });
    }
  }
}

  r.style.display=r.style.display==="flex"?"none":"flex";
}

async function abrirConta(){

}

async function renderConta(){
  let fechaHoy=new Date().toISOString().split("T")[0];
  let mesInicio=fechaHoy.slice(0,7)+"-01";

  // Ingresos del mes
  let{data,error}=await db.from("pedidos").select("total").gte("fecha",mesInicio).lte("fecha",fechaHoy);
  let ingresos=(data||[]).reduce((s,r)=>s+(Number(r.total)||0),0);

  // Gastos en memoria
  let totalGastos=gastosMemoria.reduce((s,g)=>s+g.monto,0);
  let utilidad=ingresos-totalGastos;
  let margen=ingresos>0?((utilidad/ingresos)*100).toFixed(1):0;

  // Agrupar gastos por categoría
  let porCat={};
  gastosMemoria.forEach(g=>{
    if(!porCat[g.categoria]) porCat[g.categoria]=0;
    porCat[g.categoria]+=g.monto;
  });

  document.getElementById("contaBody").innerHTML=`
    <p class="section-title">Resumen del mes</p>
    <div class="conta-kpi-grid">
      <div class="kpi-card green">
        <div class="kpi-label">Ingresos</div>
        <div class="kpi-value" style="font-size:clamp(0.9rem,2.5vw,1.5rem);">$${ingresos.toLocaleString('es-CO')}</div>
        <div class="kpi-delta neutral">Ventas del mes</div>
      </div>
      <div class="kpi-card" style="--c:var(--clr-error)">
        <div class="kpi-label" style="position:relative;">Gastos</div>
        <div class="kpi-value" style="font-size:clamp(0.9rem,2.5vw,1.5rem);color:#f87171;">$${totalGastos.toLocaleString('es-CO')}</div>
        <div class="kpi-delta neutral">${gastosMemoria.length} registro(s)</div>
      </div>
      <div class="kpi-card ${utilidad>=0?'green':''}">
        <div class="kpi-label">Utilidad</div>
        <div class="kpi-value" style="font-size:clamp(0.9rem,2.5vw,1.5rem);color:${utilidad>=0?'#4ade80':'#f87171'};">$${utilidad.toLocaleString('es-CO')}</div>
        <div class="kpi-delta ${utilidad>=0?'up':'down'}">Margen: ${margen}%</div>
      </div>
    </div>

    <div class="utilidad-box">
      <div class="utilidad-label">Resultado Neto del Mes</div>
      <div class="utilidad-val ${utilidad<0?'negative':''}">$${utilidad.toLocaleString('es-CO')}</div>
      <div class="utilidad-margen">Margen de utilidad: ${margen}% | Ingresos: $${ingresos.toLocaleString('es-CO')}</div>
    </div>

    ${Object.keys(porCat).length>0?`
    <p class="section-title" style="margin-top:20px;">Gastos por categoría</p>
    <div class="chart-card full-w" style="margin-bottom:16px;">
      <div class="chart-title">Distribución de gastos</div>
      <div class="chart-wrap"><canvas id="chartConta"></canvas></div>
    </div>`:''}

    <p class="section-title">Registrar Gasto</p>
    <div class="gasto-form">
      <h3>➕ Nuevo gasto</h3>
      <div class="gasto-row">
        <input type="text" id="gastoDesc" placeholder="Descripción (ej: Transporte)">
        <select id="gastoCat">
          <option value="Arriendo">Arriendo</option>
          <option value="Transporte">Transporte</option>
          <option value="Servicios">Servicios</option>
          <option value="Materia Prima">Materia Prima</option>
          <option value="Empleados">Empleados</option>
          <option value="Otros">Otros</option>
        </select>
        <input type="number" id="gastoMonto" placeholder="Valor $">
        <button class="btn-add-gasto" onclick="agregarGasto()">Agregar</button>
      </div>
    </div>

    <p class="section-title">Gastos registrados</p>
    <div class="gastos-list" id="gastosList">
      ${gastosMemoria.length===0?`<div class="empty-state" style="padding:24px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        <p>Sin gastos registrados aún</p></div>`:''}
      ${gastosMemoria.map((g,i)=>`
      <div class="gasto-item">
        <span>${g.descripcion} <span class="gasto-cat">[${g.categoria}]</span></span>
        <span style="display:flex;align-items:center;gap:4px;">
          <span class="gasto-monto">-$${g.monto.toLocaleString('es-CO')}</span>
          <button class="gasto-del" onclick="eliminarGasto(${i})">✕</button>
        </span>
      </div>`).join('')}
    </div>
  `;

  // Chart contabilidad
  if(Object.keys(porCat).length>0){
    let ctx=document.getElementById("chartConta");
    if(chartConta){ chartConta.destroy(); chartConta=null; }
    if(ctx){
      let cats=Object.keys(porCat);
      let vals=cats.map(c=>porCat[c]);
      let colors=['rgba(22,163,74,0.8)','rgba(37,99,235,0.8)','rgba(217,119,6,0.8)','rgba(124,58,237,0.8)','rgba(220,38,38,0.8)','rgba(148,163,184,0.8)'];
      chartConta=new Chart(ctx,{
        type:'doughnut',
        data:{
          labels:cats,
          datasets:[{data:vals,backgroundColor:colors.slice(0,cats.length),borderWidth:0,hoverOffset:8}]
        },
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{position:'right',labels:{color:'#94a3b8',font:{size:11},boxWidth:12,padding:12}},
            tooltip:{callbacks:{label:ctx=>`${ctx.label}: $${ctx.raw.toLocaleString('es-CO')}`}}
          }}
      });
    }
  }
}

function agregarGasto(){
  let desc=document.getElementById("gastoDesc").value.trim();
  let cat=document.getElementById("gastoCat").value;
  let monto=Number(document.getElementById("gastoMonto").value)||0;
  if(!desc||monto<=0){alert("Completa descripción y valor");return;}
  gastosMemoria.push({descripcion:desc,categoria:cat,monto});
  try{ sessionStorage.setItem("gastos",JSON.stringify(gastosMemoria)); }catch(e){}
  renderConta();
}

function eliminarGasto(i){
  gastosMemoria.splice(i,1);
  try{ sessionStorage.setItem("gastos",JSON.stringify(gastosMemoria)); }catch(e){}
  renderConta();
}

});

});
</script>
