<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ====== GENERAL ====== */
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

/* ====== LAYOUT ====== */
.container{
display:flex;
height:100vh;
}

/* ====== SIDEBAR ====== */
.sidebar{
width:220px;
background:#222;
color:white;
padding:15px;
overflow-y:auto;
}

.sidebar h3{
margin-top:0;
}

.fecha-btn{
background:#333;
padding:8px;
margin-bottom:8px;
border-radius:6px;
cursor:pointer;
}

.fecha-btn:hover{
background:#444;
}

/* ====== MAIN ====== */
.main{
flex:1;
padding:20px;
overflow-y:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card h4{
margin:0;
}

/* ====== MODAL ====== */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

/* ====== TICKET 80MM ====== */
.ticket{
background:white;
width:80mm;
max-width:80mm;
padding:10px;
font-family:monospace;
font-size:12px;
}

 .gran-total{
font-size:22px;
font-weight:bold;
color:red;
text-align:center;
margin-top:10px;
}
  
.logo{
text-align:center;
margin-bottom:5px;
}

.logo img{
width:120px;
max-width:100%;
}

.encabezado{
text-align:center;
margin-bottom:8px;
}

textarea{
width:100%;
min-height:150px;
font-size:12px;
border:1px solid #ccc;
resize:none;
overflow:hidden;
}

button{
width:100%;
margin-top:6px;
padding:8px;
cursor:pointer;
}

/* ====== SOLO IMPRIME TICKET ====== */
@media print {

body *{
visibility:hidden;
}

.ticket, .ticket *{
visibility:visible;
}

.ticket{
position:absolute;
left:0;
top:0;
width:80mm;
}

textarea{
border:none;
resize:none;
}

button{
display:none;
}

}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>Fechas</h3>
<div id="fechas"></div>
</div>

<div class="main">
<h2>Pedidos del día</h2>
<div class="grid" id="grid"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="ticket">

<div class="logo">
<img src="logo.png">
</div>

<div class="encabezado" contenteditable="true">
<strong>Panadería Andrey</strong><br>
NIT: 123456789<br>
Tel: 3000000000<br>
Barrio: San Telmo
</div>

<hr>

<div id="clienteNombre"></div>

<textarea id="facturaTexto"></textarea>

<button onclick="imprimir()">🖨 Imprimir</button>
<button onclick="guardar()">💾 Guardar cambios</button>
<button onclick="cerrar()">Cerrar</button>

</div>
</div>

<script>

// ====== CONFIGURA TU SUPABASE ======
const SUPABASE_URL = "https://vswostjubcxjotpqnzhk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzd29zdGp1YmN4am90cHFuemhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTAyNDksImV4cCI6MjA4Nzg2NjI0OX0.VIWMJWyubtKj7QCoOybia_Fv2S4sjxFelQz9x1tZKBo";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let pedidoId = null;

// ====== CARGAR FECHAS ======
async function cargarFechas(){
const { data } = await db
.from("pedidos")
.select("fecha")
.order("fecha",{ascending:false});

if(!data) return;

let fechas = [...new Set(data.map(p => p.fecha.split("T")[0]))];

let cont = document.getElementById("fechas");
cont.innerHTML = "";

fechas.forEach(f=>{
cont.innerHTML += `<div class="fecha-btn" onclick="cargarPedidos('${f}')">${f}</div>`;
});
}

// ====== CARGAR PEDIDOS ======
async function cargarPedidos(fecha){

const inicio = new Date(fecha);
inicio.setHours(0,0,0,0);

const fin = new Date(fecha);
fin.setHours(23,59,59,999);

const { data, error } = await db
.from("pedidos")
.select("*")
.gte("fecha", inicio.toISOString())
.lte("fecha", fin.toISOString());

if(error){
console.log(error);
return;
}

let grid = document.getElementById("grid");
grid.innerHTML = "";

if(!data || data.length === 0){
grid.innerHTML = "<p>No hay pedidos este día</p>";
return;
}

data.forEach(p=>{
grid.innerHTML += `
<div class="card" style="position:relative;">
<div onclick="abrir(${p.id}, \`${p.pedido}\`, \`${p.cliente}\`)">
<h4>${p.cliente}</h4>
<p>$${p.total}</p>
</div>

<div onclick="eliminarPedido(${p.id})" 
style="position:absolute;top:8px;right:10px;color:red;font-weight:bold;cursor:pointer;font-size:18px;">
✖
</div>

</div>
`;
});

}
// ====== ABRIR TICKET ======
function abrir(id, texto, cliente){

pedidoId = id;
document.getElementById("modal").style.display = "flex";
document.getElementById("clienteNombre").innerHTML = "<strong>Cliente:</strong> " + cliente;

if(!texto){
document.getElementById("facturaTexto").value = "";
return;
}

let lineas = texto.split("\n");
let nuevoTexto = "";
let total = 0;

const conBendaje = [
"PAN DE 500",
"PAN DE 1.000",
"PAN DE 2.000",
"PAN AGRIDULCE 500",
"PAN AGRIDULCE 1.000",
"PAN ROLLO",
"MOGICON DE 500"
];

lineas.forEach(l=>{

if(l.includes("x") && l.includes("$")){

try{

let nombre = l.split("x")[0].trim();
let cantidad = parseInt(l.split("x")[1]) || 0;
let subtotal = parseInt(l.split("$")[1].replace(/\./g,"")) || 0;

total += subtotal;

nuevoTexto += `${nombre} x${cantidad} = $${subtotal.toLocaleString()}\n`;

if(conBendaje.some(p => nombre.toUpperCase().includes(p))){
let bendaje = Math.floor(cantidad * 0.20);
nuevoTexto += `Bendaje 20%: ${bendaje} panes\n`;
}

nuevoTexto += "\n";

}catch(e){
console.log("Error procesando línea:", l);
}

}

});

nuevoTexto += `--------------------------\n`;
nuevoTexto += `TOTAL PEDIDO: $${total.toLocaleString()}\n\n`;
nuevoTexto += `===========================\n`;
nuevoTexto += `TOTAL A COBRAR: $${total.toLocaleString()}\n`;
nuevoTexto += `===========================\n`;

document.getElementById("facturaTexto").value = nuevoTexto;

autoResize();
}

// ==== GENERAR BENDaje AUTOMÁTICO ====

let lineas = texto.split("\n");
let nuevoTexto = "";
let total = 0;

lineas.forEach(l=>{

if(l.includes("x")){

let partes = l.split("x");
let nombre = partes[0].trim();
let cantidad = parseInt(partes[1]);

let precio = 500; // si quieres puedes automatizar esto luego

let subtotal = cantidad * precio;
let bendaje = Math.floor(cantidad * 0.20);

total += subtotal;

nuevoTexto += `
${nombre} x${cantidad} = $${subtotal.toLocaleString()}
Bendaje 20%: ${bendaje} panes

`;
}

});

nuevoTexto += `
TOTAL PEDIDO = $${total.toLocaleString()}
TOTAL BENDaje = $${(total*0.20).toLocaleString()}

\n========================
TOTAL A COBRAR: $${total.toLocaleString()}
========================
`;

document.getElementById("facturaTexto").value = nuevoTexto;

}

// ====== GUARDAR ======
async function guardar(){
let nuevo = document.getElementById("facturaTexto").value;

await db
.from("pedidos")
.update({pedido:nuevo})
.eq("id", pedidoId);

alert("Factura actualizada ✔");
}

// ====== IMPRIMIR ======
function imprimir(){
window.print();
}

// ====== CERRAR ======
function cerrar(){
document.getElementById("modal").style.display="none";
}

cargarFechas();

  async function eliminarPedido(id){

if(!confirm("¿Eliminar este pedido?")) return;

await db
.from("pedidos")
.delete()
.eq("id", id);

alert("Pedido eliminado ✔");

cargarFechas();
document.getElementById("grid").innerHTML="";
}

 function autoResize(){
let area = document.getElementById("facturaTexto");
area.style.height = "auto";
area.style.height = area.scrollHeight + "px";
}

</script>

</body>
</html>
