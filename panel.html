<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel PRO Panadería</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
.container{display:flex;height:100vh;}

.sidebar{width:250px;background:#111;color:#fff;padding:10px;}
.main{flex:1;padding:10px;overflow:auto;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
cursor:pointer;
position:relative;
}

.card.moto{border-left:6px solid green;}
.card.auto{border-left:6px solid blue;}
.card.recoge{border-left:6px solid orange;}
.card.lejano{border-left:6px solid purple;}

.x{
position:absolute;
right:8px;
top:5px;
color:red;
cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.ticket{
background:#fff;
padding:15px;
border-radius:12px;
max-height:90vh;
overflow:auto;
width:95%;
max-width:900px;
}

.producto{
display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}

.producto img{
width:100px;height:100px;border-radius:10px;
}

.producto.activo-cant{background:#d4ffd4;}
.producto.activo-din{background:#d4e4ff;}

.panel{
position:sticky;
top:10px;
width:180px;
}

.layout{display:flex;gap:15px;}

.result{
background:#f9f9f9;
padding:10px;
margin-top:10px;
border-radius:10px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>Fecha</h3>
<input type="date" id="fecha"><br><br>
<button onclick="nuevoCliente()">➕ Agregar Cliente</button>
</div>

<div class="main">

<input placeholder="Buscar..." oninput="filtrar(this.value)">

<h2 id="totalGeneral">TOTAL: $0</h2>

<div class="grid" id="grid"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modalPedido">
<div class="ticket">

<h2>Pedido</h2>

<div class="layout">

<div style="flex:1;" id="productos"></div>

<div class="panel">
<button onclick="modo='promo'">PROMO</button>
<button onclick="modo='original'">ORIGINAL</button>
<button onclick="modo='alexa'">ALEXA</button>
<button onclick="modo='tiberio'">TIBERIO</button>
<button onclick="resetear()">🧹 LIMPIAR</button>

<hr>

<button onclick="calcular()">CALCULAR</button>
<button onclick="guardar()">💾 GUARDAR</button>
</div>

</div>

<div id="resultado" class="result"></div>
<div id="bendaje" class="result"></div>
<div id="total"></div>

</div>
</div>

<script>

const db = supabase.createClient(

let modo="promo";

/* CLIENTES COMPLETOS */
let clientes=[

/* PRODUCTOS COMPLETOS */
let productos=[
{name:"PAN DE 500",precio:500,b:true},
{name:"PAN DE 1.000",precio:1000,b:true},
{name:"PAN DE 2.000",precio:2000,b:true},
{name:"PAN DE 3.500",precio:3500,b:true},
{name:"PAN QUESILLO",precio:1200,b:false}
];

function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

clientes.forEach(c=>{
grid.innerHTML+=`
<div class="card ${c.tipo}" onclick="abrir('${c.nombre}')">
<div class="x">✖</div>
${c.nombre}
</div>`;
});
}

function abrir(nombre){
clienteActual=nombre;
document.getElementById("modalPedido").style.display="flex";
}

function calcular(){
let total=0;
let texto="";
let bendaje="";

productos.forEach((p,i)=>{
let cant=Number(document.getElementById("cant"+i).value)||0;

if(p.name==="PAN DE 2.000" && modo!=="original"){
if(cant>=3) {cant=3; total+=5000;}
else total+=cant*2000;
}else total+=cant*p.precio;

texto+=p.name+" x"+cant+"\n";

if(p.b){
let b=Math.round(cant*0.2);
bendaje+=p.name+" → "+b+"\n";
}
});

document.getElementById("resultado").innerText=texto;
document.getElementById("bendaje").innerText=bendaje;
document.getElementById("total").innerText="TOTAL: $"+total;
window.total=total;
}

function guardar(){
db.from("pedidos").insert({
cliente:clienteActual,
total:window.total,
fecha:new Date().toISOString()
});
document.getElementById("modalPedido").style.display="none";
}

function nuevoCliente(){
let nombre=prompt("Nombre");
let tipo=prompt("moto/auto/recoge/lejano");

clientes.push({nombre,tipo});
render();
}

function filtrar(t){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(t.toLowerCase())?"block":"none";
});
}

render();

</script>

</body>
</html>
